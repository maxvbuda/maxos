name: Record demo video

# Records a guided-tour video of MaxOS on a cloud machine and uploads it as an
# artifact. Manual-only. Needs two repo secrets for the demo login:
#   DEMO_USER, DEMO_PASS  (Settings → Secrets and variables → Actions)
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  record:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright + Chromium
        working-directory: tools/demo-recorder
        run: |
          npm install
          npx playwright install --with-deps chromium

      - name: Warm the live site (Render can cold-start)
        run: |
          for i in 1 2 3; do
            curl -sS -m 120 -o /dev/null "https://maxos-1oe3.onrender.com" && break
            echo "warm-up attempt $i failed, retrying…"; sleep 5
          done

      - name: Record the tour
        working-directory: tools/demo-recorder
        env:
          MAXOS_URL: https://maxos-1oe3.onrender.com
          DEMO_USER: ${{ secrets.DEMO_USER }}
          DEMO_PASS: ${{ secrets.DEMO_PASS }}
          OUT_DIR: video
        run: node record.mjs

      - name: Install ffmpeg
        run: sudo apt-get update -qq && sudo apt-get install -y ffmpeg

      - name: Convert to mp4 (broad browser support)
        working-directory: tools/demo-recorder
        run: |
          src=$(ls video/*.webm | head -1)
          echo "Source video: $src"
          ffmpeg -y -i "$src" -movflags +faststart -pix_fmt yuv420p \
            -vf "scale=1440:-2" -c:v libx264 -crf 23 -an video/demo.mp4
          cp "$src" video/demo.webm
          ls -la video/

      - uses: actions/upload-artifact@v4
        with:
          name: demo-video
          path: |
            tools/demo-recorder/video/demo.mp4
            tools/demo-recorder/video/demo.webm
          if-no-files-found: error
