<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>MaxOS</title>
<!-- Favicon: the MaxOS logo (glowing blue M on a monitor), inline SVG so the single-file app stays self-contained -->
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='0' y2='1'%3E%3Cstop offset='0' stop-color='%2364c4ff'/%3E%3Cstop offset='1' stop-color='%231f6fff'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='14' fill='%23081226'/%3E%3Crect x='10' y='12' width='44' height='32' rx='6' fill='none' stroke='url(%23g)' stroke-width='3.5'/%3E%3Cpath d='M20 38 V22 L32 32 L44 22 V38' fill='none' stroke='url(%23g)' stroke-width='5' stroke-linejoin='round' stroke-linecap='round'/%3E%3Crect x='28' y='46' width='8' height='5' fill='url(%23g)'/%3E%3Crect x='22' y='51' width='20' height='3' rx='1.5' fill='url(%23g)'/%3E%3C/svg%3E">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
  body { width: 100vw; height: 100vh; overflow: hidden; font-family: system-ui, -apple-system, 'Segoe UI', sans-serif; }
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,.18); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,.32); }

  /* Login screen */
  #login-screen { position:fixed; inset:0; z-index:999998; background:linear-gradient(135deg,#0d0d1a,#1a1a2e,#0f3460); display:flex; align-items:center; justify-content:center; }
  .login-box { background:rgba(255,255,255,.06); backdrop-filter:blur(40px); border:1px solid rgba(255,255,255,.12); border-radius:24px; padding:40px 36px; width:360px; display:flex; flex-direction:column; align-items:center; gap:20px; box-shadow:0 32px 80px rgba(0,0,0,.6); }
  .login-logo { font-size:56px; }
  .login-title { color:#fff; font-size:22px; font-weight:700; letter-spacing:.5px; }
  .login-subtitle { color:rgba(255,255,255,.45); font-size:13px; margin-top:-12px; }
  .login-tabs { display:flex; gap:0; background:rgba(255,255,255,.08); border-radius:10px; padding:3px; width:100%; }
  .login-tab { flex:1; padding:8px; border:none; background:none; color:rgba(255,255,255,.5); border-radius:8px; cursor:pointer; font-size:13px; font-weight:500; transition:all .15s; }
  .login-tab.active { background:rgba(255,255,255,.15); color:#fff; }
  .login-input { width:100%; background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.12); border-radius:12px; padding:13px 16px; color:#fff; font-size:14px; outline:none; font-family:inherit; transition:border-color .15s; }
  .login-input:focus { border-color:rgba(100,180,255,.5); }
  .login-input::placeholder { color:rgba(255,255,255,.3); }
  .login-btn { width:100%; padding:14px; background:linear-gradient(135deg,#64b4ff,#bf5af2); border:none; border-radius:12px; color:#fff; font-size:15px; font-weight:600; cursor:pointer; transition:opacity .15s,transform .1s; letter-spacing:.3px; }
  .login-btn:hover { opacity:.9; }
  .login-btn:active { transform:scale(.98); }
  .login-error { color:#ff5f57; font-size:13px; text-align:center; min-height:18px; }
  .login-footer { color:rgba(255,255,255,.3); font-size:12px; text-align:center; }
  .login-device-select { display:flex; gap:12px; margin:8px 0; }
  .device-btn { flex:1; padding:12px; background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.15); border-radius:10px; color:rgba(255,255,255,.6); font-size:13px; font-weight:500; cursor:pointer; transition:all .15s; }
  .device-btn:hover { background:rgba(255,255,255,.12); }
  .device-btn.active { background:linear-gradient(135deg,#64b4ff,#bf5af2); color:#fff; border-color:rgba(100,180,255,.6); }
  .login-device-label { color:rgba(255,255,255,.45); font-size:12px; margin-bottom:6px; }

  /* iPad Dock (bottom macOS-style) */
  #dock { position:fixed; bottom:0; left:0; right:0; height:80px; background:rgba(8,8,20,.8); backdrop-filter:blur(32px) saturate(180%); border-top:1px solid rgba(255,255,255,.07); display:none; align-items:flex-end; justify-content:center; gap:8px; padding:8px 12px 12px 12px; z-index:9999; }
  .dock-btn { width:60px; height:60px; background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.1); border-radius:12px; color:#fff; font-size:24px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .12s; }
  .dock-btn:hover { background:rgba(255,255,255,.16); transform:scale(1.1); }
  .dock-btn.active { background:rgba(100,180,255,.22); border-color:rgba(100,180,255,.38); }

  /* iPad full-screen windows */
  .ipad-fullscreen .win-min, .ipad-fullscreen .win-max { display:none; }
  .ipad-fullscreen .resize-handle { display:none; }

  /* Boot screen */
  #boot { position:fixed; inset:0; z-index:999999; background:#000; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:22px; transition:opacity .7s ease; }
  #boot.fade { opacity:0; pointer-events:none; }
  .boot-logo { font-size:72px; animation:bootPulse 1.6s ease infinite; }
  .boot-name { color:#fff; font-size:26px; font-weight:600; letter-spacing:3px; }
  .boot-bar-bg { width:180px; height:3px; background:rgba(255,255,255,.12); border-radius:2px; overflow:hidden; }
  .boot-bar { height:100%; background:linear-gradient(90deg,#64b4ff,#bf5af2); border-radius:2px; animation:bootLoad 2.2s cubic-bezier(.4,0,.2,1) forwards; }
  @keyframes bootPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.07)} }
  @keyframes bootLoad { from{width:0} to{width:100%} }

  /* Desktop */
  #desktop {
    width: 100%; height: 100%;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 40%, #0f3460 100%);
    position: relative;
  }

  /* Wallpaper stars */
  #desktop::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
      radial-gradient(1px 1px at 20% 30%, white, transparent),
      radial-gradient(1px 1px at 80% 10%, white, transparent),
      radial-gradient(1px 1px at 50% 60%, rgba(255,255,255,.6), transparent),
      radial-gradient(1px 1px at 10% 80%, white, transparent),
      radial-gradient(1px 1px at 90% 70%, rgba(255,255,255,.8), transparent),
      radial-gradient(1px 1px at 35% 15%, white, transparent),
      radial-gradient(1px 1px at 65% 85%, rgba(255,255,255,.5), transparent);
    pointer-events: none;
  }

  /* Taskbar */
  #taskbar { position:fixed; bottom:0; left:0; right:0; height:50px; background:rgba(8,8,20,.72); backdrop-filter:blur(32px) saturate(180%); border-top:1px solid rgba(255,255,255,.07); display:flex; align-items:center; gap:4px; padding:0 12px; z-index:9999; }
  #taskbar-apps { display:flex; gap:4px; flex:1; overflow:hidden; }
  .taskbar-btn { height:34px; padding:0 12px; background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.1); border-radius:9px; color:#fff; font-size:12px; cursor:pointer; display:flex; align-items:center; gap:6px; transition:background .12s,border-color .12s; white-space:nowrap; }
  .taskbar-btn:hover { background:rgba(255,255,255,.16); border-color:rgba(255,255,255,.2); }
  .taskbar-btn.active { background:rgba(100,180,255,.22); border-color:rgba(100,180,255,.38); }
  #spotlight-btn { width:32px; height:32px; background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.1); border-radius:8px; color:rgba(255,255,255,.6); cursor:pointer; font-size:14px; display:flex; align-items:center; justify-content:center; transition:background .12s; margin-right:6px; flex-shrink:0; }
  #spotlight-btn:hover { background:rgba(255,255,255,.16); color:#fff; }
  #clock { margin-left:6px; color:#fff; font-size:12px; font-weight:500; text-align:right; line-height:1.35; min-width:60px; flex-shrink:0; }
  #clock .ct { font-size:13px; }
  #clock .cd { font-size:10px; color:rgba(255,255,255,.5); }

  /* Start menu */
  #start-menu { position:fixed; bottom:58px; left:12px; width:300px; background:rgba(12,12,28,.95); backdrop-filter:blur(40px) saturate(200%); border:1px solid rgba(255,255,255,.12); border-radius:18px; padding:16px; z-index:9998; display:none; box-shadow:0 24px 70px rgba(0,0,0,.75); animation:menuOpen .18s ease; }
  @keyframes menuOpen { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  #start-menu h3 { color:rgba(255,255,255,.38); font-size:10px; text-transform:uppercase; letter-spacing:1.5px; margin-bottom:8px; font-weight:600; }
  .start-item { display:flex; align-items:center; gap:12px; padding:9px 12px; border-radius:10px; color:#fff; font-size:14px; cursor:pointer; transition:background .1s; }
  .start-item:hover { background:rgba(255,255,255,.1); }
  .start-item .icon { font-size:20px; width:28px; text-align:center; }

  /* Desktop icons */
  .desktop-icon { position:absolute; width:78px; display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer; padding:8px 4px; border-radius:12px; transition:background .12s,transform .1s; }
  .desktop-icon:hover { background:rgba(255,255,255,.12); transform:scale(1.05); }
  .desktop-icon:active { transform:scale(.95); }
  .desktop-icon .icon { font-size:38px; filter:drop-shadow(0 2px 8px rgba(0,0,0,.5)); }
  .desktop-icon span { color:#fff; font-size:11px; text-align:center; text-shadow:0 1px 4px rgba(0,0,0,.9); font-weight:500; }

  /* Windows */
  @keyframes winOpen { from{opacity:0;transform:scale(.9) translateY(8px)} to{opacity:1;transform:scale(1) translateY(0)} }
  @keyframes winClose { from{opacity:1;transform:scale(1)} to{opacity:0;transform:scale(.9)} }
  .window { position:absolute; background:rgba(16,16,34,.96); backdrop-filter:blur(28px) saturate(200%); border:1px solid rgba(255,255,255,.11); border-radius:16px; box-shadow:0 8px 32px rgba(0,0,0,.4),0 32px 80px rgba(0,0,0,.65),inset 0 1px 0 rgba(255,255,255,.06); min-width:300px; min-height:200px; display:flex; flex-direction:column; overflow:hidden; z-index:100; animation:winOpen .22s cubic-bezier(.34,1.3,.64,1); }
  .window.focused { border-color:rgba(100,180,255,.28); box-shadow:0 8px 32px rgba(0,0,0,.5),0 32px 80px rgba(0,0,0,.7),0 0 0 1px rgba(100,180,255,.12),inset 0 1px 0 rgba(255,255,255,.08); }
  .window.closing { animation:winClose .16s ease forwards; pointer-events:none; }
  .title-bar { height:40px; background:rgba(255,255,255,.035); border-bottom:1px solid rgba(255,255,255,.06); display:flex; align-items:center; gap:8px; padding:0 14px; cursor:grab; flex-shrink:0; }
  .title-bar:active { cursor:grabbing; }
  .win-btn { width:13px; height:13px; border-radius:50%; border:none; cursor:pointer; transition:filter .1s; }
  .win-btn:hover { filter:brightness(1.18); }
  .win-close { background:#ff5f57; } .win-min { background:#febc2e; } .win-max { background:#28c840; }
  .win-title { color:rgba(255,255,255,.75); font-size:13px; margin-left:4px; font-weight:500; }
  .window-body { flex:1; min-height:0; overflow:auto; color:#fff; }
  .resize-handle { position:absolute; right:0; bottom:0; width:20px; height:20px; cursor:se-resize; }
  .resize-handle::after { content:''; position:absolute; right:4px; bottom:4px; width:9px; height:9px; border-right:2px solid rgba(255,255,255,.22); border-bottom:2px solid rgba(255,255,255,.22); }

  /* Spotlight */
  #spotlight { position:fixed; top:25%; left:50%; transform:translateX(-50%); width:520px; background:rgba(12,12,26,.96); backdrop-filter:blur(40px); border:1px solid rgba(255,255,255,.16); border-radius:18px; overflow:hidden; z-index:99999; display:none; box-shadow:0 32px 90px rgba(0,0,0,.8); }
  @keyframes spotOpen { from{opacity:0;transform:translateX(-50%) scale(.96)} to{opacity:1;transform:translateX(-50%) scale(1)} }
  .spotlight-open { animation:spotOpen .16s ease; }
  #spot-input-row { display:flex; align-items:center; gap:12px; padding:16px 20px; border-bottom:1px solid rgba(255,255,255,.07); }
  #spot-input { flex:1; background:none; border:none; outline:none; color:#fff; font-size:19px; font-family:inherit; }
  #spot-input::placeholder { color:rgba(255,255,255,.28); }
  #spot-results { padding:8px; max-height:300px; overflow-y:auto; }
  .spot-row { display:flex; align-items:center; gap:12px; padding:10px 12px; border-radius:10px; cursor:pointer; color:#fff; font-size:14px; transition:background .1s; }
  .spot-row:hover,.spot-row.sel { background:rgba(100,180,255,.2); }
  .spot-row small { color:rgba(255,255,255,.4); font-size:12px; margin-left:auto; }

  /* Notifications */
  #notif-stack { position:fixed; top:14px; right:14px; display:flex; flex-direction:column; gap:8px; z-index:99998; pointer-events:none; }
  .notif { background:rgba(18,18,38,.94); backdrop-filter:blur(20px); border:1px solid rgba(255,255,255,.13); border-radius:14px; padding:12px 14px; min-width:260px; max-width:310px; display:flex; gap:10px; align-items:flex-start; box-shadow:0 8px 32px rgba(0,0,0,.5); pointer-events:all; animation:notifIn .3s cubic-bezier(.34,1.26,.64,1); transition:opacity .35s,transform .35s; }
  .notif.out { opacity:0; transform:translateX(110%); }
  @keyframes notifIn { from{opacity:0;transform:translateX(110%)} to{opacity:1;transform:translateX(0)} }
  .notif-icon { font-size:22px; flex-shrink:0; }
  .notif-body { flex:1; }
  .notif-title { color:#fff; font-size:13px; font-weight:600; }
  .notif-msg { color:rgba(255,255,255,.58); font-size:12px; margin-top:2px; }
  .notif-x { color:rgba(255,255,255,.38); cursor:pointer; font-size:16px; line-height:1; flex-shrink:0; }
  .notif-x:hover { color:#fff; }

  /* Context menu */
  #ctx-menu { position:fixed; background:rgba(18,18,38,.96); backdrop-filter:blur(30px); border:1px solid rgba(255,255,255,.12); border-radius:12px; padding:6px; z-index:99997; min-width:180px; display:none; box-shadow:0 16px 48px rgba(0,0,0,.65); animation:ctxOpen .12s ease; }
  @keyframes ctxOpen { from{opacity:0;transform:scale(.94)} to{opacity:1;transform:scale(1)} }
  .ctx-item { display:flex; align-items:center; gap:10px; padding:8px 12px; border-radius:7px; color:#fff; font-size:13px; cursor:pointer; transition:background .1s; }
  .ctx-item:hover { background:rgba(100,180,255,.2); }
  .ctx-sep { height:1px; background:rgba(255,255,255,.08); margin:4px 8px; }
  .ctx-item kbd { color:rgba(255,255,255,.38); font-size:11px; margin-left:auto; }

  /* ── App styles ── */
  .filemanager { padding:14px; height:100%; display:flex; flex-direction:column; }
  .fm-toolbar { display:flex; align-items:center; gap:8px; margin-bottom:10px; }
  .fm-path { flex:1; background:rgba(255,255,255,.07); border-radius:8px; padding:5px 12px; font-size:12px; color:rgba(255,255,255,.6); }
  .fm-grid { flex:1; display:grid; grid-template-columns:repeat(auto-fill,minmax(76px,1fr)); gap:8px; overflow-y:auto; content-visibility:auto; }
  .fm-item { display:flex; flex-direction:column; align-items:center; gap:4px; padding:8px; border-radius:10px; cursor:pointer; transition:background .1s; }
  .fm-item:hover { background:rgba(255,255,255,.1); }
  .fm-item.selected { background:rgba(100,180,255,.2); }
  .fm-nav-btn { background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.1); color:#fff; border-radius:7px; padding:5px 11px; font-size:12px; cursor:pointer; white-space:nowrap; }
  .fm-nav-btn:hover { background:rgba(255,255,255,.18); }
  .fm-item .icon { font-size:30px; }
  .fm-item span { font-size:11px; color:rgba(255,255,255,.8); text-align:center; word-break:break-word; }

  .editor-toolbar { display:flex; gap:6px; padding:8px 12px; background:rgba(255,255,255,.04); border-bottom:1px solid rgba(255,255,255,.07); flex-wrap:wrap; align-items:center; }
  .editor-toolbar button { background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.1); color:rgba(255,255,255,.85); border-radius:6px; padding:4px 10px; font-size:12px; cursor:pointer; transition:background .1s; }
  .editor-toolbar button:hover { background:rgba(255,255,255,.18); }
  #editor-area { width:100%; height:calc(100% - 46px); background:transparent; border:none; outline:none; color:#d4d4d8; font-size:14px; line-height:1.7; padding:16px 20px; resize:none; font-family:'Menlo','Cascadia Code','Courier New',monospace; tab-size:2; }
  /* Max Docs rich editor */
  .doc-format { display:flex; align-items:center; gap:3px; flex-wrap:wrap; padding:6px 10px; background:rgba(255,255,255,.04); border-bottom:1px solid rgba(255,255,255,.07); }
  .doc-format button { background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.1); color:rgba(255,255,255,.85); border-radius:6px; min-width:28px; height:28px; padding:0 7px; font-size:13px; cursor:pointer; }
  .doc-format button:hover { background:rgba(100,180,255,.3); }
  .doc-format select { background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.1); color:#fff; border-radius:6px; height:28px; font-size:12px; cursor:pointer; padding:0 4px; }
  .doc-format select option { background:#1a1a2e; }
  .doc-sep { width:1px; height:20px; background:rgba(255,255,255,.12); margin:0 4px; }
  .doc-color { width:18px; height:18px; border-radius:50%; cursor:pointer; border:1px solid rgba(255,255,255,.25); }
  .doc-area { flex:1; overflow-y:auto; outline:none; color:#e4e4e8; font-family:system-ui,-apple-system,sans-serif; font-size:15px; line-height:1.7; padding:20px 26px; }
  .doc-area:empty:before { content:attr(data-ph); color:rgba(255,255,255,.3); }
  .doc-area h1 { font-size:26px; margin:12px 0 6px; } .doc-area h2 { font-size:21px; margin:10px 0 6px; } .doc-area h3 { font-size:17px; margin:8px 0 4px; }
  .doc-area blockquote { border-left:3px solid #64b4ff; margin:8px 0; padding:2px 14px; color:rgba(255,255,255,.7); }
  .doc-area pre { background:rgba(0,0,0,.3); padding:12px; border-radius:8px; font-family:'Menlo',monospace; font-size:13px; overflow-x:auto; }
  .doc-area ul, .doc-area ol { margin:8px 0 8px 26px; } .doc-area li { margin:3px 0; }
  .doc-area a { color:#64b4ff; }

  .calc { padding:14px; display:flex; flex-direction:column; gap:10px; }
  .calc-display { background:rgba(0,0,0,.45); border-radius:12px; padding:16px 18px; text-align:right; font-size:36px; font-weight:200; color:#fff; min-height:72px; word-break:break-all; overflow:hidden; border:1px solid rgba(255,255,255,.06); }
  .calc-expr { font-size:13px; color:rgba(255,255,255,.35); min-height:18px; margin-bottom:4px; }
  .calc-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; }
  .calc-btn { padding:16px 0; border:none; border-radius:12px; font-size:17px; cursor:pointer; color:#fff; font-weight:500; transition:filter .08s,transform .08s; border:1px solid rgba(255,255,255,.04); }
  .calc-btn:hover { filter:brightness(1.18); } .calc-btn:active { filter:brightness(.82); transform:scale(.94); }
  .calc-btn.op { background:rgba(100,160,255,.38); } .calc-btn.fn { background:rgba(255,255,255,.14); }
  .calc-btn.num { background:rgba(255,255,255,.09); } .calc-btn.eq { background:rgba(80,210,130,.5); }
  .calc-btn.wide { grid-column:span 2; }

  .terminal { padding:14px 16px; font-family:'Menlo','Cascadia Code','Courier New',monospace; font-size:13px; line-height:1.65; height:100%; display:flex; flex-direction:column; }
  .term-output { flex:1; overflow-y:auto; color:#a8f0c0; white-space:pre-wrap; margin-bottom:8px; }
  .term-input-row { display:flex; align-items:center; gap:6px; border-top:1px solid rgba(255,255,255,.06); padding-top:8px; }
  .term-prompt { color:#64b4ff; white-space:nowrap; }
  #term-input { flex:1; background:transparent; border:none; outline:none; color:#a8f0c0; font-family:inherit; font-size:13px; caret-color:#64b4ff; }

  .settings { padding:22px; display:flex; flex-direction:column; gap:18px; overflow-y:auto; height:100%; }
  .settings h2 { font-size:17px; color:#fff; font-weight:600; }
  .settings h3 { font-size:10px; text-transform:uppercase; letter-spacing:1.5px; color:rgba(255,255,255,.38); font-weight:600; }
  .setting-card { background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.07); border-radius:12px; padding:2px 14px; }
  .setting-row { display:flex; align-items:center; justify-content:space-between; padding:11px 0; }
  .setting-row+.setting-row { border-top:1px solid rgba(255,255,255,.06); }
  .setting-row label { color:rgba(255,255,255,.85); font-size:14px; }
  .toggle { width:44px; height:24px; background:rgba(255,255,255,.14); border-radius:12px; cursor:pointer; position:relative; transition:background .2s; flex-shrink:0; }
  .toggle.on { background:rgba(52,199,89,.68); }
  .toggle::after { content:''; position:absolute; left:3px; top:3px; width:18px; height:18px; background:#fff; border-radius:50%; transition:left .2s; box-shadow:0 1px 4px rgba(0,0,0,.3); }
  .toggle.on::after { left:23px; }
  .wallpaper-picker { display:flex; gap:8px; flex-wrap:wrap; }
  .wp-swatch { width:56px; height:38px; border-radius:8px; cursor:pointer; border:2px solid transparent; transition:border-color .15s,transform .1s; }

  /* Calendar */
  /* Calendar — Google-style month view */
  .cal-wrap { position:relative; display:flex; flex-direction:column; height:100%; background:#0e0e1a; }

  .cal-cell { background:#0e0e1a; padding:4px 4px 2px; cursor:pointer; overflow:hidden; display:flex; flex-direction:column; gap:2px; min-height:0; }

  .cal-cell.today .cal-daynum { background:#4a7aff; color:#fff; font-weight:700; }
  .cal-chip { font-size:11px; color:#fff; padding:1px 6px; border-radius:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; cursor:pointer; line-height:1.5; }
  .cal-chip b { font-weight:600; opacity:.85; margin-right:3px; }
  .cal-more { font-size:10px; color:rgba(255,255,255,.5); padding-left:5px; }
  /* Calendar — single-day view (hourly timeline) */
  #cal-dayview { flex:1; overflow-y:auto; display:none; min-height:0; }

  .cal-allday-strip { display:flex; flex-wrap:wrap; gap:4px; padding:8px 12px 8px 60px; border-bottom:1px solid rgba(255,255,255,.08); }

  .store { display:flex; flex-direction:column; height:100%; }

  /* Messages */

  .pomo-count { color:rgba(255,255,255,.4); font-size:13px; }

  /* Weather */
  .weather { display:flex; flex-direction:column; height:100%; padding:18px; gap:16px; }
  .weather-search { display:flex; gap:8px; }
  .weather-search input { flex:1; background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.12); border-radius:10px; padding:10px 14px; color:#fff; outline:none; font-family:inherit; font-size:14px; }
  .weather-search button { background:rgba(100,180,255,.3); border:none; color:#fff; border-radius:10px; padding:0 18px; cursor:pointer; }
  .weather-current { text-align:center; padding:10px; }
  .weather-icon { font-size:72px; }
  .weather-temp { font-size:52px; font-weight:200; color:#fff; }
  .weather-desc { color:rgba(255,255,255,.6); font-size:15px; }
  .weather-city { color:rgba(255,255,255,.4); font-size:13px; margin-top:4px; }

  .weather-day .wd-icon { font-size:24px; margin:4px 0; }
  .weather-day .wd-temp { color:#fff; font-size:12px; }

  /* Converter */
  .converter { padding:18px; display:flex; flex-direction:column; gap:14px; height:100%; }
  .conv-cats { display:flex; gap:6px; flex-wrap:wrap; }
  .conv-cat { background:rgba(255,255,255,.08); border:none; color:rgba(255,255,255,.6); border-radius:8px; padding:6px 12px; cursor:pointer; font-size:12px; }
  .conv-cat.active { background:rgba(100,180,255,.3); color:#fff; }
  .conv-row { display:flex; flex-direction:column; gap:6px; }
  .conv-row label { color:rgba(255,255,255,.5); font-size:12px; }
  .conv-row input, .conv-row select { background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.12); border-radius:10px; padding:11px 14px; color:#fff; font-size:16px; outline:none; font-family:inherit; }
  .conv-row select option { background:#1a1a2e; }
  .conv-eq { text-align:center; color:rgba(255,255,255,.3); font-size:20px; }

  /* Dice */
  .dice-app { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px; height:100%; padding:20px; }
  .dice-display { font-size:90px; min-height:110px; display:flex; align-items:center; gap:10px; }
  .dice-result { color:#fff; font-size:18px; font-weight:600; }
  .dice-btns { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; }
  .dice-btn { background:rgba(255,255,255,.12); border:none; color:#fff; border-radius:12px; padding:12px 20px; font-size:14px; cursor:pointer; font-weight:500; }
  .dice-btn:hover { background:rgba(255,255,255,.2); }
  @keyframes diceRoll { 0%{transform:rotate(0) scale(1)} 50%{transform:rotate(180deg) scale(1.2)} 100%{transform:rotate(360deg) scale(1)} }
  .rolling { animation:diceRoll .4s ease; }

  /* MaxCoin */
  .mc-app { display:flex; flex-direction:column; align-items:center; gap:14px; height:100%; padding:24px 20px; text-align:center; }
  .mc-title { color:#fff; font-size:20px; font-weight:700; }
  .mc-bal { font-size:40px; font-weight:800; background:linear-gradient(135deg,#febc2e,#ff9f0a); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
  .mc-rate { color:rgba(255,255,255,.55); font-size:13px; margin-top:-6px; }
  .mc-mine { margin-top:6px; background:linear-gradient(135deg,#ff9f0a,#febc2e); border:none; color:#3a2a00; font-weight:800; font-size:20px; padding:18px 30px; border-radius:18px; cursor:pointer; box-shadow:0 8px 22px rgba(255,159,10,.35); transition:transform .06s; }
  .mc-mine:active { transform:scale(.96); }
  @keyframes mcPop { 0%{transform:scale(1)} 40%{transform:scale(1.08)} 100%{transform:scale(1)} }
  .mc-mine.pop { animation:mcPop .18s ease; }
  .mc-row { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; }
  .mc-btn { background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.14); color:#fff; border-radius:12px; padding:11px 16px; font-size:13px; cursor:pointer; font-weight:600; display:flex; flex-direction:column; align-items:center; gap:2px; }
  .mc-btn:hover { background:rgba(255,255,255,.18); }
  .mc-btn small { color:rgba(255,255,255,.45); font-size:10px; font-weight:400; }
  .mc-note { color:rgba(255,255,255,.6); font-size:12px; margin-top:auto; min-height:16px; }

  /* Max Animator */
  .an-app { display:flex; flex-direction:column; height:100%; gap:8px; padding:10px; }
  .an-tools, .an-bar { display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
  .an-t, .an-b { background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.14); color:#fff; border-radius:8px; padding:6px 10px; font-size:13px; cursor:pointer; }
  .an-t.active { background:rgba(100,180,255,.3); border-color:rgba(100,180,255,.5); }
  .an-t:hover, .an-b:hover { background:rgba(255,255,255,.18); }
  .an-sw { width:20px; height:20px; border-radius:50%; cursor:pointer; border:2px solid rgba(255,255,255,.25); display:inline-block; }
  .an-fps, .vid-dur { color:rgba(255,255,255,.6); font-size:12px; display:flex; align-items:center; gap:4px; }
  .an-fps input, .vid-dur input { width:46px; background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.15); color:#fff; border-radius:6px; padding:3px 5px; }
  .an-work { display:flex; flex:1; gap:8px; min-height:160px; }
  .an-stage { flex:1; position:relative; min-width:0; }
  #an-canvas { width:100%; height:100%; display:block; background:#10101f; border-radius:10px; cursor:crosshair; touch-action:none; }
  .an-layers { width:118px; flex-shrink:0; background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.1); border-radius:10px; padding:6px; display:flex; flex-direction:column; gap:4px; overflow:hidden; }
  .an-layers h4 { color:rgba(255,255,255,.45); font-size:10px; text-transform:uppercase; letter-spacing:.8px; margin:2px 4px 4px; }
  .an-layer { padding:5px 7px; border-radius:6px; font-size:11px; color:rgba(255,255,255,.8); cursor:pointer; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .an-layer:hover { background:rgba(255,255,255,.08); }
  .an-layer.sel { background:rgba(100,180,255,.25); color:#fff; }
  .an-strip { display:flex; gap:6px; overflow-x:auto; padding:4px 0; min-height:62px; }
  .an-frame { position:relative; flex:0 0 auto; cursor:pointer; border:2px solid transparent; border-radius:6px; }
  .an-frame.sel { border-color:#64b4ff; }
  .an-frame img { width:74px; height:50px; object-fit:cover; border-radius:4px; display:block; background:#10101f; }
  .an-frame span { position:absolute; bottom:1px; right:3px; font-size:9px; color:#fff; text-shadow:0 1px 2px #000; }
  .an-info, .vid-info { color:rgba(255,255,255,.5); font-size:12px; }

  /* Max Video */
  .vid-app { display:flex; flex-direction:column; height:100%; gap:8px; padding:10px; }
  .vid-stage { flex:1; background:#000; border-radius:10px; display:flex; align-items:center; justify-content:center; position:relative; overflow:hidden; min-height:180px; }
  .vid-frame { max-width:100%; max-height:100%; object-fit:contain; }
  .vid-caption { position:absolute; bottom:14px; left:0; right:0; text-align:center; color:#fff; font-size:22px; font-weight:700; text-shadow:0 2px 6px #000, 0 0 2px #000; padding:0 16px; }
  .vid-empty { color:rgba(255,255,255,.4); font-size:15px; }
  .vid-controls { display:flex; align-items:center; gap:8px; }
  .vid-text { flex:1; background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.15); color:#fff; border-radius:8px; padding:7px 10px; font-size:13px; }
  .vid-c, .vid-b { background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.14); color:#fff; border-radius:8px; padding:7px 11px; font-size:13px; cursor:pointer; }
  .vid-c:hover, .vid-b:hover { background:rgba(255,255,255,.18); }
  .vid-timeline { display:flex; gap:6px; overflow-x:auto; min-height:62px; padding:4px 0; }

  .vid-clip.sel { border-color:#64b4ff; }
  .vid-clip img { width:84px; height:50px; object-fit:cover; border-radius:4px; display:block; }
  .vid-clip span { position:absolute; bottom:1px; right:3px; font-size:9px; color:#fff; text-shadow:0 1px 2px #000; }
  .vid-bar { display:flex; align-items:center; gap:6px; flex-wrap:wrap; }

  /* Max Camera */
  .cam-app { display:flex; flex-direction:column; height:100%; gap:10px; padding:12px; }
  .cam-stage { flex:1; background:#000; border-radius:12px; overflow:hidden; position:relative; display:flex; align-items:center; justify-content:center; }
  #cam-video { width:100%; height:100%; object-fit:cover; }
  #cam-preview { width:100%; height:100%; object-fit:contain; display:none; }
  .cam-msg { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; color:rgba(255,255,255,.7); font-size:14px; text-align:center; padding:20px; }
  .cam-filters { display:flex; gap:6px; flex-wrap:wrap; justify-content:center; }
  .cam-f { background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.14); color:#fff; border-radius:999px; padding:5px 12px; font-size:12px; cursor:pointer; text-transform:capitalize; }
  .cam-f.active { background:rgba(100,180,255,.3); border-color:rgba(100,180,255,.5); }
  .cam-bar { display:flex; gap:8px; justify-content:center; }
  .cam-b { background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.14); color:#fff; border-radius:10px; padding:10px 16px; font-size:14px; cursor:pointer; }
  .cam-b:hover:not(:disabled) { background:rgba(255,255,255,.2); }
  .cam-b:disabled { opacity:.4; cursor:default; }

  /* Reminders */
  .rem-app { display:flex; flex-direction:column; height:100%; padding:12px; gap:10px; }
  .rem-add { display:flex; gap:6px; }
  .rem-input { flex:1; background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.15); color:#fff; border-radius:9px; padding:9px 12px; font-size:14px; }
  .rem-due { background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.15); color:#fff; border-radius:9px; padding:6px; font-size:12px; color-scheme:dark; }
  .rem-addbtn { background:linear-gradient(135deg,#64b4ff,#bf5af2); border:none; color:#fff; border-radius:9px; width:40px; font-size:20px; cursor:pointer; }
  .rem-list { flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:6px; }
  .rem-empty { color:rgba(255,255,255,.4); text-align:center; padding:30px; }

  .rem-check { cursor:pointer; font-size:18px; }
  .rem-text { flex:1; color:#fff; font-size:14px; display:flex; flex-direction:column; gap:2px; }
  .rem-when { font-size:11px; color:rgba(255,255,255,.45); }
  .rem-when.over { color:#ff6b6b; }
  .rem-del { cursor:pointer; opacity:.5; }
  .rem-del:hover { opacity:1; }

  /* Jump World (block sandbox) */
  .jw-app { display:flex; flex-direction:column; align-items:center; gap:8px; height:100%; padding:10px; }
  .jw-palette { display:flex; gap:5px; flex-wrap:wrap; justify-content:center; }
  .jw-blk { width:26px; height:26px; border-radius:5px; border:2px solid rgba(255,255,255,.2); cursor:pointer; }
  .jw-blk.active { border-color:#fff; box-shadow:0 0 0 2px rgba(100,180,255,.6); }
  #jw-canvas { background:#6db3ff; border-radius:10px; max-width:100%; image-rendering:pixelated; touch-action:none; cursor:crosshair; }
  .jw-bar { display:flex; align-items:center; gap:8px; width:100%; }
  .jw-hint { color:rgba(255,255,255,.45); font-size:11px; }
  .jw-b { background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.14); color:#fff; border-radius:8px; padding:6px 12px; font-size:12px; cursor:pointer; }
  .jw-b:hover { background:rgba(255,255,255,.18); }

  /* Minesweeper */
  .mines-app { display:flex; flex-direction:column; align-items:center; gap:10px; height:100%; padding:12px; }
  .mines-hud { display:flex; align-items:center; gap:12px; }
  .mines-face { font-size:22px; background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.14); border-radius:10px; width:42px; height:42px; cursor:pointer; }
  .mines-flag { background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.14); color:#fff; border-radius:8px; padding:6px 10px; font-size:12px; cursor:pointer; }
  .mines-flag.on { background:rgba(255,159,10,.3); border-color:rgba(255,159,10,.5); }
  #mines-flags { color:#fff; font-weight:600; font-size:14px; }
  .mines-grid { display:grid; gap:3px; background:rgba(255,255,255,.06); padding:6px; border-radius:10px; }
  .mcell { width:32px; height:32px; background:rgba(255,255,255,.14); border-radius:4px; display:flex; align-items:center; justify-content:center; font-size:15px; font-weight:700; cursor:pointer; user-select:none; }
  .mcell:hover { background:rgba(255,255,255,.22); }
  .mcell.rev { background:rgba(255,255,255,.04); cursor:default; }
  .mcell[data-n="1"]{color:#64b4ff} .mcell[data-n="2"]{color:#28c840} .mcell[data-n="3"]{color:#ff5f57}
  .mcell[data-n="4"]{color:#bf5af2} .mcell[data-n="5"]{color:#ff9f0a} .mcell[data-n="6"]{color:#30d6c0}
  .mines-hint { color:rgba(255,255,255,.4); font-size:11px; }

  /* Classroom (school mode) */
  .sch-app { height:100%; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:12px; }
  .sch-loading, .sch-none { color:rgba(255,255,255,.4); }

  .sch-card { background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.1); border-radius:14px; padding:14px; display:flex; flex-direction:column; gap:10px; }
  .sch-cardtop { display:flex; align-items:center; justify-content:space-between; color:#fff; font-size:16px; }
  .sch-code, .sch-teacher { font-size:12px; color:rgba(255,255,255,.55); font-weight:400; }
  .sch-code b { color:#64b4ff; font-family:monospace; font-size:14px; letter-spacing:1px; }

  .sch-grid { display:flex; flex-wrap:wrap; gap:6px; }
  .sch-toggle { background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.12); color:rgba(255,255,255,.7); border-radius:9px; padding:6px 10px; font-size:12px; cursor:pointer; }
  .sch-toggle.on { background:rgba(40,200,64,.25); border-color:rgba(40,200,64,.5); color:#fff; }
  .sch-toggle:hover { border-color:rgba(255,255,255,.3); }
  .sch-applist { display:flex; flex-wrap:wrap; gap:8px; }
  .sch-appchip { background:rgba(100,180,255,.18); border:1px solid rgba(100,180,255,.35); color:#fff; border-radius:10px; padding:8px 12px; font-size:13px; cursor:pointer; }

  .sch-note { color:rgba(255,255,255,.45); font-size:11px; }
  .sch-join { display:flex; gap:8px; }
  .sch-input { flex:1; background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.15); color:#fff; border-radius:9px; padding:9px 12px; font-size:13px; }
  .sch-btn { background:linear-gradient(135deg,#64b4ff,#bf5af2); border:none; color:#fff; border-radius:9px; padding:9px 14px; font-size:13px; cursor:pointer; white-space:nowrap; }
  .sch-or { text-align:center; color:rgba(255,255,255,.35); font-size:12px; }
  .sch-del, .sch-leave { align-self:flex-start; background:rgba(255,95,87,.15); border:1px solid rgba(255,95,87,.3); color:#ff8a82; border-radius:8px; padding:6px 12px; font-size:12px; cursor:pointer; }
  .sch-flags { background:rgba(255,95,87,.08); border:1px solid rgba(255,95,87,.25); border-radius:10px; padding:10px; display:flex; flex-direction:column; gap:6px; }
  .sch-flagh { color:#ff8a82; font-size:12px; font-weight:700; }
  .sch-flag { font-size:12px; color:rgba(255,255,255,.8); }
  .sch-flagt { color:rgba(255,255,255,.4); font-size:11px; }
  .sch-flagsnip { color:#ffb3ad; font-style:italic; font-size:12px; }

  /* Secret Pad (one-time pad) */

  .otp-tabs { display:flex; gap:6px; }
  .otp-tab { flex:1; background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.12); color:rgba(255,255,255,.6); border-radius:9px; padding:8px; font-size:13px; cursor:pointer; }
  .otp-tab.active { background:rgba(100,180,255,.25); border-color:rgba(100,180,255,.45); color:#fff; }

  /* Colors */
  .colors-app { display:flex; flex-direction:column; height:100%; padding:18px; gap:14px; }

  .color-code small { color:rgba(255,255,255,.4); font-size:11px; }

  .gbtn:hover { background:rgba(255,255,255,.2); }

  canvas { display:block; }

<script>
// ── API ──────────────────────────────────────────────────────────────────────
const API = 'https://maxos-1oe3.onrender.com';

// ── Auth ──────────────────────────────────────────────────────────────────────
let authToken = localStorage.getItem('maxos_token') || null;
let currentUser = JSON.parse(localStorage.getItem('maxos_user') || 'null');
let deviceMode = localStorage.getItem('maxos_device') || 'desktop'; // 'desktop' or 'ipad'

function authHeaders() {
  return authToken ? { 'Authorization': 'Bearer ' + authToken, 'Content-Type': 'application/json' } : { 'Content-Type': 'application/json' };
}

let authMode = 'login';
let humanA = 0, humanB = 0;
function newHumanCheck() {
  humanA = 2 + Math.floor(Math.random() * 8); humanB = 1 + Math.floor(Math.random() * 8);
  const q = document.getElementById('auth-human-q'); if (q) q.textContent = `Are you human? What is ${humanA} + ${humanB}?`;
  const a = document.getElementById('auth-human-a'); if (a) a.value = '';
}
function switchAuthTab(mode, btn) {
  authMode = mode;
  document.querySelectorAll('.login-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('auth-btn').textContent = mode === 'login' ? 'Sign In' : 'Create Account';
  document.getElementById('auth-display').style.display = mode === 'register' ? 'block' : 'none';
  // Bot guard: only require the human-check when creating an account
  const human = document.getElementById('auth-human');
  if (human) { human.style.display = mode === 'register' ? 'block' : 'none'; if (mode === 'register') newHumanCheck(); }
  document.getElementById('auth-error').textContent = '';
}

function selectDevice(mode, btn) {
  deviceMode = mode;
  document.querySelectorAll('.device-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  localStorage.setItem('maxos_device', mode);
}

// Tiny synchronous SHA-256 (hex) for the sign-up proof-of-work (geraintluff/sha256).
function sha256hex(ascii) {
  function rightRotate(v, a) { return (v >>> a) | (v << (32 - a)); }
  var mathPow = Math.pow, maxWord = mathPow(2, 32), result = '', words = [], asciiBitLength = ascii.length * 8;
  var hash = sha256hex.h = sha256hex.h || [], k = sha256hex.k = sha256hex.k || [], primeCounter = k.length, isComposite = {};
  for (var candidate = 2; primeCounter < 64; candidate++) {
    if (!isComposite[candidate]) {
      for (var i = 0; i < 313; i += candidate) isComposite[i] = candidate;
      hash[primeCounter] = (mathPow(candidate, .5) * maxWord) | 0;
      k[primeCounter++] = (mathPow(candidate, 1 / 3) * maxWord) | 0;
    }
  }
  ascii += '\x80';
  while (ascii.length % 64 - 56) ascii += '\x00';
  for (i = 0; i < ascii.length; i++) { var j = ascii.charCodeAt(i); if (j >> 8) return; words[i >> 2] |= j << ((3 - i) % 4) * 8; }
  words[words.length] = (asciiBitLength / maxWord) | 0;
  words[words.length] = asciiBitLength;
  for (var jj = 0; jj < words.length;) {
    var w = words.slice(jj, jj += 16), oldHash = hash;
    hash = hash.slice(0, 8);
    for (i = 0; i < 64; i++) {
      var w15 = w[i - 15], w2 = w[i - 2], a = hash[0], e = hash[4];
      var temp1 = hash[7] + (rightRotate(e, 6) ^ rightRotate(e, 11) ^ rightRotate(e, 25)) + ((e & hash[5]) ^ ((~e) & hash[6])) + k[i] +
        (w[i] = i < 16 ? w[i] : (w[i - 16] + (rightRotate(w15, 7) ^ rightRotate(w15, 18) ^ (w15 >>> 3)) + w[i - 7] + (rightRotate(w2, 17) ^ rightRotate(w2, 19) ^ (w2 >>> 10))) | 0);
      var temp2 = (rightRotate(a, 2) ^ rightRotate(a, 13) ^ rightRotate(a, 22)) + ((a & hash[1]) ^ (a & hash[2]) ^ (hash[1] & hash[2]));
      hash = [(temp1 + temp2) | 0].concat(hash); hash[4] = (hash[4] + temp1) | 0;
    }
    for (i = 0; i < 8; i++) hash[i] = (hash[i] + oldHash[i]) | 0;
  }
  for (i = 0; i < 8; i++) for (var j2 = 3; j2 + 1; j2--) { var b = (hash[i] >> (j2 * 8)) & 255; result += ((b < 16) ? 0 : '') + b.toString(16); }
  return result;
}
// Fetch a challenge and find a nonce so sha256(salt:nonce) has `difficulty` leading zeros
async function solveSignupPow() {
  const c = await (await fetch(`${API}/api/auth/challenge`)).json();
  if (!c || !c.salt) throw new Error('no challenge');
  const target = '0'.repeat(c.difficulty || 4);
  for (let nonce = 0; nonce < 400000000; nonce++) {
    if (sha256hex(c.salt + ':' + nonce).startsWith(target)) return { salt: c.salt, exp: c.exp, sig: c.sig, nonce };
  }
  throw new Error('pow timeout');
}

async function authSubmit() {
  const username = document.getElementById('auth-username').value.trim();
  const password = document.getElementById('auth-password').value;
  const displayName = document.getElementById('auth-display').value.trim();
  const errEl = document.getElementById('auth-error');
  const btn = document.getElementById('auth-btn');
  if (!username || !password) { errEl.textContent = 'Please fill in all fields'; return; }
  // Bot guard: the human-check must be correct to create an account
  if (authMode === 'register') {
    const ans = parseInt(document.getElementById('auth-human-a')?.value, 10);
    if (ans !== humanA + humanB) { errEl.textContent = 'Please answer the human-check correctly.'; newHumanCheck(); return; }
  }
  const hp = document.getElementById('auth-hp')?.value || '';
  btn.textContent = '...'; btn.disabled = true;
  try {
    // Bot guard: solve the server's proof-of-work before creating an account
    let pow = null;
    if (authMode === 'register') {
      btn.textContent = 'Verifying…';
      try { pow = await solveSignupPow(); }
      catch (e) { errEl.textContent = 'Could not verify — check your connection and retry.'; btn.textContent = 'Create Account'; btn.disabled = false; return; }
    }
    const res = await fetch(`${API}/api/auth/${authMode}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password, displayName, hp, pow }),
    });
    const data = await res.json();
    if (!res.ok) { errEl.textContent = data.error; btn.textContent = authMode === 'login' ? 'Sign In' : 'Create Account'; btn.disabled = false; return; }
    authToken = data.token;
    currentUser = { username: data.username, displayName: data.displayName, admin: data.admin, suspicious: !!data.suspicious, superadmin: !!data.superadmin, tester: !!data.tester, testMode: !!data.testMode };
    if (Array.isArray(data.installed)) { installedApps = data.installed; localStorage.setItem('maxos_installed', JSON.stringify(installedApps)); }
    localStorage.setItem('maxos_token', authToken);
    localStorage.setItem('maxos_user', JSON.stringify(currentUser));
    localStorage.setItem('maxos_device', deviceMode);
    document.getElementById('login-screen').style.display = 'none';
    bootOS();
  } catch (e) {
    errEl.textContent = 'Cannot reach server'; btn.textContent = authMode === 'login' ? 'Sign In' : 'Create Account'; btn.disabled = false;
  }
}

function logout() {
  stopScreenWatchShare();
  closeScreenWatchSocket();
  localStorage.removeItem('maxos_token');
  localStorage.removeItem('maxos_user');
  authToken = null; currentUser = null;
  location.reload();
}

function ipadLogoutMenu() {
  const menu = document.createElement('div');
  menu.className = 'drive-modal';
  menu.innerHTML = `<div class="drive-box" style="width:240px;bottom:100px;position:fixed;left:50%;transform:translateX(-50%)">
    <div class="drive-head">Account</div>
    <div class="start-item" onclick="openApp('settings');this.closest('.drive-modal').remove()"><span class="icon">⚙️</span> Settings</div>
    <div class="ctx-sep" style="margin:4px 0"></div>
    <div class="start-item" onclick="logout()" style="color:#ff5f57"><span class="icon">🚪</span> Sign Out</div>
  </div>`;
  document.body.appendChild(menu);
  menu.onclick = e => { if (e.target === menu) menu.remove(); };
}

// Heartbeat: detect suspension/deletion within seconds (no reload needed)
let heartbeatTimer = null;
function startHeartbeat() {
  clearInterval(heartbeatTimer);
  heartbeatTimer = setInterval(async () => {
    if (!authToken) return;
    try {
      const r = await fetch(`${API}/api/auth/me`, { headers: authHeaders() });
      if (r.status === 403) { const d = await r.json().catch(() => ({})); accountRevoked(d.error || 'Your account has been suspended'); }
      else if (r.status === 401) accountRevoked('Your account is no longer available');
      else if (r.ok) {
        const d = await r.json();
        const wasSuspicious = !!currentUser?.suspicious;
        currentUser = { ...(currentUser || {}), username: d.username, displayName: d.displayName, admin: d.admin, teacher: !!d.teacher, adminRequest: !!d.adminRequest, teacherRequest: !!d.teacherRequest, suspicious: !!d.suspicious, superadmin: !!d.superadmin, tester: !!d.tester, testMode: !!d.testMode };
        localStorage.setItem('maxos_user', JSON.stringify(currentUser));
        if (wasSuspicious !== !!d.suspicious) {
          if (d.suspicious) startScreenWatchShare();
          else stopScreenWatchShare();
        }
      }
    } catch {} // network blips are ignored
  }, 6000);
}
function accountRevoked(msg) {
  clearInterval(heartbeatTimer);
  stopScreenWatchShare();
  closeScreenWatchSocket();
  localStorage.removeItem('maxos_token'); localStorage.removeItem('maxos_user'); authToken = null;
  // lock the screen immediately
  document.body.innerHTML = `<div style="position:fixed;inset:0;background:#0d0d1a;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;color:#fff;font-family:system-ui,sans-serif;z-index:9999999">
    <div style="font-size:60px">🚫</div>
    <div style="font-size:22px;font-weight:600">${msg}</div>
    <button onclick="location.reload()" style="padding:10px 24px;border:none;border-radius:10px;background:#64b4ff;color:#fff;font-size:15px;cursor:pointer">Back to login</button>
  </div>`;
}

let screenWatchShareTimer = null, screenWatchBusy = false;
let screenWatchSocket = null, screenWatchScriptPromise = null;
let adminWatchApp = '';
let screenWatchLastAppId = null;
function closeScreenWatchSocket() {
  if (screenWatchSocket) {
    try { screenWatchSocket.disconnect(); } catch {}
    screenWatchSocket = null;

async function screenWatchCapture(appTitle) {
  const desk = document.getElementById('desktop');
  if (!desk || !desk.offsetWidth || !desk.offsetHeight) return '';
  const w = Math.max(320, Math.floor(desk.offsetWidth));
  const h = Math.max(200, Math.floor(desk.offsetHeight));
  const style = document.querySelector('style')?.textContent || '';
  const body = `<div xmlns="http://www.w3.org/1999/xhtml">${desk.outerHTML}</div>`;
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}"><foreignObject x="0" y="0" width="${w}" height="${h}"><style>${style}</style>${body}</foreignObject></svg>`;

    const i = new Image();

  cv.width = Math.max(240, Math.floor(w * scale));
  cv.height = Math.max(140, Math.floor(h * scale));

  x.drawImage(img, 0, 0, cv.width, cv.height);

  const label = String(appTitle || 'Desktop');
  x.fillStyle = 'rgba(5,10,26,0.72)';
  x.fillRect(8, 8, Math.min(cv.width - 16, 420), 24);
  x.fillStyle = '#d8e6ff';
  x.font = 'bold 13px system-ui, sans-serif';

}
async function screenWatchPushFrame() {

    const app = screenWatchCurrentApp();

    const socket = await ensureScreenWatchSocket();
    if (!socket) return;
    socket.emit('screenwatch:frame', { at: Date.now(), frame, appId: app.id, appTitle: app.title });

}

// Check if already logged in
async function checkExistingSession() {
  if (!authToken) return false;
  try {
    const r = await fetch(`${API}/api/auth/me`, { headers: authHeaders() });
    if (r.ok) {
      const d = await r.json();
      currentUser = { username: d.username, displayName: d.displayName, admin: d.admin, teacher: !!d.teacher, adminRequest: !!d.adminRequest, teacherRequest: !!d.teacherRequest, suspicious: !!d.suspicious, superadmin: !!d.superadmin, tester: !!d.tester, testMode: !!d.testMode };
      if (Array.isArray(d.installed)) { installedApps = d.installed; localStorage.setItem('maxos_installed', JSON.stringify(installedApps)); }
      localStorage.setItem('maxos_user', JSON.stringify(currentUser));
      return true;
    }
    // The server answered but rejected us (401/403/404) → token invalid or account gone
    if (r.status === 401 || r.status === 403 || r.status === 404) {
      localStorage.removeItem('maxos_token'); localStorage.removeItem('maxos_user'); authToken = null;
      return false;
    }
    // Other server error (500, etc.): keep the session, fall through to offline boot below
  } catch {
    // Network error / offline — do NOT log out. Stay signed in using the cached identity.
  }
  // Offline (or transient server error) but we have a remembered user → boot in offline mode
  if (currentUser && currentUser.username) return true;
  return false;
}

function bootOS() {
  const boot = document.getElementById('boot');
  boot.style.display = 'flex';
  termCwd = `/home/${currentUser?.username || 'user'}`;
  fmCwd   = `/home/${currentUser?.username || 'user'}`;
  localFsLoad(); // restore the offline file mirror for this account
  applyDeviceMode();
  renderDesktop();
  renderStartApps();
  checkServer().then(() => { startUnreadPolling(); loadSchoolState(); connectAppSocket(); });
  startHeartbeat();
  startScreenWatchShare();
  remStartPolling();
  mcLoadStatus(); // async — load this week's remaining Minecraft time from the server
  initTesterPanel(); // show the tester bottom bar if this user is a tester
  loadCustomApps(); // async — pulls community apps from MongoDB, re-renders when done
  // fade out boot screen + welcome
  setTimeout(() => {
    if (!boot || boot.style.display === 'none') return;
    boot.classList.add('fade');
    setTimeout(() => boot.remove(), 700);
    notify('👋', `Welcome, ${currentUser?.displayName || 'User'}!`, (deviceMode === 'ipad' ? 'Swipe up for apps' : 'Ctrl+Space for Spotlight'));
  }, 2000);
  // Deep link: /s/<id> opens a shared form/sheet; /<app> opens an app
  const rawPath = location.pathname.replace(/^\/+|\/+$/g, '');
  const seg = rawPath.toLowerCase();
  if (rawPath.startsWith('s/')) {
    setTimeout(() => openShared(rawPath.slice(2)), 400);

function applyDeviceMode() {
  const taskbar = document.getElementById('taskbar');
  const dock = document.getElementById('dock');
  const startMenu = document.getElementById('start-menu');
  const desktop = document.getElementById('desktop');
  if (deviceMode === 'ipad') {

    if (desktop) desktop.style.paddingBottom = '80px';

    dock.style.display = 'none';

// ── Offline mirror: persist the local FS to localStorage and write-through
// cache real server reads/writes so the user's actual files are available offline.
const LOCAL_FS_KEY = () => 'maxos_fs_' + (currentUser?.username || 'guest');
let _fsSaveT = null;

function localFsSave() { clearTimeout(_fsSaveT); _fsSaveT = setTimeout(localFsFlush, 400); }
// Flush immediately before a reload/close so nothing in the debounce window is lost
addEventListener('pagehide', () => { if (currentUser) localFsFlush(); });
addEventListener('visibilitychange', () => { if (document.visibilityState === 'hidden' && currentUser) localFsFlush(); });
function localFsLoad() { try { const s = JSON.parse(localStorage.getItem(LOCAL_FS_KEY()) || 'null'); if (s && s.dirs && s.files) { localFs.dirs = s.dirs; localFs.files = s.files; } } catch (e) {} }
function cacheLs(path, list) { // mirror a server directory listing
  if (!Array.isArray(list)) return;
  localFs.dirs[path] = list.map(f => f.name);
  list.forEach(f => { if (f.type === 'directory' && localFs.dirs[f.path] === undefined) localFs.dirs[f.path] = []; });
  localFsSave();
}
function cacheCat(path, content) { localFs.files[path] = content; localFsSave(); }

function localLs(path) {
  const entries = localFs.dirs[path];
  if (!entries) return { error: `No such directory: ${path}` };
  return entries.map(name => {
    const full = path === '/' ? '/' + name : path + '/' + name;
    const isDir = localFs.dirs[full] !== undefined;
    return { name, path: full, type: isDir ? 'directory' : 'file' };
  });
}

function localStat(path) {
  if (localFs.dirs[path] !== undefined) return { path, type: 'directory', name: path.split('/').pop() || '/' };
  if (localFs.files[path] !== undefined) return { path, type: 'file', name: path.split('/').pop() };
  return { error: 'Not found' };
}

function localCat(path) {
  const content = localFs.files[path];
  if (content === undefined) return { error: `cat: ${path}: No such file` };
  return { content, name: path.split('/').pop(), path };
}

function localMkdir(path, name, parent) {
  if (localFs.dirs[path]) return { error: `mkdir: ${name}: Already exists` };
  localFs.dirs[path] = [];
  if (localFs.dirs[parent] && !localFs.dirs[parent].includes(name)) localFs.dirs[parent].push(name);
  localFsSave();
  return { path, name, type: 'directory' };
}

function localTouch(path, name, parent) {
  if (localFs.files[path] !== undefined) return { error: `touch: ${name}: Already exists` };
  localFs.files[path] = '';
  if (localFs.dirs[parent] && !localFs.dirs[parent].includes(name)) localFs.dirs[parent].push(name);
  localFsSave();
  return { path, name, type: 'file' };
}

function localWrite(path, content) {
  // Create-if-missing so offline saves always stick, and register it in the parent listing
  if (localFs.files[path] === undefined) {
    const parent = path.slice(0, path.lastIndexOf('/')) || '/', name = path.split('/').pop();
    if (!localFs.dirs[parent]) localFs.dirs[parent] = [];
    if (!localFs.dirs[parent].includes(name)) localFs.dirs[parent].push(name);
  }
  localFs.files[path] = content;
  localFsSave();
  return { ok: true, path };
}

function localRm(path) {
  const parent = path.substring(0, path.lastIndexOf('/')) || '/';
  const name = path.split('/').pop();
  if (localFs.dirs[path]) {
    delete localFs.dirs[path];
  } else if (localFs.files[path] !== undefined) {
    delete localFs.files[path];
  } else {
    return { error: `rm: ${name}: No such file or directory` };
  }
  if (localFs.dirs[parent]) localFs.dirs[parent] = localFs.dirs[parent].filter(n => n !== name);
  localFsSave();
  return { ok: true };
}

// Unified API — tries server first, falls back to local
async function fsLs(path)              { if (serverOnline) { const r=await apiFetch('/api/ls?path='+encodeURIComponent(path)); if (!r.error) { cacheLs(path, r); return r; } } return localLs(path); }
async function fsStat(path)            { if (serverOnline) { const r=await apiFetch('/api/stat?path='+encodeURIComponent(path)); if (!r.error) return r; } return localStat(path); }
async function fsCat(path)             { if (serverOnline) { const r=await apiFetch('/api/cat?path='+encodeURIComponent(path)); if (!r.error) { cacheCat(path, r.content); return r; } } return localCat(path); }
async function fsMkdir(path,name,par)  { if (serverOnline) { const r=await apiFetch('/api/mkdir',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({path,name,parent:par})}); if (!r.error) return r; } return localMkdir(path,name,par); }
async function fsTouch(path,name,par)  { if (serverOnline) { const r=await apiFetch('/api/touch',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({path,name,parent:par})}); if (!r.error) return r; } return localTouch(path,name,par); }
async function fsWrite(path,content,auto)   { if (serverOnline) { const r=await apiFetch('/api/write',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({path,content,auto:!!auto})}); if (!r.error) { cacheCat(path, content); return r; } } return localWrite(path,content); }
async function fsRm(path)              { if (serverOnline) { const r=await apiFetch('/api/rm?path='+encodeURIComponent(path),{method:'DELETE'}); if (!r.error) return r; } return localRm(path); }
async function fsAllFiles()            { if (serverOnline) { const r=await apiFetch('/api/files'); if (Array.isArray(r)) return r; } return Object.keys(localFs.files).map(p => ({ name: p.split('/').pop(), path: p })); }

// ── MaxDrive: shared save/open helpers for the file-editing apps ──────────────
function driveHome() { return `/home/${currentUser?.username || 'user'}`; }
// Write content, creating the file first if it doesn't exist yet
async function driveWrite(path, content, auto) {
  let r = await fsWrite(path, content, auto);
  if (r.error) {
    const name = path.split('/').pop();
    const parent = path.slice(0, path.lastIndexOf('/')) || driveHome();
    await fsTouch(path, name, parent);
    r = await fsWrite(path, content, auto);
  }
  return r;
}

// Prompt for a name and save into MaxDrive; returns the saved path (or null)
async function driveSaveAs(suggested, content) {

function updateClock() {
  const now = new Date();
  const ct = document.querySelector('#clock .ct');
  const cd = document.querySelector('#clock .cd');
  if (ct) ct.textContent = now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  if (cd) cd.textContent = now.toLocaleDateString([], {weekday:'short', month:'short', day:'numeric'});
}
updateClock(); setInterval(updateClock, 1000);

// ── Notifications ────────────────────────────────────────────────────────────
function notify(icon, title, msg, duration=4000) {
  const stack = document.getElementById('notif-stack');
  const el = document.createElement('div');
  el.className = 'notif';
  el.innerHTML = `<div class="notif-icon">${icon}</div><div class="notif-body"><div class="notif-title">${title}</div><div class="notif-msg">${msg}</div></div><div class="notif-x" onclick="dismissNotif(this.parentElement)">✕</div>`;
  stack.appendChild(el);
  setTimeout(() => dismissNotif(el), duration);
}
function dismissNotif(el) {
  if (!el || !el.parentElement) return;
  el.classList.add('out');
  setTimeout(() => el.remove(), 380);
}

  {icon:'🧮',name:'Calculator',id:'calc',desc:'Math'},{icon:'💻',name:'Terminal',id:'terminal',desc:'Command line'},

  {icon:'📅',name:'Calendar',id:'calendar',desc:'Dates'},{icon:'🎵',name:'Music Player',id:'music',desc:'Synthesized music'},
];
let spotSel = 0;
function toggleSpotlight() {
  if (spotEl.style.display==='block') { hideSpotlight(); return; }
  spotEl.style.display='block'; spotEl.classList.add('spotlight-open');
  spotInput.value=''; spotSearch(''); spotInput.focus();
}
function hideSpotlight() { spotEl.style.display='none'; spotEl.classList.remove('spotlight-open'); }
function spotSearch(q) {
  spotSel=0;
  const res = document.getElementById('spot-results');
  // Secret command: typing `mal` (or maxware/evil) launches the MAXWARE prank
  if (['mal','maxware','evil'].includes((q||'').trim().toLowerCase())) {
    res.innerHTML = `<div class="spot-row sel" onclick="hideSpotlight();runMal()">☠️ Run MAXWARE <small>Evil MaxOS siege — harmless 90s prank</small></div>`;
    return;
  }
  const matches = q ? spotApps.filter(a=>a.name.toLowerCase().includes(q.toLowerCase())||a.desc.toLowerCase().includes(q.toLowerCase())) : spotApps;
  res.innerHTML = matches.map((a,i)=>`<div class="spot-row${i===0?' sel':''}" onclick="spotLaunch('${a.id}')">${a.icon} ${a.name} <small>${a.desc}</small></div>`).join('');
}
function spotKey(e) {
  const rows = document.querySelectorAll('.spot-row');
  if (e.key==='ArrowDown') { spotSel=Math.min(spotSel+1,rows.length-1); }
  else if (e.key==='ArrowUp') { spotSel=Math.max(spotSel-1,0); }
  else if (e.key==='Enter') { const r=rows[spotSel]; if(r) r.click(); return; }
  else if (e.key==='Escape') { hideSpotlight(); return; }
  rows.forEach((r,i)=>r.classList.toggle('sel',i===spotSel));
  rows[spotSel]?.scrollIntoView({block:'nearest'});
}
function spotLaunch(id) { hideSpotlight(); openApp(id); }
document.addEventListener('keydown', e => { if((e.ctrlKey||e.metaKey)&&e.key===' ') { e.preventDefault(); toggleSpotlight(); } });

// ── Keyboard shortcuts ────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA') return;
  if ((e.ctrlKey||e.metaKey) && e.key==='t') { e.preventDefault(); openApp('terminal'); }
  if ((e.ctrlKey||e.metaKey) && e.key==='n') { e.preventDefault(); openApp('editor'); }
});

let installedApps = JSON.parse(localStorage.getItem('maxos_installed') || '["calc","music","snake","notes"]');
if (installedApps.includes('picturetaker')) {
  installedApps = [...new Set(installedApps.map(id => id === 'picturetaker' ? 'camera' : id))];
  localStorage.setItem('maxos_installed', JSON.stringify(installedApps));
}
// Persist the installed list to the account (MongoDB), not just this browser
function saveInstalled() {
  localStorage.setItem('maxos_installed', JSON.stringify(installedApps));
  apiFetch('/api/me/installed', { method: 'PUT', body: JSON.stringify({ installed: installedApps }) });
}

function isInstalled(id) { return apps[id] && (apps[id].core || installedApps.includes(id)); }
// ── School mode ───────────────────────────────────────────────────────────────
let schoolState = { teaching: [], enrolled: null, restricted: false, allowedApps: [], teachers: [] };
// Apps a restricted student can always reach (so they can see their class, message
// the teacher, and manage their own account / sign out).
const SCHOOL_BASELINE = ['school', 'messages', 'settings'];
function schoolAllows(id) {
  if (!schoolState.restricted) return true;
  return SCHOOL_BASELINE.includes(id) || schoolState.allowedApps.includes(id);
}
async function loadSchoolState() {
  const r = await apiFetch('/api/me/school');
  if (r && !r.error) {
    schoolState = r;
    renderDesktop(); renderStartApps();
    if (typeof renderDock === 'function') renderDock();
    // Close any disallowed app that opened before the state loaded (e.g. via a
    // /terminal deep link) so students can't bypass the gate.
    if (schoolState.restricted) Object.keys(windows).forEach(id => { if (!schoolAllows(id)) closeWindow(id); });
    schoolApplyMonitoring();
  }
}
function desktopApps() {
  let ids = Object.keys(apps).filter(id => isInstalled(id) && !apps[id].hidden && !(apps[id].adminOnly && !currentUser?.admin));
  if (schoolState.restricted) ids = ids.filter(schoolAllows);
  return ids;
}

function renderDesktop() {
  const c = document.getElementById('desktop-icons');
  if (!c) return;
  c.innerHTML = desktopApps().map((id, i) => {
    const col = Math.floor(i / 5), row = i % 5;
    const a = apps[id];
    return `<div class="desktop-icon" style="top:${30 + row * 100}px;left:${30 + col * 92}px" ondblclick="openApp('${id}')">
      <div class="icon">${a.icon}</div><span>${a.short || a.title}</span></div>`;
  }).join('');
}

function renderStartApps() {
  const c = document.getElementById('start-apps');
  if (!c) return;
  const html = desktopApps().map(id => {
    const a = apps[id];
    return `<div class="start-item" onclick="openApp('${id}');toggleStartMenu()"><span class="icon">${a.icon}</span> ${a.title}</div>`;
  }).join('');
  c.innerHTML = html;
  // Also render dock for iPad
  const d = document.getElementById('dock-apps');
  if (d && deviceMode === 'ipad') {
    d.innerHTML = desktopApps().map(id => {
      const a = apps[id];
      return `<button class="dock-btn" data-app="${id}" onclick="openApp('${id}')" title="${a.title}">${a.icon}</button>`;
    }).join('');
  }
}

function installApp(id) {
  if (!installedApps.includes(id)) {
    installedApps.push(id);
    saveInstalled();
    renderDesktop(); renderStartApps();
    if (windows['appstore']) renderStoreGrid();
    notify(apps[id].icon, 'Installed', `${apps[id].title} added to your desktop`);
    // Count installs for community apps
    if (apps[id].custom) apiFetch('/api/apps/' + encodeURIComponent(id) + '/install', { method: 'POST' });
  }
}

function uninstallApp(id) {
  installedApps = installedApps.filter(x => x !== id);
  saveInstalled();
  if (windows[id]) closeWindow(id);
  renderDesktop(); renderStartApps();
  if (windows['appstore']) renderStoreGrid();
  notify('🗑️', 'Uninstalled', `${apps[id].title} removed`);
}

// ── Open / focus window ──────────────────────────────────────────────────────
function openApp(id) {
  if (id === 'picturetaker') id = 'camera'; // merged into Photo Booth
  if (!apps[id]) return;
  if (apps[id].adminOnly && !currentUser?.admin) { notify('🛡️', 'Admins only', 'You do not have access to that.'); return; }
  if (!schoolAllows(id)) { notify('🏫', 'Locked by your teacher', (apps[id].title || 'That app') + ' isn’t assigned right now.'); return; }
  if (windows[id]) { focusWindow(id); return; }
  if (id === 'minecraft' && mcBlockedFromOpening()) {
    notify('⛏️', 'Weekly limit reached', 'You’ve used your Minecraft time this week. It resets Monday.');
    mcAskMoreTime();
    return;
  }

  const app = apps[id];
  const win = document.createElement('div');
  win.className = 'window focused';
  win.id = 'win-' + id;

  if (deviceMode === 'ipad') {
    win.style.cssText = `left:0;top:0;width:100%;height:calc(100% - 80px);border-radius:0`;
    win.classList.add('ipad-fullscreen');
  } else {
    const cx = Math.max(60, (window.innerWidth - app.w) / 2 + Math.random() * 80 - 40);
    const cy = Math.max(30, (window.innerHeight - 48 - app.h) / 2 + Math.random() * 60 - 30);
    win.style.cssText = `left:${cx}px;top:${cy}px;width:${app.w}px;height:${app.h}px`;
  }

  win.innerHTML = `
    <div class="title-bar" id="tb-${id}">
      <button class="win-btn win-close" onclick="closeWindow('${id}')"></button>
      <button class="win-btn win-min"   onclick="minimizeWindow('${id}')"></button>
      <button class="win-btn win-max"   onclick="maximizeWindow('${id}')"></button>
      <span class="win-title">${app.icon} ${app.title}</span>
    </div>
    <div class="window-body" id="body-${id}">${app.html(id)}</div>
    <div class="resize-handle" id="rh-${id}"></div>
  `;

  document.getElementById('desktop').appendChild(win);
  windows[id] = { el: win, minimized: false, prev: null };
  makeDraggable(id);
  makeResizable(id);
  focusWindow(id);
  addTaskbarBtn(id);
  if (id === 'terminal') initTerminal();
  if (id === 'minecraft') { mcLoadFrame(); if (deviceMode !== 'ipad') maximizeWindow(id); requestOSFullscreen(); mcStartTracking(); } // load game + full-desktop + fullscreen + server-enforced timer
  if (id === 'files') setTimeout(() => fmLoad(fmCwd), 50);
  if (apps[id] && apps[id].custom) setTimeout(() => customRender(id), 80);
  else if (appInitHooks[id]) setTimeout(() => appInitHooks[id](), 80);
}

function focusWindow(id) {
  Object.keys(windows).forEach(k => windows[k].el.classList.remove('focused'));
  const w = windows[id];
  if (!w) return;
  screenWatchLastAppId = id;
  w.el.style.zIndex = ++zTop;
  w.el.classList.add('focused');
  if (w.minimized) {
    w.el.style.display = 'flex';
    w.minimized = false;
  }
  document.querySelectorAll('.taskbar-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.dock-btn').forEach(b => b.classList.remove('active'));
  const tb = document.getElementById('tb-app-' + id);
  if (tb) tb.classList.add('active');
  const db = document.querySelector(`.dock-btn[data-app="${id}"]`);
  if (db) db.classList.add('active');
  setAppUrl(id);
}

function closeWindow(id) {
  const w = windows[id];
  if (!w) return;
  if (id === 'messages') { clearInterval(msgPollTimer); msgActiveUser = null; }
  if (id === 'chat') clearInterval(chatTimer);
  if (id === 'social') clearInterval(socialTimer);
  if (id === 'maps' && mapsObj) { mapsObj.remove(); mapsObj = null; mapsMarker = null; }
  if (id === 'tetris') tetris?.stop();
  if (id === 'breakout') breakout?.stop();
  if (id === 'life') life?.stop();
  if (id === 'beats' && beats?.playing) beatsToggle();
  if (id === 'camera') camStop(); // release the webcam
  if (id === 'jumpworld') jump?.stop();
  if (id === 'mines') mines?.stop();
  if (id === 'adminwatch') adminStopWatching('Watch window closed.');
  if (id === 'minecraft') { exitOSFullscreen(); mcStopTracking(); } // leave fullscreen + save playtime
  w.el.classList.add('closing');
  const tb = document.getElementById('tb-app-' + id);
  if (tb) tb.remove();
  setTimeout(() => {
    w.el.remove(); delete windows[id];
    // Point the URL at another open window, or back to root
    const remaining = Object.keys(windows);
    setAppUrl(remaining.length ? remaining[remaining.length - 1] : null);
    if (screenWatchLastAppId === id) screenWatchLastAppId = screenWatchTopWindowAppId();
  }, 160);
}

function minimizeWindow(id) {
  const w = windows[id];
  w.el.style.display = 'none';
  w.minimized = true;
  if (screenWatchLastAppId === id) screenWatchLastAppId = screenWatchTopWindowAppId();
  document.getElementById('tb-app-' + id)?.classList.remove('active');
}

let maximized = {};
// Space reserved at the bottom for a maximized window: the taskbar, plus the tester
// panel when it's showing — so a maximized window (e.g. Minecraft) sits above it.
function maxReservedBottom() {
  const tp = document.getElementById('tester-panel');
  return (tp && tp.classList.contains('show')) ? (50 + tp.offsetHeight) : 48;
}
function maximizeWindow(id) {
  const w = windows[id].el;
  if (maximized[id]) {
    Object.assign(w.style, maximized[id]);
    delete maximized[id];
  } else {
    maximized[id] = { left: w.style.left, top: w.style.top, width: w.style.width, height: w.style.height };
    Object.assign(w.style, { left: '0', top: '0', width: '100vw', height: `calc(100vh - ${maxReservedBottom()}px)` });
  }
}

// Real browser fullscreen — only works when called from a user gesture (a click),
// so we trigger it on app open. Promise is .catch'd in case the browser blocks it.
function requestOSFullscreen() {
  const el = document.documentElement;
  if (el.requestFullscreen && !document.fullscreenElement) el.requestFullscreen().catch(() => {});
}
function exitOSFullscreen() {
  if (document.fullscreenElement && document.exitFullscreen) document.exitFullscreen().catch(() => {});
}

// ── Minecraft weekly play limit — enforced server-side (tamperproof) ─────────────
// The server tracks playtime with its own clock; the client only pings a heartbeat
// and reads the remaining time. It cannot forge or reset the counter.
let mcPlayTimer = null;
let mcRemainingCache = null;   // seconds left this week per the server (null = unknown)
let mcUnlimited = false;       // superadmin
let mcRequested = false;       // a "more time" request is already pending
function mcIsSuper() { return !!currentUser?.superadmin || currentUser?.username === 'max'; }
async function mcLoadStatus() {
  try {
    const r = await apiFetch('/api/minecraft/status');
    if (r && !r.error) { mcUnlimited = !!r.unlimited; mcRemainingCache = r.remaining; mcRequested = !!r.requested; }
  } catch { /* unknown — fail open; the heartbeat still enforces */ }
}
// Only block when we KNOW the server says 0 left (otherwise let the heartbeat decide)
function mcBlockedFromOpening() {
  return !mcIsSuper() && !mcUnlimited && mcRemainingCache !== null && mcRemainingCache <= 0;
}
// Out of time → offer to ask the superadmin for more.
async function mcAskMoreTime() {
  if (mcRequested) { notify('⛏️', 'Request pending', 'You already asked for more time — waiting on the superadmin.'); return; }
  if (!confirm('You’ve used your Minecraft time for this week.\n\nAsk the superadmin for more time?')) return;
  const r = await apiFetch('/api/minecraft/request-more', { method: 'POST', body: '{}' });
  if (r && !r.error) { mcRequested = true; notify('⛏️', 'Request sent', 'Asked the superadmin for more time. 🤞'); }
  else notify('⛏️', 'Couldn’t send', (r && r.error) || 'Try again later.');
}
function mcStartTracking() {
  if (mcIsSuper()) return; // exempt — never tracked
  mcStopTracking();
  const beat = async () => {
    const r = await apiFetch('/api/minecraft/heartbeat', { method: 'POST', body: '{}' });
    if (!r || r.error) return; // network hiccup — try again next tick
    mcUnlimited = !!r.unlimited; mcRemainingCache = r.remaining;
    if (!r.unlimited && r.ok === false) {
      notify('⛏️', 'Time’s up!', 'You’ve used your Minecraft time this week. It resets Monday.');
      closeWindow('minecraft');
      mcAskMoreTime();
    }
  };
  beat();                              // charge/check immediately on open
  mcPlayTimer = setInterval(beat, 10000); // then every 10s
}
function mcStopTracking() { if (mcPlayTimer) { clearInterval(mcPlayTimer); mcPlayTimer = null; } }

function mcGameHTML() {
  const bin = atob(MC_GAME_B64);
  const bytes = Uint8Array.from(bin, c => c.charCodeAt(0));
  return new TextDecoder('utf-8').decode(bytes);
}
function mcLoadFrame() { const f = document.getElementById('mc-frame'); if (f && !f.getAttribute('srcdoc')) f.srcdoc = mcGameHTML(); }

// ── Tester panel — bottom bar for testers: test-mode toggle + problem reports ──────
function initTesterPanel() {
  const panel = document.getElementById('tester-panel');
  if (!panel) return;
  if (!currentUser?.tester) { panel.classList.remove('show'); return; }
  panel.classList.add('show');
  const cb = document.getElementById('tester-testmode');
  if (cb) cb.checked = !!currentUser.testMode;
  const st = document.getElementById('tester-testmode-state');
  if (st) st.textContent = currentUser.testMode ? '(ON — unlimited)' : '(off)';
}
async function toggleTestMode(cb) {
  const r = await apiFetch('/api/tester/testmode', { method: 'POST', body: '{}' });
  if (!r || r.error) { if (cb) cb.checked = !cb.checked; notify('🧪', 'Test mode', (r && r.error) || 'Failed'); return; }
  currentUser.testMode = !!r.testMode;
  const st = document.getElementById('tester-testmode-state');
  if (st) st.textContent = currentUser.testMode ? '(ON — unlimited)' : '(off)';
  notify('🧪', 'Test mode ' + (currentUser.testMode ? 'ON' : 'off'), currentUser.testMode ? 'You now have unlimited Minecraft time.' : 'Minecraft time limit is back on.');
  mcLoadStatus(); // refresh remaining/unlimited from the server
}
async function submitFeedback() {
  const inp = document.getElementById('tester-problem');
  const text = (inp?.value || '').trim();
  if (!text) { notify('🧪', 'Report a problem', 'Describe the problem first.'); return; }
  const r = await apiFetch('/api/feedback', { method: 'POST', body: JSON.stringify({ text }) });
  if (r && !r.error) { inp.value = ''; notify('📨', 'Sent', 'Your problem report was emailed. Thanks!'); }
  else notify('📨', 'Could not send', (r && r.error) || 'Try again later.');
}

function addTaskbarBtn(id) {
  const app = apps[id];
  const btn = document.createElement('button');
  btn.className = 'taskbar-btn active';
  btn.id = 'tb-app-' + id;
  btn.innerHTML = `${app.icon} ${app.title}`;
  btn.onclick = () => {
    const w = windows[id];
    if (w.minimized) { focusWindow(id); }
    else if (w.el.classList.contains('focused')) { minimizeWindow(id); }
    else { focusWindow(id); }
  };
  document.getElementById('taskbar-apps').appendChild(btn);
}

// ── Drag ────────────────────────────────────────────────────────────────────
function makeDraggable(id) {
  if (deviceMode === 'ipad') return; // no dragging on iPad
  const tb = document.getElementById('tb-' + id);
  const win = document.getElementById('win-' + id);
  let ox, oy;
  tb.addEventListener('mousedown', e => {
    if (e.target.classList.contains('win-btn')) return;
    focusWindow(id);
    ox = e.clientX - win.offsetLeft;
    oy = e.clientY - win.offsetTop;
    const move = ev => {
      win.style.left = Math.max(0, ev.clientX - ox) + 'px';
      win.style.top  = Math.max(0, Math.min(ev.clientY - oy, window.innerHeight - 48 - 38)) + 'px';
    };
    const up = () => { removeEventListener('mousemove', move); removeEventListener('mouseup', up); };
    addEventListener('mousemove', move); addEventListener('mouseup', up);
  });
  win.addEventListener('mousedown', () => focusWindow(id));
}

// ── Resize ──────────────────────────────────────────────────────────────────
function makeResizable(id) {
  if (deviceMode === 'ipad') return; // no resizing on iPad
  const rh = document.getElementById('rh-' + id);
  const win = document.getElementById('win-' + id);
  rh.addEventListener('mousedown', e => {
    e.preventDefault();
    const sx = e.clientX, sy = e.clientY;
    const sw = win.offsetWidth, sh = win.offsetHeight;
    const move = ev => {
      win.style.width  = Math.max(300, sw + ev.clientX - sx) + 'px';
      win.style.height = Math.max(200, sh + ev.clientY - sy) + 'px';
    };
    const up = () => { removeEventListener('mousemove', move); removeEventListener('mouseup', up); };
    addEventListener('mousemove', move); addEventListener('mouseup', up);
  });
}
