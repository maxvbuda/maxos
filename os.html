// ══ MAX SHEETS — spreadsheet with formulas ════════════════════════════════════
const SHEET_COLS = 12, SHEET_ROWS = 30;
let sheetData = {}, sheetPath = null;
function buildSheets() {
  return `<div class="gapp">
    <div class="gapp-head"><span class="gicon">📊</span><input class="gname" id="sheets-name" value="Untitled Sheet"></div>
    <div class="gbar">
      <button class="gbtn2" onclick="sheetsOpen()">📂 Open</button>
      <button class="gbtn2 green" onclick="sheetsSave()">💾 Save</button>
      <button class="gbtn2" onclick="sheetsShare()">🔗 Share</button>
      <button class="gbtn2" onclick="sheetsAddRow()">＋ Row</button>
      <span style="color:#5f6368;font-size:12px;margin-left:6px">Type =A1+B1 or =SUM(A1:A5) for formulas</span>
    </div>
    <div class="sheets-wrap"><table class="sheet" id="sheet-table"></table></div>
  </div>`;
}
function initSheets() { sheetData = {}; sheetPath = null; sharedSheetId = null; sheetRows = SHEET_ROWS; sheetRender(); }
let sheetRows = SHEET_ROWS;
function colLabel(i) { return String.fromCharCode(65 + i); }
function sheetRender() {
  const t = document.getElementById('sheet-table'); if (!t) return;
  let html = '<tr><th class="rownum"></th>';
  for (let c = 0; c < SHEET_COLS; c++) html += `<th>${colLabel(c)}</th>`;
  html += '</tr>';
  for (let r = 1; r <= sheetRows; r++) {
    html += `<tr><td class="rownum">${r}</td>`;
    for (let c = 0; c < SHEET_COLS; c++) {
      const ref = colLabel(c) + r, raw = sheetData[ref] || '';
      const val = raw.startsWith('=') ? sheetEval(raw) : raw;
      html += `<td><input data-ref="${ref}" value="${String(val).replace(/"/g, '&quot;')}" onfocus="sheetFocus(this)" onblur="sheetBlur(this)" onkeydown="sheetKey(event,this)"></td>`;
    }
    html += '</tr>';
  }
  t.innerHTML = html;
}
function sheetFocus(el) { el.value = sheetData[el.dataset.ref] || ''; } // show raw formula
function sheetBlur(el) {
  const ref = el.dataset.ref, v = el.value;
  if (v === '') delete sheetData[ref]; else sheetData[ref] = v;
  sheetRender(); // recompute everything
}
function sheetKey(e, el) { if (e.key === 'Enter') { e.preventDefault(); el.blur(); } }
let sheetDepth = 0;
function sheetCellVal(ref) { const raw = sheetData[ref]; if (raw == null || raw === '') return 0; if (raw.startsWith('=')) { const v = sheetEval(raw); return isNaN(parseFloat(v)) ? 0 : parseFloat(v); } return isNaN(parseFloat(raw)) ? raw : parseFloat(raw); }
function sheetEval(formula) {
  if (sheetDepth > 30) return '#LOOP';
  sheetDepth++;
  try {
    let expr = formula.slice(1);
    // SUM(A1:B3)
    expr = expr.replace(/SUM\(([A-Z]\d+):([A-Z]\d+)\)/gi, (m, a, b) => {
      const c1 = a.charCodeAt(0) - 65, r1 = +a.slice(1), c2 = b.charCodeAt(0) - 65, r2 = +b.slice(1);
      let sum = 0;
      for (let c = Math.min(c1, c2); c <= Math.max(c1, c2); c++) for (let r = Math.min(r1, r2); r <= Math.max(r1, r2); r++) sum += parseFloat(sheetCellVal(colLabel(c) + r)) || 0;
      return sum;
    });
    expr = expr.replace(/([A-Z]\d+)/g, (m) => { const v = sheetCellVal(m); return typeof v === 'number' ? v : JSON.stringify(v); });
    const res = Function('"use strict";return (' + expr + ')')();
    return res;
  } catch { return '#ERR'; }
  finally { sheetDepth--; }
}
function sheetAddRow() { sheetRows += 5; sheetRender(); }
function sheetsSetCsv(csv) {
  sheetData = {};
  (csv || '').split('\n').forEach((line, r) => { line.split(',').forEach((cell, c) => { if (cell !== '' && c < SHEET_COLS) sheetData[colLabel(c) + (r + 1)] = cell; }); });
  sheetRows = Math.max(SHEET_ROWS, (csv || '').split('\n').length + 2);
  sheetRender();
}
async function sheetsOpenPath(path, name) {
  const res = await fsCat(path); if (res.error) return;
  sheetPath = path; document.getElementById('sheets-name').value = name.replace(/\.(sheet|csv|maxsheet)$/, '');
  sheetsSetCsv(res.content);
}
function sheetsToCsv() {
  let maxR = 0, maxC = 0;
  Object.keys(sheetData).forEach(ref => { const c = ref.charCodeAt(0) - 65, r = +ref.slice(1); if (r > maxR) maxR = r; if (c > maxC) maxC = c; });
  const lines = [];
  for (let r = 1; r <= maxR; r++) { const row = []; for (let c = 0; c <= maxC; c++) row.push(sheetData[colLabel(c) + r] || ''); lines.push(row.join(',')); }
  return lines.join('\n');
}
async function sheetsSave() {
  const name = document.getElementById('sheets-name').value || 'Untitled Sheet';
  if (!sheetPath) {
    const p = await driveSaveAs(name + '.sheet', sheetsToCsv());
    if (p) { sheetPath = p; document.getElementById('sheets-name').value = p.split('/').pop().replace(/\.(sheet|csv|maxsheet)$/i, ''); }
    return;
  }
  await driveWrite(sheetPath, sheetsToCsv()); notify('📊', 'Saved', name + ' saved to MaxDrive');
}
async function sheetsOpen() { const picked = await drivePick(['sheet', 'csv', 'maxsheet']); if (picked) sheetsOpenPath(picked.path, picked.name); }

// ══ MAX FORMS — form builder ══════════════════════════════════════════════════
let formDef = { title: 'Untitled Form', questions: [] }, formPath = null, formFillMode = false;
function buildForms() {
  return `<div class="gapp">
    <div class="gapp-head"><span class="gicon">📋</span><input class="gname" id="forms-name" value="Untitled Form"></div>
    <div class="gbar">
      <button class="gbtn2" onclick="formsOpen()">📂 Open</button>
      <button class="gbtn2 purple" onclick="formsSave()">💾 Save</button>
      <button class="gbtn2" onclick="formsShare()">🔗 Share</button>
      <button class="gbtn2" onclick="formsResponses()">📊 Responses</button>
      <button class="gbtn2" onclick="formsAdd('short')">＋ Question</button>
      <button class="gbtn2" id="forms-toggle" onclick="formsToggleFill()">👁 Preview</button>
    </div>
    <div class="forms-body" id="forms-body"></div>
  </div>`;
}
function initForms() { formDef = { title: 'Untitled Form', questions: [{ q: 'Untitled Question', type: 'short', options: [] }] }; formPath = null; formFillMode = false; formSharedId = null; formRespondMode = false; formsRender(); }
function formsRender() {
  const body = document.getElementById('forms-body'); if (!body) return;
  document.getElementById('forms-toggle').textContent = formFillMode ? '✏️ Edit' : '👁 Preview';
  if (formFillMode) { formsRenderFill(body); return; }
  body.innerHTML = `<div class="form-card"><input class="form-title-input" value="${formDef.title.replace(/"/g, '&quot;')}" oninput="formDef.title=this.value;document.getElementById('forms-name').value=this.value"></div>`
    + formDef.questions.map((q, i) => `<div class="form-q">
      <input class="q-text" value="${q.q.replace(/"/g, '&quot;')}" placeholder="Question" oninput="formDef.questions[${i}].q=this.value">
      ${['short', 'paragraph'].includes(q.type) ? '' : q.options.map((o, oi) => `<div class="q-opt">${q.type === 'checkbox' ? '☐' : '○'}<input class="opt-text" value="${o.replace(/"/g, '&quot;')}" oninput="formDef.questions[${i}].options[${oi}]=this.value"><span style="cursor:pointer;color:#999" onclick="formsDelOpt(${i},${oi})">✕</span></div>`).join('') + `<div class="q-opt" style="color:#1a73e8;cursor:pointer" onclick="formsAddOpt(${i})">＋ Add option</div>`}
      <div class="q-foot">
        <select onchange="formsType(${i},this.value)">
          <option value="short"${q.type === 'short' ? ' selected' : ''}>Short answer</option>
          <option value="paragraph"${q.type === 'paragraph' ? ' selected' : ''}>Paragraph</option>
          <option value="choice"${q.type === 'choice' ? ' selected' : ''}>Multiple choice</option>
          <option value="checkbox"${q.type === 'checkbox' ? ' selected' : ''}>Checkboxes</option>
          <option value="dropdown"${q.type === 'dropdown' ? ' selected' : ''}>Dropdown</option>
        </select>
        <span class="q-del" onclick="formsDel(${i})">🗑 Delete</span>
      </div></div>`).join('');
}
function formsRenderFill(body) {
  body.innerHTML = `<div class="form-card"><div style="font-size:24px;color:#202124">${formDef.title}</div>${formRespondMode ? '<div style="color:#5f6368;font-size:12px;margin-top:4px">Fill this out and submit your response</div>' : ''}</div>`
    + formDef.questions.map((q, qi) => `<div class="form-q">
      <div style="font-size:15px;color:#202124;margin-bottom:8px">${q.q || 'Question'}</div>
      ${q.type === 'short' ? `<input class="opt-text" data-qi="${qi}" placeholder="Your answer" style="border-bottom:1px solid #dadce0;width:60%">`
        : q.type === 'paragraph' ? `<textarea data-qi="${qi}" style="width:100%;border:1px solid #dadce0;border-radius:6px;min-height:60px;font-family:inherit;padding:6px"></textarea>`
        : q.type === 'dropdown' ? `<select data-qi="${qi}" style="padding:6px;border-radius:6px;border:1px solid #dadce0">${q.options.map(o => `<option>${o}</option>`).join('')}</select>`
        : q.options.map(o => `<div class="q-opt"><input type="${q.type === 'checkbox' ? 'checkbox' : 'radio'}" data-qi="${qi}" name="q${qi}" value="${o.replace(/"/g, '&quot;')}"> ${o}</div>`).join('')}
    </div>`).join('')
    + `<button class="gbtn2 purple" style="max-width:540px;width:100%" onclick="formsSubmit()">Submit</button>`;
}
function formsGather() {
  return formDef.questions.map((q, qi) => {
    let a = '';
    if (q.type === 'checkbox') a = [...document.querySelectorAll(`#forms-body input[data-qi="${qi}"]:checked`)].map(x => x.value);
    else if (q.type === 'choice') { const sel = document.querySelector(`#forms-body input[name="q${qi}"]:checked`); a = sel ? sel.value : ''; }
    else { const el = document.querySelector(`#forms-body [data-qi="${qi}"]`); a = el ? el.value : ''; }
    return { q: q.q, a };
  });
}
async function formsSubmit() {
  const answers = formsGather();
  if (formRespondMode && formSharedId) {
    const r = await apiFetch('/api/shared/' + formSharedId + '/respond', { method: 'POST', body: JSON.stringify({ answers }) });
    if (r.error) { notify('⚠️', 'Submit failed', r.error); return; }
    notify('✅', 'Response submitted!', 'Thank you — your answers were recorded');
  } else notify('📋', 'Preview only', 'Publish & Share the form to collect real responses');
}
function formsAdd() { formDef.questions.push({ q: '', type: 'short', options: ['Option 1'] }); formsRender(); }
function formsDel(i) { formDef.questions.splice(i, 1); formsRender(); }
function formsType(i, t) { formDef.questions[i].type = t; if (['choice', 'checkbox', 'dropdown'].includes(t) && !formDef.questions[i].options.length) formDef.questions[i].options = ['Option 1']; formsRender(); }
function formsAddOpt(i) { formDef.questions[i].options.push('Option ' + (formDef.questions[i].options.length + 1)); formsRender(); }
function formsDelOpt(i, oi) { formDef.questions[i].options.splice(oi, 1); formsRender(); }
function formsToggleFill() { formFillMode = !formFillMode; formsRender(); }
async function formsSave() {
  const name = document.getElementById('forms-name').value || 'Untitled Form';
  formDef.title = name;
  const content = JSON.stringify(formDef);
  if (!formPath) {
    const p = await driveSaveAs(name + '.forms', content);
    if (p) { formPath = p; const nm = p.split('/').pop().replace(/\.(forms|maxform)$/i, ''); formDef.title = nm; document.getElementById('forms-name').value = nm; }
    return;
  }
  await driveWrite(formPath, content); notify('📋', 'Saved', name + ' saved to MaxDrive');
}
async function formsOpen() { const picked = await drivePick(['forms', 'maxform']); if (picked) formsOpenPath(picked.path, picked.name); }
async function formsOpenPath(path, name) {
  const res = await fsCat(path); if (res.error) return;
  try { formDef = JSON.parse(res.content); } catch { formDef = { title: name, questions: [] }; }
  if (!formDef.questions) formDef.questions = [];
  formPath = path; formFillMode = false; formSharedId = null; formRespondMode = false;
  document.getElementById('forms-name').value = formDef.title || name;
  formsRender();
}

// ══ SHARING — publish Forms & Sheets, collect responses ══════════════════════
let sharedSheetId = null, formSharedId = null, formRespondMode = false, sharedDocId = null;
// Returns the full server share object ({id,type,title,content,visibility,allow}) or null.
// visibility/allow are omitted on a plain (re)publish so the server keeps existing audience settings.
async function shareDoc(type, title, content, currentId, visibility, allow) {
  const body = { id: currentId, type, title, content };
  if (typeof visibility !== 'undefined') { body.visibility = visibility; body.allow = allow || []; }
  const r = await apiFetch('/api/shared', { method: 'POST', body: JSON.stringify(body) });
  if (r.error) { notify('⚠️', 'Publish failed', r.error); return null; }
  return r;
}
function shareModal(share, kind) {
  const url = `https://${MAXOS_DOMAIN}/s/${share.id}`;
  const verb = kind === 'Form' ? 'open this form' : 'view this';
  const ov = document.createElement('div'); ov.className = 'drive-modal';
  ov.innerHTML = `<div class="drive-box" style="width:440px"></div>`;
  const box = ov.querySelector('.drive-box');
  const parseAllow = () => { const ta = ov.querySelector('#share-allow'); return ta ? ta.value.split(/[\s,]+/).map(s => s.trim().toLowerCase().replace(/^@/, '')).filter(Boolean) : (share.allow || []); };
  const render = () => {
    const priv = share.visibility === 'private';
    box.innerHTML = `<div class="drive-head">🔗 ${kind} published!</div>
      <div style="padding:16px">
        <p style="color:rgba(255,255,255,.6);font-size:13px;margin-bottom:8px">Share link:</p>
        <div style="display:flex;gap:8px;margin-bottom:18px">
          <input id="share-url" readonly value="${url}" style="flex:1;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:8px;color:#fff;padding:9px 12px;font-size:13px">
          <button class="gbtn" id="share-copy">Copy</button></div>
        <p style="color:rgba(255,255,255,.6);font-size:13px;margin-bottom:8px">Who can ${verb}?</p>
        <div style="display:flex;gap:8px;margin-bottom:12px">
          <button class="gbtn share-aud" data-vis="public" style="flex:1;${!priv ? 'background:rgba(110,160,255,.35);border-color:rgba(110,160,255,.6)' : ''}">🌐 Anyone with link</button>
          <button class="gbtn share-aud" data-vis="private" style="flex:1;${priv ? 'background:rgba(110,160,255,.35);border-color:rgba(110,160,255,.6)' : ''}">🔒 Specific people</button>
        </div>
        <div id="share-people" style="display:${priv ? 'block' : 'none'}">
          <p style="color:rgba(255,255,255,.45);font-size:12px;margin-bottom:6px">Usernames allowed (comma or space separated):</p>
          <textarea id="share-allow" rows="2" placeholder="alice, bob, charlie" style="width:100%;box-sizing:border-box;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:8px;color:#fff;padding:9px 12px;font-size:13px;resize:vertical">${(share.allow || []).join(', ')}</textarea>
        </div>
      </div>
      <div style="display:flex;justify-content:flex-end;gap:8px;padding:10px"><button class="gbtn" id="share-save">Save access</button><button class="gbtn" id="share-close">Done</button></div>`;
    ov.querySelector('#share-copy').onclick = () => copyShare(url);
    ov.querySelector('#share-close').onclick = () => ov.remove();
    ov.querySelectorAll('.share-aud').forEach(b => b.onclick = () => { share.allow = parseAllow(); share.visibility = b.dataset.vis; render(); });
    ov.querySelector('#share-save').onclick = async () => {
      const vis = share.visibility, allow = vis === 'private' ? parseAllow() : [];
      const updated = await shareDoc(share.type, share.title, share.content, share.id, vis, allow);
      if (updated) {
        Object.assign(share, updated);
        notify('🔒', 'Access updated', vis === 'private' ? `Only ${allow.length} ${allow.length === 1 ? 'person' : 'people'} can ${verb}` : 'Anyone with the link can ' + verb);
        render();
      }
    };
  };
  document.body.appendChild(ov);
  render();
  ov.onclick = e => { if (e.target === ov) ov.remove(); };
}
function copyShare(url) { navigator.clipboard?.writeText(url); notify('🔗', 'Copied!', 'Share link copied to clipboard'); }

async function sheetsShare() {
  const title = document.getElementById('sheets-name').value || 'Untitled Sheet';
  const r = await shareDoc('sheet', title, sheetsToCsv(), sharedSheetId);
  if (r) { sharedSheetId = r.id; shareModal(r, 'Sheet'); }
}
async function formsShare() {
  const title = document.getElementById('forms-name').value || 'Untitled Form';
  formDef.title = title;
  const r = await shareDoc('form', title, JSON.stringify(formDef), formSharedId);
  if (r) { formSharedId = r.id; shareModal(r, 'Form'); }
}
async function docsShare() {
  const fn = document.getElementById('editor-filename')?.textContent || '';
  const title = (editorCurrentPath ? editorCurrentPath.split('/').pop() : fn).replace(/\.(docs|html?|txt|md)$/i, '') || 'Untitled Doc';
  const r = await shareDoc('doc', title, editorGetContent(), sharedDocId);
  if (r) { sharedDocId = r.id; shareModal(r, 'Doc'); }
}
async function formsResponses() {
  if (!formSharedId) { notify('📊', 'Share first', 'Publish the form with 🔗 Share to collect responses'); return; }
  const list = await apiFetch('/api/shared/' + formSharedId + '/responses');
  if (list.error) { notify('⚠️', 'Error', list.error); return; }
  const ov = document.createElement('div'); ov.className = 'drive-modal';
  ov.innerHTML = `<div class="drive-box" style="width:480px"><div class="drive-head">📊 Responses (${list.length})</div>
    <div class="drive-list">${list.length ? list.map(r => `<div style="padding:10px 12px;border-bottom:1px solid rgba(255,255,255,.08)"><div style="color:rgba(255,255,255,.4);font-size:11px">@${r.by} · ${new Date(r.at).toLocaleString()}</div>${(r.answers || []).map(a => `<div style="color:#fff;font-size:13px;margin-top:3px"><b style="color:rgba(255,255,255,.55)">${a.q}:</b> ${Array.isArray(a.a) ? a.a.join(', ') : (a.a || '—')}</div>`).join('')}</div>`).join('') : '<div style="color:rgba(255,255,255,.4);padding:20px;text-align:center">No responses yet</div>'}</div>
    <div style="text-align:right;padding:10px"><button class="gbtn" id="resp-close">Close</button></div></div>`;
  document.body.appendChild(ov);
  ov.querySelector('#resp-close').onclick = () => ov.remove();
  ov.onclick = e => { if (e.target === ov) ov.remove(); };
}
// Open a shared doc by id (from a /s/<id> link)
async function openShared(id) {
  let doc, status = 0;
  try { const r = await fetch(API + '/api/shared/' + id, { headers: authHeaders() }); status = r.status; doc = await r.json(); }
  catch { notify('🔗', 'Offline', 'Could not reach the server'); return; }
  if (status === 401 || status === 403) { notify('🔒', 'Access restricted', doc.error || 'You don’t have permission to view this'); return; }
  if (!doc || doc.error || !doc.id) { notify('🔗', 'Link not found', 'That shared document does not exist'); return; }
  if (doc.type === 'form') {
    openApp('forms');
    setTimeout(() => {
      try { formDef = JSON.parse(doc.content); } catch { formDef = { title: doc.title, questions: [] }; }
      if (!formDef.questions) formDef.questions = [];
      formSharedId = doc.id; formRespondMode = true; formFillMode = true; formPath = null;
      const nm = document.getElementById('forms-name'); if (nm) nm.value = formDef.title || doc.title;
      formsRender();
      notify('📋', 'Filling: ' + (doc.title || 'Form'), 'Shared by @' + doc.author);
    }, 300);
  } else if (doc.type === 'doc') {
    openApp('editor');
    setTimeout(() => {
      editorSetContent(doc.content, true); sharedDocId = doc.id; editorCurrentPath = null;
      const fn = document.getElementById('editor-filename'); if (fn) fn.textContent = doc.title;
      notify('📘', 'Viewing: ' + doc.title, 'Shared by @' + doc.author);
    }, 300);
  } else {
    openApp('sheets');
    setTimeout(() => {
      sheetsSetCsv(doc.content); sharedSheetId = doc.id; sheetPath = null;
      const nm = document.getElementById('sheets-name'); if (nm) nm.value = doc.title;
      notify('📊', 'Viewing: ' + doc.title, 'Shared by @' + doc.author);
    }, 300);
  }
}

function buildChat() {
  return `<div class="chat-app">
    <div class="chat-side">
      <div class="chat-ws">🗨️ MaxChat</div>
      <div class="chat-side-h">Channels <span class="chat-addchan" onclick="chatAddChannel()" title="Add channel">＋</span></div>

// ══ MAX BOARD — Trello-style kanban ═══════════════════════════════════════════
const BOARD_COLS = ['To Do', 'In Progress', 'Done'];
let boardData = null, boardPath = null, boardDrag = null;
function buildBoard() {
  return `<div class="board-app">
    <div class="editor-toolbar">
      <button onclick="boardOpen()">📂 Open</button>
      <button onclick="boardSave()">💾 Save</button>
      <button onclick="boardSaveAs()">Save As</button>
      <span id="board-name" style="color:rgba(255,255,255,.45);font-size:12px;margin-left:auto">Untitled Board</span>
    </div>
    <div class="board-cols" id="board-cols"></div>
  </div>`;
}
function initBoard() {
  boardData = { 'To Do': ['Welcome to Max Board 📌', 'Drag cards between columns'], 'In Progress': ['Build something cool'], 'Done': ['Sign up for MaxOS ✅'] };
  boardPath = null; boardRender();
}
function boardRender() {
  const el = document.getElementById('board-cols'); if (!el) return;
  el.innerHTML = BOARD_COLS.map(col => `<div class="board-col" ondragover="event.preventDefault()" ondrop="boardDrop('${col}')">
    <div class="board-col-h">${col} <span>${(boardData[col] || []).length}</span></div>
    <div class="board-cards">${(boardData[col] || []).map((card, i) => `<div class="board-card" draggable="true" ondragstart="boardDragStart('${col}',${i})">${escapeHtml(card)}<span class="board-del" onclick="boardDel('${col}',${i})">✕</span></div>`).join('')}</div>
    <div class="board-add" onclick="boardAdd('${col}')">＋ Add card</div>
  </div>`).join('');
}
function boardAdd(col) { const t = prompt('New card:'); if (t && t.trim()) { boardData[col].push(t.trim()); boardRender(); } }
function boardDel(col, i) { boardData[col].splice(i, 1); boardRender(); }
function boardDragStart(col, i) { boardDrag = { col, i }; }
function boardDrop(col) {
  if (!boardDrag) return;
  const card = boardData[boardDrag.col].splice(boardDrag.i, 1)[0];
  boardData[col].push(card); boardDrag = null; boardRender();
}
async function boardSave() {
  if (!boardPath) return boardSaveAs();
  await driveWrite(boardPath, JSON.stringify(boardData)); notify('📌', 'Saved', boardPath.split('/').pop());
}
async function boardSaveAs() {
  const p = await driveSaveAs('board.board', JSON.stringify(boardData));
  if (p) { boardPath = p; document.getElementById('board-name').textContent = p.split('/').pop(); }
}
async function boardOpen() {
  const picked = await drivePick(['board']);
  if (!picked) return;
  boardLoadContent(picked.content, picked.path, picked.name);
}
async function boardOpenPath(path, name) {
  const res = await fsCat(path); if (res.error) return;
  boardLoadContent(res.content, path, name);
}
function boardLoadContent(content, path, name) {
  try { boardData = content ? JSON.parse(content) : {}; } catch { return notify('📌', 'Error', 'Not a valid board'); }
  BOARD_COLS.forEach(c => { if (!Array.isArray(boardData[c])) boardData[c] = []; });
  boardPath = path; const el = document.getElementById('board-name'); if (el) el.textContent = name.replace(/\.board$/, ''); boardRender();
}

async function socialLike(id) {

function buildAdminWatch() {

}
function initAdmin() { adminLoad(); adminLoadReports(); adminWatchRefreshUI(); }
function initAdminWatch() { adminWatchRefreshUI(); adminWatchTickMeta(); }
function adminWatchRefreshUI(msg) {
  const stage = document.getElementById('admin-watch-stage');
  const meta = document.getElementById('admin-watch-meta');
  const stop = document.getElementById('admin-watch-stop');
  const target = document.getElementById('admin-watch-target');
  if (stage && msg) stage.innerHTML = `<div>${msg}</div>`;
  if (meta) meta.textContent = adminWatchUser ? `watching @${adminWatchUser}` : 'idle';
  if (target) target.textContent = adminWatchUser ? '@' + adminWatchUser : '';
  if (stop) stop.disabled = !adminWatchUser;
}
function adminWatchTickMeta() {
  const meta = document.getElementById('admin-watch-meta');
  if (!meta) return;
  if (!adminWatchUser) { meta.textContent = 'idle'; return; }
  const age = adminWatchAt ? Math.max(0, Math.floor((Date.now() - adminWatchAt) / 1000)) : null;
  const appTxt = adminWatchApp ? ` · app: ${adminWatchApp}` : '';
  meta.textContent = age == null ? `watching @${adminWatchUser}${appTxt} · waiting for frame` : `watching @${adminWatchUser}${appTxt} · updated ${age}s ago${age > 15 ? ' (stale)' : ''}`;
}
function adminReceiveWatchFrame(packet) {
  if (!packet || !adminWatchUser || packet.username !== adminWatchUser) return;
  const stage = document.getElementById('admin-watch-stage');
  if (!stage) return;
  adminWatchApp = packet.appTitle || packet.appId || '';
  if (!stage.querySelector('#admin-watch-img')) stage.innerHTML = '<img id="admin-watch-img" alt="Live user screen">';
  if (packet.at !== adminWatchAt) {
    const img = document.getElementById('admin-watch-img');
    if (img) img.src = packet.frame || '';
    adminWatchAt = Number(packet.at) || Date.now();
  }
  adminWatchTickMeta();
}
function adminReceiveWatchEnded(packet) {
  if (!packet || !adminWatchUser || packet.username !== adminWatchUser) return;
  adminStopWatching('@' + escapeHtml(packet.username) + ' watch ended.');

async function adminStartWatching(username) {

    if (!socket) throw new Error('Socket unavailable');
    socket.emit('screenwatch:subscribe', { username });
  } catch (e) {
    adminStopWatching('Unable to connect live watch socket.');
  }
}
function adminStopWatching(msg) {
  if (screenWatchSocket) screenWatchSocket.emit('screenwatch:unsubscribe');
  clearInterval(adminWatchTimer);
  adminWatchTimer = null;
  adminWatchUser = null;
  adminWatchAt = 0;
  adminWatchApp = '';
  adminWatchRefreshUI(msg || 'Select a suspicious user from Admin Panel and click Watch.');
}
async function adminSuspend(username) {
  const r = await apiFetch('/api/admin/users/' + encodeURIComponent(username) + '/suspend', { method: 'POST' });
  if (r.error) { notify('🛡️', 'Error', r.error); return; }
  notify('🛡️', r.suspended ? 'Suspended' : 'Unsuspended', '@' + username);
  adminLoad();
}
async function adminDelete(username) {
  if (!confirm('Permanently delete @' + username + ' and all their files? This cannot be undone.')) return;
  const r = await apiFetch('/api/admin/users/' + encodeURIComponent(username), { method: 'DELETE' });
  if (r.error) { notify('🛡️', 'Error', r.error); return; }
  notify('🗑️', 'Account deleted', '@' + username + ' has been removed');
  adminLoad();
}
