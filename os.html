// ── Web Audio Engine ─────────────────────────────────────────────────────────
const MUS = (() => {
  let ac = null, master = null;

  function boot() {
    if (ac) { ac.state === 'suspended' && ac.resume(); return; }
    ac = new (window.AudioContext || window.webkitAudioContext)();
    const comp = ac.createDynamicsCompressor();
    master = ac.createGain(); master.gain.value = 0.42;
    master.connect(comp); comp.connect(ac.destination);
  }

  const osc = (f, d, type='triangle', v=0.12, w=0) => {
    if (!ac) return;
    const t=ac.currentTime+w, o=ac.createOscillator(), env=ac.createGain(), lp=ac.createBiquadFilter();
    lp.type='lowpass'; lp.frequency.value=2200;
    o.type=type; o.frequency.value=f;
    env.gain.setValueAtTime(0.001,t);
    env.gain.linearRampToValueAtTime(v, t+0.018);
    env.gain.setValueAtTime(v*0.7, t+d*0.5);
    env.gain.exponentialRampToValueAtTime(0.0001, t+d*0.95);
    o.connect(lp); lp.connect(env); env.connect(master);
    o.start(t); o.stop(t+d+0.05);
  };

  const kick = (v=0.72, w=0) => {
    if (!ac) return;
    const t=ac.currentTime+w, o=ac.createOscillator(), g=ac.createGain();
    o.frequency.setValueAtTime(110,t); o.frequency.exponentialRampToValueAtTime(0.01,t+0.35);
    g.gain.setValueAtTime(v,t); g.gain.exponentialRampToValueAtTime(0.0001,t+0.35);
    o.connect(g); g.connect(master); o.start(t); o.stop(t+0.4);
  };

  const snare = (v=0.26, w=0) => {
    if (!ac) return;
    const t=ac.currentTime+w, buf=ac.createBuffer(1,ac.sampleRate*0.15,ac.sampleRate);
    const d=buf.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
    const src=ac.createBufferSource(), bp=ac.createBiquadFilter(), g=ac.createGain();
    bp.type='bandpass'; bp.frequency.value=1300; bp.Q.value=0.6;
    g.gain.setValueAtTime(v,t); g.gain.exponentialRampToValueAtTime(0.0001,t+0.13);
    src.buffer=buf; src.connect(bp); bp.connect(g); g.connect(master); src.start(t);
  };

  const hat = (v=0.055, w=0) => {
    if (!ac) return;
    const t=ac.currentTime+w, buf=ac.createBuffer(1,ac.sampleRate*0.04,ac.sampleRate);
    const d=buf.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
    const src=ac.createBufferSource(), hp=ac.createBiquadFilter(), g=ac.createGain();
    hp.type='highpass'; hp.frequency.value=8500;
    g.gain.setValueAtTime(v,t); g.gain.exponentialRampToValueAtTime(0.0001,t+0.04);
    src.buffer=buf; src.connect(hp); hp.connect(g); g.connect(master); src.start(t);
  };

  // Note Hz lookup
  const H = {
    A2:110, C3:130.81, D3:146.83, E3:164.81, F3:174.61, G3:196, A3:220, B3:246.94,
    C4:261.63, D4:293.66, E4:329.63, F4:349.23, G4:392, A4:440, B4:493.88,
    C5:523.25, D5:587.33, E5:659.26, F5:698.46,
  };

  // 5 synthesized tracks — each defines steps(s16, s, w):
  //   s16 = absolute 16th-note counter, s = 16th-note duration (sec), w = when offset
  const TRACKS = [
    // 0: Lofi Chill  72 bpm
    { bpm:72, len:16, steps(n,s,w) {
      const bar=Math.floor(n/16)%4, st=n%16;
      const C=[[H.A3,H.C4,H.E4],[H.F3,H.A3,H.C4],[H.C3,H.E3,H.G3],[H.G3,H.B3,H.D4]];
      const B=[H.A2,87.31,65.41,98];
      const ch=C[bar];
      if(st===0){ ch.forEach((f,i)=>osc(f,s*14,'triangle',0.065,w+i*0.025)); osc(B[bar],s*15,'sine',0.14,w); }
      if(st===8){ ch.forEach((f,i)=>osc(f,s*6,'triangle',0.05,w+i*0.02)); }
      const mel=[
        [[0,H.E4,s*4],[2,H.C4,s*2],[4,H.A3,s*3],[8,H.E4,s*4],[10,H.D4,s*2],[12,H.C4,s*3]],
        [[0,H.C4,s*4],[3,H.A3,s*2],[5,H.G3,s*3],[8,H.A3,s*4],[12,H.C4,s*4]],
        [[0,H.G3,s*3],[4,H.E4,s*4],[8,H.G4,s*4],[10,H.E4,s*2],[12,H.C4,s*4]],
        [[0,H.D4,s*4],[4,H.B3,s*3],[8,H.D4,s*5],[13,H.G3,s*3]],
      ];
      mel[bar].forEach(([p,f,d])=>{ if(st===p) osc(f,d,'triangle',0.09,w); });
      if(st===0||st===8) kick(0.52,w);
      if(st===4||st===12) snare(0.17,w);
      if(st%2===0) hat(0.042,w);
    }},

    // 1: Synthwave  120 bpm
    { bpm:120, len:16, steps(n,s,w) {
      const bar=Math.floor(n/16)%2, st=n%16;
      const arp=[H.D3,H.F3,H.A3,H.C4,H.E4,H.C4,H.A3,H.F3];
      osc(arp[st%8],s*2.2,'sawtooth',0.085,w);
      if(st%4===0) osc(bar===0?H.D3/2:H.G3/2,s*8,'sawtooth',0.17,w);
      const lead=[[0,H.D4],[2,H.F4],[4,H.A4],[6,H.C5],[8,H.A4],[10,H.F4],[12,H.D4],[14,H.E4]];
      lead.forEach(([p,f])=>{ if(st===p) osc(f,s*2.5,'square',0.055,w); });
      if(st%4===0) kick(0.62,w);
      if(st===6||st===14) snare(0.2,w);
      if(st%2===0) hat(0.036,w);
    }},

    // 2: Morning Coffee  80 bpm
    { bpm:80, len:16, steps(n,s,w) {
      const bar=Math.floor(n/16)%2, st=n%16;
      const C=[[H.C3,H.E3,H.G3,H.C4],[H.A3,H.C4,H.E4,H.A4]];
      const ch=C[bar];
      if(st===0){ ch.forEach((f,i)=>osc(f,s*15,'sine',0.052,w+i*0.03)); osc(ch[0]/2,s*15,'sine',0.13,w); }
      if(st===8){ ch.forEach((f,i)=>osc(f,s*7,'sine',0.04,w+i*0.02)); }
      const mel=[
        [[0,H.E4,s*4],[3,H.D4,s*2],[5,H.C4,s*3],[8,H.E4,s*5],[13,H.C4,s*3]],
        [[0,H.A4,s*4],[3,H.G4,s*3],[6,H.E4,s*4],[10,H.C4,s*2],[12,H.E4,s*4]],
      ];
      mel[bar].forEach(([p,f,d])=>{ if(st===p) osc(f,d,'triangle',0.075,w); });
      if(st===0) kick(0.36,w); if(st===8) kick(0.3,w);
      if(st===4||st===12) snare(0.1,w);
      if(st%4===2) hat(0.032,w);
    }},

    // 3: Deep Focus  58 bpm
    { bpm:58, len:32, steps(n,s,w) {
      const st=n%32, bar=Math.floor(st/8)%4;
      const C=[[H.A3,H.C4,H.E4],[H.F3,H.A3,H.C4],[H.G3,H.B3,H.D4],[H.E3,H.G3,H.B3]];
      const ch=C[bar];
      if(st%8===0){ ch.forEach((f,i)=>osc(f,s*30,'sine',0.048,w+i*0.07)); osc(ch[0]/2,s*30,'sine',0.09,w); }
      if(st%8===3) osc(H.E5,s*7,'triangle',0.036,w);
      if(st%8===6) osc(H.C5,s*5,'triangle',0.028,w);
      if(st%16===0) kick(0.19,w);
      if(st%16===8) snare(0.07,w);
    }},

    // 4: Sunset Jazz  100 bpm
    { bpm:100, len:16, steps(n,s,w) {
      const bar=Math.floor(n/16)%4, st=n%16;
      const C=[[H.D3,H.F3,H.A3,H.C4],[H.G3,H.B3,H.D4,H.F4],[H.C3,H.E3,H.G3,H.B3],[H.A3,H.C4,H.E4,H.G4]];
      const BL=[[H.D3,H.E3,H.F3,H.G3],[H.G3,H.A3,H.B3,H.C4],[H.C3,H.D3,H.E3,H.F3],[H.A3,H.G3,H.F3,H.E3]];
      const ch=C[bar];
      if(st===2||st===10) ch.forEach((f,i)=>osc(f,s*3,'triangle',0.062,w+i*0.012));
      if(st===6||st===14) ch.slice(1).forEach((f,i)=>osc(f,s*2,'triangle',0.048,w+i*0.01));
      if(st%4===0) osc(BL[bar][st/4]/2,s*3.5,'triangle',0.15,w);
      const mel=[
        [[0,H.A4,s*4],[4,H.F4,s*3],[8,H.E4,s*4],[12,H.D4,s*4]],
        [[0,H.G4,s*4],[4,H.F4,s*3],[8,H.D4,s*4],[12,H.E4,s*4]],
        [[0,H.E4,s*3],[3,H.G4,s*4],[8,H.B4,s*4],[12,H.A4,s*4]],
        [[0,H.A4,s*4],[4,H.G4,s*3],[8,H.E4,s*4],[12,H.D4,s*4]],
      ];
      mel[bar].forEach(([p,f,d])=>{ if(st===p) osc(f,d,'triangle',0.065,w); });
      if([0,3,4,7,8,11,12,15].includes(st)) hat(0.038,w);
      if(st===4||st===12) snare(0.11,w);
      if(st===0) kick(0.26,w);
    }},
  ];

  return { boot, TRACKS, get ac(){ return ac; } };
})();

// ── Music scheduler ───────────────────────────────────────────────────────────
let musicIdx=0, musicPlaying=false, musicBarNum=0, musicTimer=null, visInterval=null;

function scheduleBar(trackIdx, barNum, atTime) {
  const tr = MUS.TRACKS[trackIdx];
  const s = (60/tr.bpm)/4;       // 16th-note seconds
  const barDur = s * tr.len;
  const base = barNum * tr.len;
  for (let i = 0; i < tr.len; i++) {
    const w = atTime + i*s - MUS.ac.currentTime;
    if (w > -0.01) tr.steps(base+i, s, Math.max(0,w));
  }
  const nextAt = atTime + barDur;
  const msAhead = (nextAt - MUS.ac.currentTime - 0.08) * 1000;
  musicTimer = setTimeout(() => {
    if (!musicPlaying || musicIdx !== trackIdx) return;
    musicBarNum = barNum + 1;
    scheduleBar(trackIdx, musicBarNum, nextAt);
    const elapsed = musicBarNum * (60/tr.bpm) * 4;
    const cur = document.getElementById('music-cur');
    if (cur) cur.textContent = `${Math.floor(elapsed/60)}:${String(Math.floor(elapsed%60)).padStart(2,'0')}`;
    const seek = document.getElementById('music-seek');
    if (seek) seek.value = (musicBarNum % 32) / 32 * 100;
  }, Math.max(0, msAhead));
}

function initMusic() {}

function musicPlay(i) {
  clearTimeout(musicTimer);
  musicIdx = i; musicBarNum = 0;
  const t = musicTracks[i];
  const art = document.getElementById('music-art');
  if (art) { art.style.background = t.color; art.textContent = t.emoji; }
  const tt = document.getElementById('music-title'); if(tt) tt.textContent = t.title;
  const ar = document.getElementById('music-artist'); if(ar) ar.textContent = t.artist;
  document.querySelectorAll('.music-track').forEach((el,j)=>el.classList.toggle('active',j===i));
  if (musicPlaying) { MUS.boot(); scheduleBar(i, 0, MUS.ac.currentTime + 0.05); }
}

function musicToggle() { musicPlaying ? musicPause() : musicResume(); }

function musicResume() {
  musicPlaying = true;
  document.getElementById('music-play').textContent = '⏸';
  MUS.boot();
  scheduleBar(musicIdx, musicBarNum, MUS.ac.currentTime + 0.05);
  startVisualizer();
}

function musicPause() {
  musicPlaying = false;
  clearTimeout(musicTimer);
  document.getElementById('music-play').textContent = '▶';
  clearInterval(visInterval);
  MUS.ac?.suspend();
  const c=document.getElementById('vis-canvas');
  if(c) c.getContext('2d').clearRect(0,0,c.width,c.height);
}

function setMusicVol(v) { if(MUS.ac){ const g=MUS.ac.destination; } try{ MUS.TRACKS; const gainNode=document.querySelector('#music-art'); const master=MUS.ac?.destination; if(MUS._gain) MUS._gain.gain.value=v*0.8; } catch(e){} }
function musicNext() { const wasPlaying=musicPlaying; if(wasPlaying)musicPause(); musicPlay((musicIdx+1)%musicTracks.length); if(wasPlaying)musicResume(); notify('🎵','Now Playing',musicTracks[(musicIdx)].title); }
function musicPrev() { const wasPlaying=musicPlaying; if(wasPlaying)musicPause(); musicPlay((musicIdx-1+musicTracks.length)%musicTracks.length); if(wasPlaying)musicResume(); }

function startVisualizer() {
  clearInterval(visInterval);
  visInterval = setInterval(() => {
    const c=document.getElementById('vis-canvas'); if(!c||!musicPlaying) return;
    const ctx=c.getContext('2d'), w=c.offsetWidth||280, h=40;
    if(c.width!==w) c.width=w;
    ctx.clearRect(0,0,w,h);
    for(let i=0;i<36;i++){
      const bh=4+Math.random()*32;
      ctx.fillStyle=`hsl(${200+i*4},75%,58%)`;
      ctx.fillRect(i*(w/36),h-bh,w/36-2,bh);
    }
  }, 80);
}

let g2048 = null;

  </div>`;
}
const G2048_COLORS = { 0:'rgba(255,255,255,.05)', 2:'#3a3a5e', 4:'#46466e', 8:'#f2b179', 16:'#f59563', 32:'#f67c5f', 64:'#f65e3b', 128:'#edcf72', 256:'#edcc61', 512:'#edc850', 1024:'#edc53f', 2048:'#edc22e' };
function g2048New() {
  g2048 = { grid: Array(16).fill(0), score: 0 };
  g2048AddTile(); g2048AddTile(); g2048Draw();
}
function initG2048() {
  g2048New();
  document.addEventListener('keydown', g2048Key);
}
function g2048AddTile() {
  const empty = g2048.grid.map((v, i) => v === 0 ? i : -1).filter(i => i >= 0);
  if (!empty.length) return;
  g2048.grid[empty[Math.floor(Math.random() * empty.length)]] = Math.random() < 0.9 ? 2 : 4;
}
function g2048Draw() {
  const b = document.getElementById('g2048-board');
  if (!b) return;
  b.innerHTML = g2048.grid.map(v => `<div class="g2048-cell" style="background:${G2048_COLORS[v] || '#edc22e'};color:${v <= 4 ? 'rgba(255,255,255,.85)' : '#fff'};font-size:${v >= 1000 ? 20 : 24}px">${v || ''}</div>`).join('');
  const s = document.getElementById('g2048-score'); if (s) s.textContent = g2048.score;
}
function g2048Key(e) {
  if (!windows['g2048'] || windows['g2048'].minimized || !g2048) return;
  const map = { ArrowLeft: 'L', ArrowRight: 'R', ArrowUp: 'U', ArrowDown: 'D', a: 'L', d: 'R', w: 'U', s: 'D' };
  const dir = map[e.key]; if (!dir) return;
  e.preventDefault();
  const before = g2048.grid.join(',');
  g2048Move(dir);
  if (g2048.grid.join(',') !== before) { g2048AddTile(); g2048Draw(); if (g2048Over()) setTimeout(() => notify('🔢', 'Game Over', 'Score: ' + g2048.score), 100); }
}
function g2048Move(dir) {
  const get = (r, c) => g2048.grid[r * 4 + c], set = (r, c, v) => g2048.grid[r * 4 + c] = v;
  const line = i => { const out = []; for (let j = 0; j < 4; j++) out.push(dir === 'L' ? get(i, j) : dir === 'R' ? get(i, 3 - j) : dir === 'U' ? get(j, i) : get(3 - j, i)); return out; };
  const put = (i, arr) => { for (let j = 0; j < 4; j++) { const v = arr[j]; if (dir === 'L') set(i, j, v); else if (dir === 'R') set(i, 3 - j, v); else if (dir === 'U') set(j, i, v); else set(3 - j, i, v); } };
  for (let i = 0; i < 4; i++) {
    let arr = line(i).filter(v => v);
    for (let j = 0; j < arr.length - 1; j++) if (arr[j] === arr[j + 1]) { arr[j] *= 2; g2048.score += arr[j]; arr.splice(j + 1, 1); }
    while (arr.length < 4) arr.push(0);
    put(i, arr);
  }
}
function g2048Over() {
  if (g2048.grid.includes(0)) return false;
  for (let r = 0; r < 4; r++) for (let c = 0; c < 4; c++) { const v = g2048.grid[r * 4 + c]; if (c < 3 && v === g2048.grid[r * 4 + c + 1]) return false; if (r < 3 && v === g2048.grid[(r + 1) * 4 + c]) return false; }
  return true;
}

let ttt = null;
function buildTTT() {
  return `<div class="ttt">

      <button class="ttt-btn" id="ttt-2p" onclick="tttMode(false)">2 Players</button>
      <button class="ttt-btn" onclick="tttReset()">Reset</button>
    </div>
  </div>`;
}
function initTTT() { ttt = { board: Array(9).fill(''), turn: 'X', vsCpu: true, over: false }; tttDraw(); }
function tttMode(cpu) { ttt.vsCpu = cpu; document.getElementById('ttt-cpu').classList.toggle('active', cpu); document.getElementById('ttt-2p').classList.toggle('active', !cpu); tttReset(); }
function tttReset() { ttt.board = Array(9).fill(''); ttt.turn = 'X'; ttt.over = false; tttDraw(); document.getElementById('ttt-status').textContent = ttt.vsCpu ? 'Your turn (X)' : "X's turn"; }
function tttDraw() {
  const b = document.getElementById('ttt-board');
  if (!b) return;
  b.innerHTML = ttt.board.map((v, i) => `<button class="ttt-cell" onclick="tttPlay(${i})">${v}</button>`).join('');
}
function tttPlay(i) {
  if (ttt.over || ttt.board[i]) return;
  ttt.board[i] = ttt.turn; tttDraw();
  if (tttCheck()) return;
  ttt.turn = ttt.turn === 'X' ? 'O' : 'X';
  const st = document.getElementById('ttt-status');
  if (ttt.vsCpu && ttt.turn === 'O') { st.textContent = 'CPU thinking…'; setTimeout(tttCpu, 450); }
  else st.textContent = ttt.vsCpu ? 'Your turn (X)' : `${ttt.turn}'s turn`;
}
function tttCpu() {
  const empty = ttt.board.map((v, i) => v ? -1 : i).filter(i => i >= 0);
  // try win, then block, then center, then random
  const find = (mark) => { for (const i of empty) { const t = [...ttt.board]; t[i] = mark; if (tttWinner(t) === mark) return i; } return -1; };
  let move = find('O'); if (move < 0) move = find('X'); if (move < 0 && ttt.board[4] === '') move = 4;
  if (move < 0) move = empty[Math.floor(Math.random() * empty.length)];
  ttt.board[move] = 'O'; tttDraw();
  if (tttCheck()) return;
  ttt.turn = 'X'; document.getElementById('ttt-status').textContent = 'Your turn (X)';
}
function tttWinner(b) {
  const L = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
  for (const [a, c, d] of L) if (b[a] && b[a] === b[c] && b[a] === b[d]) return b[a];
  return null;
}
function tttCheck() {
  const w = tttWinner(ttt.board);
  const st = document.getElementById('ttt-status');
  if (w) { ttt.over = true; st.textContent = ttt.vsCpu ? (w === 'X' ? '🎉 You win!' : '🤖 CPU wins!') : `${w} wins! 🎉`; return true; }
  if (!ttt.board.includes('')) { ttt.over = true; st.textContent = "It's a draw!"; return true; }
  return false;
}

let memory = null;
function buildMemory() {
  return `<div class="memory">
    <div style="color:#fff;font-size:14px" id="mem-status">Moves: 0 · Pairs: 0/8</div>
    <div class="memory-grid" id="mem-grid"></div>
    <button class="ttt-btn" onclick="initMemory()">New Game</button>
  </div>`;
}
function initMemory() {
  const emojis = ['🍎','🚀','🎸','🐱','🌈','⚡','🎲','🍕'];
  const cards = [...emojis, ...emojis].sort(() => Math.random() - 0.5);
  memory = { cards, flipped: [], matched: [], moves: 0, lock: false };
  memDraw();
}
function memDraw() {
  const g = document.getElementById('mem-grid');
  if (!g) return;
  g.innerHTML = memory.cards.map((e, i) => {
    const shown = memory.flipped.includes(i) || memory.matched.includes(i);
    const cls = memory.matched.includes(i) ? 'matched' : memory.flipped.includes(i) ? 'flipped' : '';
    return `<button class="mem-card ${cls}" onclick="memFlip(${i})">${shown ? e : '❓'}</button>`;
  }).join('');
  const st = document.getElementById('mem-status');
  if (st) st.textContent = `Moves: ${memory.moves} · Pairs: ${memory.matched.length / 2}/8`;
}
function memFlip(i) {
  if (memory.lock || memory.flipped.includes(i) || memory.matched.includes(i)) return;
  memory.flipped.push(i); memDraw();
  if (memory.flipped.length === 2) {
    memory.moves++; memory.lock = true;
    const [a, b] = memory.flipped;
    if (memory.cards[a] === memory.cards[b]) {
      memory.matched.push(a, b); memory.flipped = []; memory.lock = false; memDraw();
      if (memory.matched.length === 16) setTimeout(() => notify('🃏', 'You won!', `Completed in ${memory.moves} moves`), 100);
    } else {
      setTimeout(() => { memory.flipped = []; memory.lock = false; memDraw(); }, 800);
    }
  }
}

let pomo = null;
const POMO_MODES = { focus: 25 * 60, short: 5 * 60, long: 15 * 60 };
function buildPomodoro() {
  return `<div class="pomodoro">
    <div class="pomo-modes">
      <button class="pomo-mode active" data-m="focus" onclick="pomoMode('focus')">Focus</button>
      <button class="pomo-mode" data-m="short" onclick="pomoMode('short')">Short Break</button>

  </div>`;
}
function initPomodoro() { pomo = { mode: 'focus', remaining: POMO_MODES.focus, running: false, timer: null, done: 0 }; pomoDraw(); }
function pomoMode(m) {
  if (pomo.running) pomoToggle();
  pomo.mode = m; pomo.remaining = POMO_MODES[m];
  document.querySelectorAll('.pomo-mode').forEach(b => b.classList.toggle('active', b.dataset.m === m));

}
function pomoDraw() {
  const t = document.getElementById('pomo-time');

function pomoToggle() {
  pomo.running = !pomo.running;

  if (pomo.running) {
    pomo.timer = setInterval(() => {
      pomo.remaining--;
      if (pomo.remaining <= 0) {
        clearInterval(pomo.timer); pomo.running = false;
        if (pomo.mode === 'focus') pomo.done++;
        document.getElementById('pomo-btn').textContent = 'Start';
        notify('🍅', 'Time\'s up!', pomo.mode === 'focus' ? 'Take a break 🎉' : 'Back to focus!');
        pomo.remaining = POMO_MODES[pomo.mode];

    }, 1000);
  } else clearInterval(pomo.timer);
}

// ── UNIT CONVERTER ───────────────────────────────────────────────────────────
const CONV = {
  Length: { units: { Meters: 1, Kilometers: 1000, Miles: 1609.34, Feet: 0.3048, Inches: 0.0254, Centimeters: 0.01 } },
  Weight: { units: { Kilograms: 1, Grams: 0.001, Pounds: 0.453592, Ounces: 0.0283495, Tons: 1000 } },
  Temperature: { special: true },
  Speed: { units: { 'm/s': 1, 'km/h': 0.277778, 'mph': 0.44704, 'knots': 0.514444 } },
};
let convCat = 'Length';
function buildConverter() {
  return `<div class="converter">
    <div class="conv-cats">${Object.keys(CONV).map(c => `<button class="conv-cat${c === 'Length' ? ' active' : ''}" onclick="convSetCat('${c}')">${c}</button>`).join('')}</div>
    <div id="conv-body"></div>
  </div>`;
}
function initConverter() { convSetCat('Length'); }
function convSetCat(c) {
  convCat = c;
  document.querySelectorAll('.conv-cat').forEach(b => b.classList.toggle('active', b.textContent === c));
  const units = CONV[c].special ? ['Celsius', 'Fahrenheit', 'Kelvin'] : Object.keys(CONV[c].units);
  document.getElementById('conv-body').innerHTML = `
    <div class="conv-row"><label>From</label>
      <input type="number" id="conv-in" value="1" oninput="convCalc()">
      <select id="conv-from" onchange="convCalc()">${units.map(u => `<option>${u}</option>`).join('')}</select></div>
    <div class="conv-eq">⬇</div>
    <div class="conv-row"><label>To</label>
      <input type="number" id="conv-out" readonly>
      <select id="conv-to" onchange="convCalc()">${units.map((u, i) => `<option ${i === 1 ? 'selected' : ''}>${u}</option>`).join('')}</select></div>`;
  convCalc();
}
function convCalc() {
  const val = parseFloat(document.getElementById('conv-in').value) || 0;
  const from = document.getElementById('conv-from').value, to = document.getElementById('conv-to').value;
  let result;
  if (CONV[convCat].special) {
    let celsius = from === 'Celsius' ? val : from === 'Fahrenheit' ? (val - 32) * 5 / 9 : val - 273.15;
    result = to === 'Celsius' ? celsius : to === 'Fahrenheit' ? celsius * 9 / 5 + 32 : celsius + 273.15;
  } else {
    const u = CONV[convCat].units;
    result = val * u[from] / u[to];
  }
  document.getElementById('conv-out').value = Math.round(result * 100000) / 100000;
}

// MaxOS .pic format — JPEG/PNG imported into MaxDrive as JSON + embedded data
function picMake(name, dataUrl, mime, w, h) {
  return JSON.stringify({ format: 'maxos.pic', v: 1, name, mime: mime || 'image/jpeg', width: w || 0, height: h || 0, data: dataUrl });
}
function picParse(raw) {
  const d = typeof raw === 'string' ? JSON.parse(raw) : raw;
  if (!d || d.format !== 'maxos.pic' || !d.data) throw new Error('Not a .pic file');
  return d;
}
function picDataUrl(d) { return d.data; }
async function picFromFile(file) {
  const dataUrl = await new Promise((res, rej) => { const r = new FileReader(); r.onload = () => res(r.result); r.onerror = rej; r.readAsDataURL(file); });
  const dims = await new Promise((res, rej) => { const im = new Image(); im.onload = () => res({ w: im.width, h: im.height }); im.onerror = rej; im.src = dataUrl; });
  const base = (file.name || 'image').replace(/\.[^.]+$/, '').replace(/[^a-z0-9_-]+/gi, '_').slice(0, 28) || 'image';
  return { name: base, content: picMake(base, dataUrl, file.type || 'image/jpeg', dims.w, dims.h), dataUrl, w: dims.w, h: dims.h };
}
async function picSaveToDrive(baseName, picContent) {
  let name = baseName.endsWith('.pic') ? baseName : baseName + '.pic';

  if ((await fsStat(parent)).error) await fsMkdir(parent, 'pictures', driveHome());

function anDrawElement(ctx, el, selected) {
  ctx.save();

    ctx.fillStyle = el.color || '#64b4ff';
    ctx.fillRect(el.x, el.y, el.w, el.h);
    if (selected) { ctx.strokeStyle = '#febc2e'; ctx.lineWidth = 2; ctx.setLineDash([5, 4]); ctx.strokeRect(el.x, el.y, el.w, el.h); }
  } else if (el.type === 'circle') {
    ctx.fillStyle = el.color || '#bf5af2';
    ctx.beginPath(); ctx.arc(el.cx, el.cy, el.r, 0, Math.PI * 2); ctx.fill();
    if (selected) { ctx.strokeStyle = '#febc2e'; ctx.lineWidth = 2; ctx.setLineDash([5, 4]); ctx.beginPath(); ctx.arc(el.cx, el.cy, el.r, 0, Math.PI * 2); ctx.stroke(); }
  } else if (el.type === 'text') {

    ctx.font = `600 ${el.size || 18}px system-ui,sans-serif`;
    ctx.fillText(el.text || '', el.x, el.y);
    if (selected) { const m = ctx.measureText(el.text || ''); ctx.strokeStyle = '#febc2e'; ctx.lineWidth = 1; ctx.setLineDash([4, 3]); ctx.strokeRect(el.x - 2, el.y - (el.size || 18), m.width + 4, (el.size || 18) + 4); }

    const im = anPicImg(el.picData);

    if (selected) { ctx.strokeStyle = '#febc2e'; ctx.lineWidth = 2; ctx.setLineDash([5, 4]); ctx.strokeRect(el.x, el.y, el.w, el.h); }
  }

}

async function camStartLive() {

}

}

}
function remAlarmSound() {
  const vol = 0.62, type = 'square', step = 0.26, beep = 0.24;
  const hi = 880, lo = 554;
  for (let i = 0; i < 8; i++) tone(i % 2 ? lo : hi, beep, type, vol, i * step);
  for (let i = 0; i < 8; i++) tone(i % 2 ? lo : hi, beep, type, vol, 2.6 + i * step);

  remItems.unshift({ id: Date.now(), text, done: false, due: due.value || null, notified: false });
  inp.value = ''; due.value = ''; remSave(); remRender();
}
function remToggle(id) { const it = remItems.find(r => r.id === id); if (it) { it.done = !it.done; remSave(); remRender(); } }
function remDel(id) { remItems = remItems.filter(r => r.id !== id); remSave(); remRender(); }
function remRender() {
  const l = document.getElementById('rem-list'); if (!l) return;
  if (!remItems.length) { l.innerHTML = '<div class="rem-empty">No reminders yet. Add one above ✨</div>'; return; }
  l.innerHTML = remItems.map(r => {
    const dueTxt = r.due ? new Date(r.due).toLocaleString([], { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }) : '';
    const overdue = r.due && !r.done && new Date(r.due) < new Date();
    return `<div class="rem-item${r.done ? ' done' : ''}">

      <span class="rem-text">${escapeHtml(r.text)}${dueTxt ? `<span class="rem-when${overdue ? ' over' : ''}">${overdue ? '⚠ ' : '🕒 '}${dueTxt}</span>` : ''}</span>
      <span class="rem-del" onclick="remDel(${r.id})">🗑</span>
    </div>`;
  }).join('');
}
function remCheckDue() {
  const now = Date.now();
  let changed = false, alarm = false;
  remItems.forEach(r => {
    if (r.due && !r.done && !r.notified && new Date(r.due).getTime() <= now) {
      r.notified = true; changed = true; alarm = true;
      notify('⏰', 'Reminder', r.text, 12000);
    }
  });
  if (alarm) remAlarmSound();
  if (changed) { remSave(); remRender(); }
}

// ── JUMP WORLD — a 2D Minecraft-style block sandbox ───────────────────────────
let jump = null, jumpSel = 1;
// block id → { name, color, solid }
const JW_BLOCKS = [
  { name: 'air',   color: null,      solid: false },
  { name: 'grass', color: '#5bbd4e', solid: true },
  { name: 'dirt',  color: '#8a5a3b', solid: true },
  { name: 'stone', color: '#8a8f98', solid: true },
  { name: 'wood',  color: '#9c6b3f', solid: true },
  { name: 'leaf',  color: '#3fae5a', solid: true },
  { name: 'sand',  color: '#e2cf86', solid: true },
  { name: 'brick', color: '#c0573f', solid: true },
  { name: 'glass', color: '#aee3ff', solid: true },
  { name: 'water', color: '#3a7bd5', solid: false },
];
const JW_COLS = 32, JW_ROWS = 20, JW_TILE = 22;
function buildJump() {
  return `<div class="jw-app">
    <div class="jw-palette" id="jw-palette">${JW_BLOCKS.slice(1).map((b, i) => `<button class="jw-blk${i === 0 ? ' active' : ''}" data-b="${i + 1}" title="${b.name}" style="background:${b.color}" onclick="jwPick(${i + 1})"></button>`).join('')}</div>
    <canvas id="jw-canvas" width="${JW_COLS * JW_TILE}" height="${JW_ROWS * JW_TILE}"></canvas>
    <div class="jw-bar">
      <span class="jw-hint">Move: A/D · Jump: W/Space · Click place · Right-click break</span>
      <span style="flex:1"></span>
      <button class="jw-b" onclick="jwReset()">🌱 New world</button>
    </div>
  </div>`;
}
function jwPick(b) { jumpSel = b; document.querySelectorAll('.jw-blk').forEach(el => el.classList.toggle('active', +el.dataset.b === b)); }
function jwKey() { return 'maxos_jumpworld_' + (currentUser?.username || 'guest'); }
function initJump() {
  const c = document.getElementById('jw-canvas'); if (!c) return;
  if (jump) jump.stop();
  const ctx = c.getContext('2d'), W = c.width, H = c.height, T = JW_TILE;
  let grid, px, py, vx, vy, onGround, raf, running = true, keys = {};
  function genWorld() {
    grid = Array.from({ length: JW_ROWS }, () => Array(JW_COLS).fill(0));
    const surface = JW_ROWS - 6;
    for (let x = 0; x < JW_COLS; x++) {
      const h = surface + Math.round(Math.sin(x / 4) * 1.5);
      for (let y = 0; y < JW_ROWS; y++) {
        if (y === h) grid[y][x] = 1;          // grass
        else if (y > h && y < h + 3) grid[y][x] = 2; // dirt
        else if (y >= h + 3) grid[y][x] = 3;  // stone
      }
    }
    // a little tree
    const tx = 6, th = surface - 1;
    for (let i = 0; i < 3; i++) grid[th - i][tx] = 4;
    for (let dy = -2; dy <= 0; dy++) for (let dx = -1; dx <= 1; dx++) if (grid[th - 3 + dy] && grid[th - 3 + dy][tx + dx] === 0) grid[th - 3 + dy][tx + dx] = 5;
  }
  function save() { try { localStorage.setItem(jwKey(), JSON.stringify(grid)); } catch (e) {} }
  function load() { try { const g = JSON.parse(localStorage.getItem(jwKey()) || 'null'); if (Array.isArray(g) && g.length === JW_ROWS) { grid = g; return true; } } catch (e) {} return false; }
  const solidAt = (x, y) => { const cx = Math.floor(x / T), cy = Math.floor(y / T); return cy >= 0 && cy < JW_ROWS && cx >= 0 && cx < JW_COLS && JW_BLOCKS[grid[cy][cx]].solid; };
  function spawn() { px = T * 2; py = T; vx = vy = 0; }
  function step() {
    if (!running) return;
    vx = (keys.l ? -2.6 : 0) + (keys.r ? 2.6 : 0);
    // horizontal
    let nx = px + vx;
    if (vx) { if (!solidAt(nx + (vx > 0 ? 15 : 0), py + 2) && !solidAt(nx + (vx > 0 ? 15 : 0), py + 28)) px = nx; }
    // gravity
    vy = Math.min(vy + 0.5, 9); let ny = py + vy; onGround = false;
    if (vy > 0) { if (solidAt(px + 3, ny + 30) || solidAt(px + 13, ny + 30)) { py = Math.floor((ny + 30) / T) * T - 30; vy = 0; onGround = true; } else py = ny; }
    else if (vy < 0) { if (solidAt(px + 3, ny) || solidAt(px + 13, ny)) vy = 0; else py = ny; }
    if (py > H + 40) spawn();
    px = Math.max(0, Math.min(W - 16, px));
    draw();
    raf = requestAnimationFrame(step);
  }
  function draw() {
    // sky
    const g = ctx.createLinearGradient(0, 0, 0, H); g.addColorStop(0, '#6db3ff'); g.addColorStop(1, '#bfe0ff'); ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
    for (let y = 0; y < JW_ROWS; y++) for (let x = 0; x < JW_COLS; x++) {
      const b = grid[y][x]; if (!b) continue;
      const bl = JW_BLOCKS[b];
      ctx.fillStyle = bl.color; ctx.globalAlpha = bl.name === 'water' || bl.name === 'glass' ? 0.6 : 1;
      ctx.fillRect(x * T, y * T, T, T);
      ctx.globalAlpha = 1; ctx.strokeStyle = 'rgba(0,0,0,.12)'; ctx.strokeRect(x * T + .5, y * T + .5, T, T);
    }
    ctx.fillStyle = '#ff5f57'; ctx.fillRect(px, py, 16, 30); // player
    ctx.fillStyle = '#fff'; ctx.fillRect(px + 3, py + 6, 4, 4); ctx.fillRect(px + 9, py + 6, 4, 4);
  }
  function edit(e, place) {
    const r = c.getBoundingClientRect(), t = e.touches ? e.touches[0] : e;
    const cx = Math.floor((t.clientX - r.left) * (W / r.width) / T), cy = Math.floor((t.clientY - r.top) * (H / r.height) / T);
    if (cy < 0 || cy >= JW_ROWS || cx < 0 || cx >= JW_COLS) return;
    grid[cy][cx] = place ? jumpSel : 0; save();
  }
  const kd = e => { const k = e.key.toLowerCase(); if (k === 'a' || e.key === 'ArrowLeft') keys.l = 1; if (k === 'd' || e.key === 'ArrowRight') keys.r = 1; if ((k === 'w' || k === ' ' || e.key === 'ArrowUp') && onGround) { vy = -8.4; e.preventDefault(); } };
  const ku = e => { const k = e.key.toLowerCase(); if (k === 'a' || e.key === 'ArrowLeft') keys.l = 0; if (k === 'd' || e.key === 'ArrowRight') keys.r = 0; };
  addEventListener('keydown', kd); addEventListener('keyup', ku);
  c.onmousedown = e => { edit(e, e.button !== 2); };
  c.oncontextmenu = e => { e.preventDefault(); edit(e, false); };
  c.ontouchstart = e => { e.preventDefault(); edit(e, true); };
  jump = { stop() { running = false; cancelAnimationFrame(raf); removeEventListener('keydown', kd); removeEventListener('keyup', ku); }, _new() { genWorld(); save(); spawn(); } };
  if (!load()) genWorld();
  spawn(); step();
}
function jwReset() { if (jump && jump._new) jump._new(); }

// ── MINESWEEPER ───────────────────────────────────────────────────────────────
let mines = null, minesFlagMode = false;
function buildMines() {
  return `<div class="mines-app">
    <div class="mines-hud"><button class="mines-face" id="mines-face" onclick="initMines()">🙂</button>
      <button class="mines-flag" id="mines-flagbtn" onclick="minesToggleMode()">🚩 flag: off</button>
      <span id="mines-flags">💣 10</span></div>
    <div id="mines-grid" class="mines-grid"></div>
    <div class="mines-hint">Click reveal · right-click or 🚩 mode to flag</div>
  </div>`;
}
function minesToggleMode() { minesFlagMode = !minesFlagMode; const b = document.getElementById('mines-flagbtn'); if (b) { b.textContent = '🚩 flag: ' + (minesFlagMode ? 'on' : 'off'); b.classList.toggle('on', minesFlagMode); } }
function initMines() {
  const N = 9, M = 10;
  const grid = document.getElementById('mines-grid'); if (!grid) return;
  let cells = [], revealed = 0, flags = 0, over = false, placed = false;
  document.getElementById('mines-face').textContent = '🙂';
  document.getElementById('mines-flags').textContent = '💣 ' + M;
  const idx = (r, c) => r * N + c;
  cells = Array.from({ length: N * N }, () => ({ mine: false, rev: false, flag: false, n: 0 }));
  grid.style.gridTemplateColumns = `repeat(${N},1fr)`;
  grid.innerHTML = cells.map((_, i) => `<div class="mcell" data-i="${i}"></div>`).join('');
  grid.querySelectorAll('.mcell').forEach(el => {
    el.onclick = () => { const i = +el.dataset.i; minesFlagMode ? toggleFlag(i) : reveal(i); };
    el.oncontextmenu = e => { e.preventDefault(); toggleFlag(+el.dataset.i); };
  });
  function place(safe) {
    let m = 0;
    while (m < M) { const i = Math.floor(Math.random() * N * N); if (!cells[i].mine && i !== safe) { cells[i].mine = true; m++; } }
    for (let r = 0; r < N; r++) for (let c = 0; c < N; c++) { let n = 0; for (let dr = -1; dr <= 1; dr++) for (let dc = -1; dc <= 1; dc++) { const nr = r + dr, nc = c + dc; if (nr >= 0 && nr < N && nc >= 0 && nc < N && cells[idx(nr, nc)].mine) n++; } cells[idx(r, c)].n = n; }
    placed = true;
  }
  function reveal(i) {
    if (over || cells[i].rev || cells[i].flag) return;
    if (!placed) place(i);

function rgbToHsl(r, g, b) {
  r /= 255; g /= 255; b /= 255;
  const mx = Math.max(r, g, b), mn = Math.min(r, g, b); let h, s, l = (mx + mn) / 2;

}

let _ac = null;

function tone(freq, dur = 0.4, type = 'sine', vol = 0.2, when = 0) {
  const ac = getAC(), t = ac.currentTime + when;

// ══ TETRIS ════════════════════════════════════════════════════════════════════
let tetris = null;
function buildTetris() {
  return `<div class="gshell"><div class="tetris-wrap">
    <canvas id="tetris-canvas" width="200" height="400" style="background:#0d1117;border-radius:8px;border:1px solid rgba(255,255,255,.1)"></canvas>
    <div class="tetris-side">

      <div class="tetris-panel"><div class="lbl">Level</div><div class="val" id="tetris-level">1</div></div>
      <div class="tetris-panel"><div class="lbl">Lines</div><div class="val" id="tetris-lines">0</div></div>
      <div class="tetris-panel"><div class="lbl">Next</div><canvas id="tetris-next" width="64" height="64"></canvas></div>
    </div>
  </div><div class="ghint">← → move · ↑ rotate · ↓ soft drop · Space hard drop</div></div>`;
}
const TET_COLORS = [null,'#00f0f0','#0000f0','#f0a000','#f0f000','#00f000','#a000f0','#f00000'];
const TET_SHAPES = [[],
  [[1,1,1,1]], [[2,0,0],[2,2,2]], [[0,0,3],[3,3,3]], [[4,4],[4,4]],
  [[0,5,5],[5,5,0]], [[0,6,0],[6,6,6]], [[7,7,0],[0,7,7]]];
function initTetris() {
  const c = document.getElementById('tetris-canvas'); if (!c) return;
  const ctx = c.getContext('2d'), CELL = 20, COLS = 10, ROWS = 20;
  let grid, piece, nextP, score, level, lines, dropTimer, gameOver;
  function newPiece() { const id = 1 + Math.floor(Math.random() * 7); return { id, shape: TET_SHAPES[id], x: 3, y: 0 }; }
  function reset() { grid = Array.from({ length: ROWS }, () => Array(COLS).fill(0)); piece = newPiece(); nextP = newPiece(); score = 0; level = 1; lines = 0; gameOver = false; schedule(); draw(); }
  function schedule() { clearInterval(dropTimer); dropTimer = setInterval(() => tick(), Math.max(80, 600 - (level - 1) * 50)); }
  function collide(p, dx, dy, shape) { shape = shape || p.shape; for (let r = 0; r < shape.length; r++) for (let cc = 0; cc < shape[r].length; cc++) { if (!shape[r][cc]) continue; const nx = p.x + cc + dx, ny = p.y + r + dy; if (nx < 0 || nx >= COLS || ny >= ROWS) return true; if (ny >= 0 && grid[ny][nx]) return true; } return false; }
  function merge() { piece.shape.forEach((row, r) => row.forEach((v, cc) => { if (v) { const ny = piece.y + r; if (ny >= 0) grid[ny][piece.x + cc] = v; } })); }
  function clearLines() { let cleared = 0; for (let r = ROWS - 1; r >= 0; r--) { if (grid[r].every(v => v)) { grid.splice(r, 1); grid.unshift(Array(COLS).fill(0)); cleared++; r++; } } if (cleared) { lines += cleared; score += [0, 100, 300, 500, 800][cleared] * level; level = 1 + Math.floor(lines / 10); schedule(); tone([0,523,659,784,1047][cleared] || 523, 0.15, 'square', 0.15); upd(); } }
  function tick() { if (gameOver) return; if (!collide(piece, 0, 1)) piece.y++; else { merge(); clearLines(); piece = nextP; nextP = newPiece(); if (collide(piece, 0, 0)) { gameOver = true; clearInterval(dropTimer); tone(160, 0.5, 'sawtooth', 0.2); notify('🧩', 'Game Over', 'Score: ' + score); } } draw(); }
  function rotate() { const s = piece.shape, R = s[0].map((_, i) => s.map(row => row[i]).reverse()); if (!collide(piece, 0, 0, R)) piece.shape = R; }
  function upd() { document.getElementById('tetris-score').textContent = score; document.getElementById('tetris-level').textContent = level; document.getElementById('tetris-lines').textContent = lines; }
  function drawCell(x, y, id, g) { g.fillStyle = TET_COLORS[id]; g.fillRect(x * CELL + 1, y * CELL + 1, CELL - 2, CELL - 2); g.fillStyle = 'rgba(255,255,255,.2)'; g.fillRect(x * CELL + 1, y * CELL + 1, CELL - 2, 3); }
  function draw() {
    ctx.fillStyle = '#0d1117'; ctx.fillRect(0, 0, c.width, c.height);
    for (let r = 0; r < ROWS; r++) for (let cc = 0; cc < COLS; cc++) if (grid[r][cc]) drawCell(cc, r, grid[r][cc], ctx);
    piece.shape.forEach((row, r) => row.forEach((v, cc) => { if (v) drawCell(piece.x + cc, piece.y + r, v, ctx); }));
    const nc = document.getElementById('tetris-next'); if (nc) { const ng = nc.getContext('2d'); ng.clearRect(0, 0, 64, 64); ng.save(); ng.scale(0.7, 0.7); nextP.shape.forEach((row, r) => row.forEach((v, cc) => { if (v) drawCell(cc + 0.5, r + 0.5, v, ng); })); ng.restore(); }

    if (gameOver) { if (e.key === ' ') reset(); return; }

    else if (e.key === 'ArrowRight' && !collide(piece, 1, 0)) piece.x++;
    else if (e.key === 'ArrowDown' && !collide(piece, 0, 1)) { piece.y++; score++; }
    else if (e.key === 'ArrowUp') rotate();

// ══ BREAKOUT ══════════════════════════════════════════════════════════════════
let breakout = null;
function buildBreakout() {
  return `<div class="gshell">
    <div class="grow"><span>Score: <b id="bo-score">0</b></span><span>Lives: <b id="bo-lives">3</b></span><span>Level: <b id="bo-level">1</b></span></div>
    <canvas id="bo-canvas" width="440" height="380" style="background:#0a0a16;border-radius:8px"></canvas>
    <div class="ghint">Move mouse to control paddle · click to launch</div></div>`;
}
function initBreakout() {
  const c = document.getElementById('bo-canvas'); if (!c) return;
  const ctx = c.getContext('2d'), W = c.width, H = c.height;
  let paddle, ball, bricks, score, lives, level, running, raf;
  const COLORS = ['#ff5f57','#febc2e','#28c840','#64b4ff','#bf5af2'];
  function makeBricks() { bricks = []; const rows = 4 + level, cols = 9, bw = (W - 40) / cols, bh = 18; for (let r = 0; r < rows; r++) for (let cc = 0; cc < cols; cc++) bricks.push({ x: 20 + cc * bw, y: 40 + r * (bh + 5), w: bw - 5, h: bh, c: COLORS[r % COLORS.length], alive: true }); }
  function reset(full) { paddle = { x: W / 2 - 45, w: 90, h: 12 }; ball = { x: W / 2, y: H - 40, dx: 0, dy: 0, r: 7, stuck: true }; if (full) { score = 0; lives = 3; level = 1; } makeBricks(); upd(); }
  function upd() { document.getElementById('bo-score').textContent = score; document.getElementById('bo-lives').textContent = lives; document.getElementById('bo-level').textContent = level; }
  function launch() { if (ball.stuck) { ball.stuck = false; ball.dx = 3.5 * (Math.random() > .5 ? 1 : -1); ball.dy = -4; } }
  function loop() {
    ctx.fillStyle = '#0a0a16'; ctx.fillRect(0, 0, W, H);
    if (ball.stuck) { ball.x = paddle.x + paddle.w / 2; ball.y = H - 40; }
    else { ball.x += ball.dx; ball.y += ball.dy; if (ball.x < ball.r || ball.x > W - ball.r) ball.dx *= -1; if (ball.y < ball.r) ball.dy *= -1;
      if (ball.y > H) { lives--; upd(); if (lives <= 0) { tone(140, 0.5, 'sawtooth', 0.2); notify('🧱', 'Game Over', 'Score: ' + score); running = false; } reset(false); } }
    // paddle collision
    if (ball.y + ball.r > H - 24 && ball.y < H - 12 && ball.x > paddle.x && ball.x < paddle.x + paddle.w) { ball.dy = -Math.abs(ball.dy); const hit = (ball.x - (paddle.x + paddle.w / 2)) / (paddle.w / 2); ball.dx = hit * 5; tone(440, 0.05, 'square', 0.1); }
    // bricks
    let alive = 0;
    for (const b of bricks) { if (!b.alive) continue; alive++;
      if (ball.x > b.x && ball.x < b.x + b.w && ball.y - ball.r < b.y + b.h && ball.y + ball.r > b.y) { b.alive = false; ball.dy *= -1; score += 10 * level; upd(); tone(600 + Math.random() * 200, 0.05, 'square', 0.12); }
      ctx.fillStyle = b.c; ctx.fillRect(b.x, b.y, b.w, b.h); }
    if (alive === 0) { level++; tone(880, 0.3, 'square', 0.15); reset(false); }
    // draw
    ctx.fillStyle = '#fff'; ctx.fillRect(paddle.x, H - 24, paddle.w, paddle.h);
    ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.r, 0, 7); ctx.fillStyle = '#64b4ff'; ctx.fill();
    if (running) raf = requestAnimationFrame(loop);
  }
  c.onmousemove = e => { const r = c.getBoundingClientRect(); paddle.x = Math.max(0, Math.min(W - paddle.w, e.clientX - r.left - paddle.w / 2)); };
  c.onclick = launch;
  reset(true); running = true; breakout = { stop: () => { running = false; cancelAnimationFrame(raf); } }; loop();
}

// ══ CONWAY'S GAME OF LIFE ════════════════════════════════════════════════════
let life = null;
function buildLife() {
  return `<div class="gshell">
    <div class="grow"><button class="gbtn" id="life-play" onclick="lifeToggle()">▶ Play</button>
      <button class="gbtn" onclick="lifeStep()">Step</button>
      <button class="gbtn" onclick="lifeRandom()">Random</button>
      <button class="gbtn" onclick="lifeClear()">Clear</button>
      <span>Gen: <b id="life-gen">0</b></span></div>
    <canvas id="life-canvas" width="480" height="400" style="background:#0a0a16;border-radius:8px;cursor:cell"></canvas>
    <div class="ghint">Click/drag to toggle cells · 🟦 Glider gun ready in Random</div></div>`;
}
function initLife() {
  const c = document.getElementById('life-canvas'); if (!c) return;
  const ctx = c.getContext('2d'), CELL = 8, COLS = 60, ROWS = 50;
  let grid = Array.from({ length: ROWS }, () => Array(COLS).fill(0)), gen = 0, timer = null, painting = false;
  function draw() {
    ctx.fillStyle = '#0a0a16'; ctx.fillRect(0, 0, c.width, c.height);
    for (let r = 0; r < ROWS; r++) for (let cc = 0; cc < COLS; cc++) if (grid[r][cc]) { ctx.fillStyle = `hsl(${(r + cc) * 4 % 360},70%,60%)`; ctx.fillRect(cc * CELL, r * CELL, CELL - 1, CELL - 1); }
    document.getElementById('life-gen').textContent = gen;
  }
  function step() { const n = grid.map(r => [...r]); for (let r = 0; r < ROWS; r++) for (let cc = 0; cc < COLS; cc++) { let cnt = 0; for (let dr = -1; dr <= 1; dr++) for (let dc = -1; dc <= 1; dc++) { if (!dr && !dc) continue; const rr = r + dr, ccc = cc + dc; if (rr >= 0 && rr < ROWS && ccc >= 0 && ccc < COLS) cnt += grid[rr][ccc]; } n[r][cc] = grid[r][cc] ? (cnt === 2 || cnt === 3 ? 1 : 0) : (cnt === 3 ? 1 : 0); } grid = n; gen++; draw(); }
  function xy(e) { const r = c.getBoundingClientRect(); return [Math.floor((e.clientY - r.top) / CELL), Math.floor((e.clientX - r.left) / CELL)]; }
  c.onmousedown = e => { painting = true; const [r, cc] = xy(e); if (grid[r]) { grid[r][cc] = grid[r][cc] ? 0 : 1; draw(); } };
  c.onmousemove = e => { if (!painting) return; const [r, cc] = xy(e); if (grid[r] && !grid[r][cc]) { grid[r][cc] = 1; draw(); } };
  c.onmouseup = c.onmouseleave = () => painting = false;
  life = {
    toggle() { if (timer) { clearInterval(timer); timer = null; document.getElementById('life-play').textContent = '▶ Play'; } else { timer = setInterval(step, 90); document.getElementById('life-play').textContent = '⏸ Pause'; } },
    step, clear() { grid = Array.from({ length: ROWS }, () => Array(COLS).fill(0)); gen = 0; draw(); },
    random() { for (let r = 0; r < ROWS; r++) for (let cc = 0; cc < COLS; cc++) grid[r][cc] = Math.random() < 0.3 ? 1 : 0; gen = 0; draw(); },
    stop() { clearInterval(timer); }
  };
  life.random();
}
function lifeToggle() { life?.toggle(); } function lifeStep() { life?.step(); } function lifeRandom() { life?.random(); } function lifeClear() { life?.clear(); }

let fractal = null;
function buildFractal() {
  return `<div class="gshell" style="padding:0">
    <canvas id="fractal-canvas" width="540" height="500" style="cursor:zoom-in"></canvas>
    <div class="ghint" style="padding:8px">Click to zoom in · right-click to zoom out · <button class="gbtn" style="padding:3px 10px" onclick="fractalReset()">Reset</button></div></div>`;
}
function initFractal() {
  const c = document.getElementById('fractal-canvas'); if (!c) return;
  const ctx = c.getContext('2d'), W = c.width, H = c.height;
  let cx = -0.5, cy = 0, scale = 3, maxIter = 100;
  function render() {
    const img = ctx.createImageData(W, H), d = img.data;
    for (let py = 0; py < H; py++) for (let px = 0; px < W; px++) {
      const x0 = cx + (px - W / 2) / W * scale, y0 = cy + (py - H / 2) / H * scale;
      let x = 0, y = 0, i = 0;
      while (x * x + y * y < 4 && i < maxIter) { const xt = x * x - y * y + x0; y = 2 * x * y + y0; x = xt; i++; }
      const idx = (py * W + px) * 4;
      if (i === maxIter) { d[idx] = d[idx + 1] = d[idx + 2] = 0; }
      else { const h = (i / maxIter); d[idx] = 9 * (1 - h) * h * h * h * 255; d[idx + 1] = 15 * (1 - h) * (1 - h) * h * h * 255; d[idx + 2] = 8.5 * (1 - h) * (1 - h) * (1 - h) * h * 255; }
      d[idx + 3] = 255;
    }
    ctx.putImageData(img, 0, 0);
  }
  c.onclick = e => { const r = c.getBoundingClientRect(); cx += ((e.clientX - r.left) - W / 2) / W * scale; cy += ((e.clientY - r.top) - H / 2) / H * scale; scale *= 0.5; maxIter = Math.min(500, maxIter + 30); render(); };
  c.oncontextmenu = e => { e.preventDefault(); scale *= 2; maxIter = Math.max(100, maxIter - 30); render(); };
  fractal = { reset() { cx = -0.5; cy = 0; scale = 3; maxIter = 100; render(); } };
  render();
}
function fractalReset() { fractal?.reset(); }

  const src = document.getElementById('md-input').value;
  let h = src
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/```([\s\S]*?)```/g, (m, c) => `<pre><code>${c.trim()}</code></pre>`)
    .replace(/^### (.*)$/gm, '<h3>$1</h3>').replace(/^## (.*)$/gm, '<h2>$1</h2>').replace(/^# (.*)$/gm, '<h1>$1</h1>')
    .replace(/^&gt; (.*)$/gm, '<blockquote>$1</blockquote>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>').replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/`(.+?)`/g, '<code>$1</code>')
    .replace(/\[(.+?)\]\((.+?)\)/g, '<a href="$2" target="_blank">$1</a>')
    .replace(/^\d+\. (.*)$/gm, '<oli>$1</oli>').replace(/^[-*] (.*)$/gm, '<uli>$1</uli>');
  h = h.replace(/(<uli>.*<\/uli>\n?)+/g, m => '<ul>' + m.replace(/<\/?uli>/g, t => t === '<uli>' ? '<li>' : '</li>') + '</ul>');
  h = h.replace(/(<oli>.*<\/oli>\n?)+/g, m => '<ol>' + m.replace(/<\/?oli>/g, t => t === '<oli>' ? '<li>' : '</li>') + '</ol>');
  h = h.split('\n\n').map(b => /^\s*<(h\d|ul|ol|pre|blockquote)/.test(b.trim()) ? b : (b.trim() ? '<p>' + b.replace(/\n/g, '<br>') + '</p>' : '')).join('');

}

  }).join('');

  if (!typing.started) typing.started = Date.now();

  const words = typed.trim().split(/\s+/).filter(Boolean).length;
  const wpm = elapsed > 0 ? Math.round(words / elapsed * 60) : 0;
  let correct = 0; for (let i = 0; i < typed.length; i++) if (typed[i] === typing.text[i]) correct++;

function chessColor(p) { return p === '.' ? null : (p === p.toUpperCase() ? 'w' : 'b'); }
function chessSetStatus(t) { const e = document.getElementById('chess-status'); if (e) e.textContent = t; }

// Is square (tr,tc) attacked by color `by`?
function chessAttacked(board, tr, tc, by) {
  const pdir = by === 'w' ? 1 : -1; // a `by` pawn sits one rank toward its own side
  for (const dc of [-1, 1]) { const pr = tr + pdir, pc = tc + dc; if (pr >= 0 && pr < 8 && pc >= 0 && pc < 8) { const p = board[pr][pc]; if (p !== '.' && chessColor(p) === by && p.toLowerCase() === 'p') return true; } }
  for (const [dr, dc] of [[-2,-1],[-2,1],[-1,-2],[-1,2],[1,-2],[1,2],[2,-1],[2,1]]) { const r = tr+dr, c = tc+dc; if (r>=0&&r<8&&c>=0&&c<8) { const p = board[r][c]; if (p !== '.' && chessColor(p) === by && p.toLowerCase() === 'n') return true; } }
  for (let dr = -1; dr <= 1; dr++) for (let dc = -1; dc <= 1; dc++) { if (!dr && !dc) continue; const r = tr+dr, c = tc+dc; if (r>=0&&r<8&&c>=0&&c<8) { const p = board[r][c]; if (p !== '.' && chessColor(p) === by && p.toLowerCase() === 'k') return true; } }
  for (const [dr, dc] of CH_DIRS.ortho) { let r = tr+dr, c = tc+dc; while (r>=0&&r<8&&c>=0&&c<8) { const p = board[r][c]; if (p !== '.') { if (chessColor(p) === by && (p.toLowerCase() === 'r' || p.toLowerCase() === 'q')) return true; break; } r += dr; c += dc; } }
  for (const [dr, dc] of CH_DIRS.diag) { let r = tr+dr, c = tc+dc; while (r>=0&&r<8&&c>=0&&c<8) { const p = board[r][c]; if (p !== '.') { if (chessColor(p) === by && (p.toLowerCase() === 'b' || p.toLowerCase() === 'q')) return true; break; } r += dr; c += dc; } }
  return false;
}
function chessKing(board, color) { const k = color === 'w' ? 'K' : 'k'; for (let r = 0; r < 8; r++) for (let c = 0; c < 8; c++) if (board[r][c] === k) return [r, c]; return null; }
function chessInCheck(board, color) { const k = chessKing(board, color); return k ? chessAttacked(board, k[0], k[1], color === 'w' ? 'b' : 'w') : false; }

// Pseudo-legal moves for the piece at (r,c)
function chessPieceMoves(board, r, c, castle) {
  const p = board[r][c]; if (p === '.') return [];
  const me = chessColor(p), t = p.toLowerCase(), moves = [];
  const last = me === 'w' ? 0 : 7;

  const pawnAdd = (r1, c1) => { if (r1 === last) moves.push({ r0: r, c0: c, r1, c1, promo: 'q' }); else moves.push({ r0: r, c0: c, r1, c1 }); };

    for (const dc of [-1, 1]) { const r1 = r+dir, c1 = c+dc; if (r1>=0&&r1<8&&c1>=0&&c1<8) { const tp = board[r1][c1]; if (tp !== '.' && chessColor(tp) !== me) pawnAdd(r1, c1); } }
  } else if (t === 'n') { for (const [dr, dc] of [[-2,-1],[-2,1],[-1,-2],[-1,2],[1,-2],[1,2],[2,-1],[2,1]]) add(r+dr, c+dc); }
  else if (t === 'k') {

// ══ MAPS (Leaflet + OpenStreetMap + Nominatim search — all free, no key) ══════
let mapsObj = null, mapsMarker = null, leafletLoading = null;
const MAPS_PRESETS = [
  { n: 'New York', lat: 40.7128, lon: -74.006 }, { n: 'London', lat: 51.5074, lon: -0.1278 },
  { n: 'Tokyo', lat: 35.6895, lon: 139.6917 }, { n: 'Paris', lat: 48.8566, lon: 2.3522 },
  { n: 'Sydney', lat: -33.8688, lon: 151.2093 }, { n: 'Cairo', lat: 30.0444, lon: 31.2357 },
];
function buildMaps() {
  return `<div class="maps-app">
    <div class="maps-bar">
      <input id="maps-q" placeholder="Search any place…" onkeydown="if(event.key==='Enter')mapsSearch()">
      <button onclick="mapsSearch()">Search</button>
      <button onclick="mapsLocate()" title="My location">📍 Me</button>
    </div>
    <div class="maps-presets">${MAPS_PRESETS.map(p => `<button class="maps-preset" onclick="mapsGoto(${p.lat},${p.lon},'${p.n}')">${p.n}</button>`).join('')}</div>
    <div id="maps-canvas"></div>
  </div>`;
}
function loadLeaflet() {
  if (window.L) return Promise.resolve();
  if (leafletLoading) return leafletLoading;
  leafletLoading = new Promise((resolve, reject) => {
    const css = document.createElement('link');
    css.rel = 'stylesheet'; css.href = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.css';
    document.head.appendChild(css);
    const sc = document.createElement('scr' + 'ipt');
    sc.src = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.js';
    sc.onload = resolve; sc.onerror = reject;
    document.head.appendChild(sc);
  });
  return leafletLoading;
}
async function initMaps() {
  const canvas = document.getElementById('maps-canvas');
  if (!canvas) return;
  canvas.innerHTML = '<div style="color:rgba(255,255,255,.4);text-align:center;padding:40px">Loading map…</div>';
  try { await loadLeaflet(); } catch { canvas.innerHTML = '<div style="color:#ff8a84;text-align:center;padding:40px">Map failed to load.<br><small style="color:rgba(255,255,255,.4)">Check your connection.</small></div>'; return; }
  canvas.innerHTML = '';
  mapsObj = L.map(canvas, { zoomControl: true }).setView([20, 0], 2);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap', maxZoom: 19 }).addTo(mapsObj);
  setTimeout(() => mapsObj && mapsObj.invalidateSize(), 250);
}
function mapsDrop(lat, lon, label, zoom) {
  if (!mapsObj) return;
  mapsObj.flyTo([lat, lon], zoom || 12);
  if (mapsMarker) mapsObj.removeLayer(mapsMarker);
  mapsMarker = L.marker([lat, lon]).addTo(mapsObj);
  if (label) mapsMarker.bindPopup(label).openPopup();
}
function mapsGoto(lat, lon, name) { mapsDrop(lat, lon, name, 11); }
async function mapsSearch() {
  const q = document.getElementById('maps-q').value.trim();
  if (!q || !mapsObj) return;
  try {
    const r = await fetch('https://nominatim.openstreetmap.org/search?q=' + encodeURIComponent(q) + '&format=json&limit=1').then(r => r.json());
    if (!r.length) { notify('🗺️', 'Not found', `No results for "${q}"`); return; }
    mapsDrop(+r[0].lat, +r[0].lon, r[0].display_name, 13);
  } catch { notify('🗺️', 'Error', 'Search failed — check connection'); }
}
function mapsLocate() {
  if (!navigator.geolocation) { notify('🗺️', 'Unavailable', 'Geolocation not supported'); return; }
  navigator.geolocation.getCurrentPosition(
    p => mapsDrop(p.coords.latitude, p.coords.longitude, 'You are here', 14),
    () => notify('🗺️', 'Location blocked', 'Permission denied')
  );
}

    else if (MS_COLORS[low]) { if (type === 'button') { css.push('background:' + MS_COLORS[low], 'color:' + (MS_LIGHT.has(low) ? '#222' : '#fff')); } else css.push('color:' + MS_COLORS[low]); }
    else if (low === 'round' || low === 'pill') css.push('border-radius:999px');
    else if (low === 'square') css.push('border-radius:6px');
    else if (low === 'huge') css.push('font-size:30px');
    else if (low === 'big') css.push('font-size:21px');
    else if (low === 'small') css.push('font-size:12px');
    else if (low === 'bold') css.push('font-weight:700');
    else if (low === 'center') css.push('text-align:center', 'margin-left:auto', 'margin-right:auto');
    else if (low === 'shadow') css.push('box-shadow:0 4px 16px rgba(0,0,0,.35)');
    else label.push(t); // unrecognized token → part of the label
  }
  return { id, label: label.join(', '), css: css.join(';') };
}
// Compile MaxScript markup → { html, js }. Top-level "type name: (props) label"
// lines become elements (the optional name lets other code refer to them);
// indented lines under a button become its click action.
function maxCompile(src) {
  const lines = (src || '').split('\n'), htmlOut = [], handlers = [], initLines = [];
  let auto = 0;
  const MS_STMT = /^(?:if|elif|else|repeat|end|set|show|alert|add|subtract|call|return|to|on)\b/i;
  for (let i = 0; i < lines.length; i++) {
    const raw = lines[i], trimmed = raw.trim();
    if (!trimmed || trimmed.startsWith('#') || trimmed.startsWith('//')) continue;
    if (/^\s/.test(raw)) { initLines.push(raw); continue; } // stray indented → init code
    if (MS_STMT.test(trimmed)) { initLines.push(raw); continue; } // logic line — never a UI element
    // type, optional plain-word name, then ": rest"
    const m = trimmed.match(/^([a-zA-Z]+)(?:\s+([a-zA-Z_][\w-]*))?\s*:\s*(.*)$/);
    if (!m) { initLines.push(raw); continue; }
    const type = m[1].toLowerCase();
    if (!['button', 'title', 'text', 'label', 'input', 'image'].includes(type)) { initLines.push(raw); continue; }
    const explicitName = m[2]; let rest = m[3], props = [], trailing = rest;
    const pm = rest.match(/^\(([^)]*)\)\s*(.*)$/);
    if (pm) { props = pm[1].split(','); trailing = pm[2]; }
    const sty = msStyle(type, props);
    const label = (trailing && trailing.trim()) ? trailing.trim() : sty.label;
    const id = explicitName || sty.id || (type + (++auto));
    const st = sty.css ? ` style="${sty.css}"` : '';
    if (type === 'button') {
      htmlOut.push(`<button id="${id}" class="ms-el"${st}>${escapeHtml(label || 'Button')}</button>`);
      const body = [];
      while (i + 1 < lines.length && (/^\s/.test(lines[i + 1]) || !lines[i + 1].trim())) { i++; if (lines[i].trim()) body.push(lines[i]); }
      handlers.push(`MS.onClick(${JSON.stringify(id)}, function(){\n${maxTranspile(body.join('\n'))}\n});`);
    } else if (type === 'title') htmlOut.push(`<h1 id="${id}" class="ms-el"${st}>${escapeHtml(label)}</h1>`);
    else if (type === 'text' || type === 'label') htmlOut.push(`<p id="${id}" class="ms-el"${st}>${escapeHtml(label)}</p>`);
    else if (type === 'input') htmlOut.push(`<input id="${id}" class="ms-el" placeholder="${escapeHtml(label)}"${st}>`);
    else if (type === 'image') htmlOut.push(`<img id="${id}" class="ms-el" src="${escapeHtml(label)}"${st ? st.slice(0, -1) + ';max-width:100%"' : ' style="max-width:100%"'}>`);
  }
  // Declare every variable once at the top so handlers share state (not shadow it)
  const vars = new Set();
  (src || '').split('\n').forEach(l => {
    const t = l.trim(); let mm;
    if (mm = t.match(/^set\s+([a-zA-Z_]\w*)\s+to\b/i)) { if (!/^(text|html)$/i.test(mm[1])) vars.add(mm[1]); }
    else if (mm = t.match(/^add\s+.+\s+to\s+([a-zA-Z_]\w*)$/i)) vars.add(mm[1]);
    else if (mm = t.match(/^subtract\s+.+\s+from\s+([a-zA-Z_]\w*)$/i)) vars.add(mm[1]);
  });
  const decl = vars.size ? `let ${[...vars].join(', ')};\n` : '';
  const js = decl + (initLines.length ? maxTranspile(initLines.join('\n')) + '\n' : '') + handlers.join('\n');
  return { html: htmlOut.join('\n'), js };
}
// Returns { html, css, js } ready to inject for any app (JS or MaxScript)
function compileApp(def) {
  if (def.lang === 'maxscript') {
    const c = maxCompile(def.js || '');
    return { html: (def.html || '') + c.html, css: MS_BASE_CSS + (def.css || ''), js: MS_RUNTIME + '\n' + c.js };
  }
  return { html: def.html || '', css: def.css || '', js: def.js || '' };
}

// ══ Custom apps (stored in MongoDB, shared across all users) ══════════════════
let customApps = {}; // id -> def, cached from server
function registerCustomApp(def) {
  const mine = def.author === currentUser?.username;
  apps[def.id] = {
    title: def.title, short: def.title.length > 12 ? def.title.slice(0, 11) + '…' : def.title, icon: def.icon || '🧩',
    w: 540, h: 460, cat: mine ? 'My Apps' : 'Community', custom: true,
    desc: (def.desc || 'A community app') + (def.author ? ' · by @' + def.author : ''),
    html: () => `<iframe class="custom-frame" id="custframe-${def.id}"></iframe>`,
  };
}
function customRender(id) {
  const def = customApps[id]; if (!def) return;
  const frame = document.getElementById('custframe-' + id); if (!frame) return;
  const doc = frame.contentDocument || frame.contentWindow.document;
  doc.open(); doc.close();
  doc.documentElement.replaceChildren(doc.createElement('head'), doc.createElement('body'));
  const out = compileApp(def);
  const style = doc.createElement('style'); style.textContent = out.css; doc.head.appendChild(style);
  doc.body.innerHTML = out.html;
  if (out.js) { const sc = doc.createElement('scr' + 'ipt'); sc.textContent = 'try{' + out.js + '}catch(e){document.body.innerHTML+="<pre style=\\"color:red;padding:10px\\">"+e+"</pre>"}'; doc.body.appendChild(sc); }
}
// Fetch every community app from the server and register them
async function loadCustomApps() {
  const list = await apiFetch('/api/apps');
  if (list.error || !Array.isArray(list)) return;
  // drop previously-registered customs, then re-add
  Object.keys(customApps).forEach(id => { if (apps[id]) delete apps[id]; });
  customApps = {};
  list.forEach(def => { customApps[def.id] = def; registerCustomApp(def); });
  renderDesktop(); renderStartApps();
  if (windows['appstore']) renderStoreGrid();
  if (windows['makeyourownwebsite']) studioRenderList();

// Deep link: fetch a single app on demand if not already known
async function ensureCustomApp(id) {
  if (apps[id]) return true;
  const def = await apiFetch('/api/apps/' + encodeURIComponent(id));
  if (def.error || !def.id) return false;
  customApps[def.id] = def; registerCustomApp(def);
  return true;
}

// ══ MAX SHEETS — spreadsheet with formulas ════════════════════════════════════
const SHEET_COLS = 12, SHEET_ROWS = 30;
let sheetData = {}, sheetPath = null;
function buildSheets() {
  return `<div class="gapp">
    <div class="gapp-head"><span class="gicon">📊</span><input class="gname" id="sheets-name" value="Untitled Sheet"></div>

      <span style="color:#5f6368;font-size:12px;margin-left:6px">Type =A1+B1 or =SUM(A1:A5) for formulas</span>
    </div>
    <div class="sheets-wrap"><table class="sheet" id="sheet-table"></table></div>
  </div>`;
}
function initSheets() { sheetData = {}; sheetPath = null; sharedSheetId = null; sheetRows = SHEET_ROWS; sheetRender(); }
let sheetRows = SHEET_ROWS;
function colLabel(i) { return String.fromCharCode(65 + i); }
function sheetRender() {
  const t = document.getElementById('sheet-table'); if (!t) return;
  let html = '<tr><th class="rownum"></th>';
  for (let c = 0; c < SHEET_COLS; c++) html += `<th>${colLabel(c)}</th>`;
  html += '</tr>';
  for (let r = 1; r <= sheetRows; r++) {
    html += `<tr><td class="rownum">${r}</td>`;
    for (let c = 0; c < SHEET_COLS; c++) {
      const ref = colLabel(c) + r, raw = sheetData[ref] || '';
      const val = raw.startsWith('=') ? sheetEval(raw) : raw;
      html += `<td><input data-ref="${ref}" value="${String(val).replace(/"/g, '&quot;')}" onfocus="sheetFocus(this)" onblur="sheetBlur(this)" onkeydown="sheetKey(event,this)"></td>`;
    }
    html += '</tr>';
  }
  t.innerHTML = html;
}
function sheetFocus(el) { el.value = sheetData[el.dataset.ref] || ''; } // show raw formula
function sheetBlur(el) {
  const ref = el.dataset.ref, v = el.value;
  if (v === '') delete sheetData[ref]; else sheetData[ref] = v;
  sheetRender(); // recompute everything
}
function sheetKey(e, el) { if (e.key === 'Enter') { e.preventDefault(); el.blur(); } }
let sheetDepth = 0;
function sheetCellVal(ref) { const raw = sheetData[ref]; if (raw == null || raw === '') return 0; if (raw.startsWith('=')) { const v = sheetEval(raw); return isNaN(parseFloat(v)) ? 0 : parseFloat(v); } return isNaN(parseFloat(raw)) ? raw : parseFloat(raw); }
function sheetEval(formula) {
  if (sheetDepth > 30) return '#LOOP';
  sheetDepth++;
  try {
    let expr = formula.slice(1);
    // SUM(A1:B3)
    expr = expr.replace(/SUM\(([A-Z]\d+):([A-Z]\d+)\)/gi, (m, a, b) => {
      const c1 = a.charCodeAt(0) - 65, r1 = +a.slice(1), c2 = b.charCodeAt(0) - 65, r2 = +b.slice(1);
      let sum = 0;
      for (let c = Math.min(c1, c2); c <= Math.max(c1, c2); c++) for (let r = Math.min(r1, r2); r <= Math.max(r1, r2); r++) sum += parseFloat(sheetCellVal(colLabel(c) + r)) || 0;
      return sum;
    });
    expr = expr.replace(/([A-Z]\d+)/g, (m) => { const v = sheetCellVal(m); return typeof v === 'number' ? v : JSON.stringify(v); });
    const res = Function('"use strict";return (' + expr + ')')();
    return res;
  } catch { return '#ERR'; }
  finally { sheetDepth--; }
}
function sheetAddRow() { sheetRows += 5; sheetRender(); }
function sheetsSetCsv(csv) {
  sheetData = {};
  (csv || '').split('\n').forEach((line, r) => { line.split(',').forEach((cell, c) => { if (cell !== '' && c < SHEET_COLS) sheetData[colLabel(c) + (r + 1)] = cell; }); });
  sheetRows = Math.max(SHEET_ROWS, (csv || '').split('\n').length + 2);
  sheetRender();
}
async function sheetsOpenPath(path, name) {
  const res = await fsCat(path); if (res.error) return;
  sheetPath = path; document.getElementById('sheets-name').value = name.replace(/\.(sheet|csv|maxsheet)$/, '');
  sheetsSetCsv(res.content);
}
function sheetsToCsv() {
  let maxR = 0, maxC = 0;
  Object.keys(sheetData).forEach(ref => { const c = ref.charCodeAt(0) - 65, r = +ref.slice(1); if (r > maxR) maxR = r; if (c > maxC) maxC = c; });
  const lines = [];
  for (let r = 1; r <= maxR; r++) { const row = []; for (let c = 0; c <= maxC; c++) row.push(sheetData[colLabel(c) + r] || ''); lines.push(row.join(',')); }
  return lines.join('\n');
}
async function sheetsSave() {
  const name = document.getElementById('sheets-name').value || 'Untitled Sheet';
  if (!sheetPath) {
    const p = await driveSaveAs(name + '.sheet', sheetsToCsv());
    if (p) { sheetPath = p; document.getElementById('sheets-name').value = p.split('/').pop().replace(/\.(sheet|csv|maxsheet)$/i, ''); }
    return;
  }
  await driveWrite(sheetPath, sheetsToCsv()); notify('📊', 'Saved', name + ' saved to MaxDrive');
}

// ══ SHARING — publish Forms & Sheets, collect responses ══════════════════════
let sharedSheetId = null, formSharedId = null, formRespondMode = false, sharedDocId = null;
// Returns the full server share object ({id,type,title,content,visibility,allow}) or null.
// visibility/allow are omitted on a plain (re)publish so the server keeps existing audience settings.
async function shareDoc(type, title, content, currentId, visibility, allow) {
  const body = { id: currentId, type, title, content };
  if (typeof visibility !== 'undefined') { body.visibility = visibility; body.allow = allow || []; }
  const r = await apiFetch('/api/shared', { method: 'POST', body: JSON.stringify(body) });
  if (r.error) { notify('⚠️', 'Publish failed', r.error); return null; }
  return r;
}
function shareModal(share, kind) {

  ov.innerHTML = `<div class="drive-box" style="width:440px"></div>`;

  const parseAllow = () => { const ta = ov.querySelector('#share-allow'); return ta ? ta.value.split(/[\s,]+/).map(s => s.trim().toLowerCase().replace(/^@/, '')).filter(Boolean) : (share.allow || []); };
  const render = () => {

      <div style="padding:16px">

          <button class="gbtn" id="share-copy">Copy</button></div>

        <div style="display:flex;gap:8px;margin-bottom:12px">
          <button class="gbtn share-aud" data-vis="public" style="flex:1;${!priv ? 'background:rgba(110,160,255,.35);border-color:rgba(110,160,255,.6)' : ''}">🌐 Anyone with link</button>
          <button class="gbtn share-aud" data-vis="private" style="flex:1;${priv ? 'background:rgba(110,160,255,.35);border-color:rgba(110,160,255,.6)' : ''}">🔒 Specific people</button>
        </div>
        <div id="share-people" style="display:${priv ? 'block' : 'none'}">
          <p style="color:rgba(255,255,255,.45);font-size:12px;margin-bottom:6px">Usernames allowed (comma or space separated):</p>
          <textarea id="share-allow" rows="2" placeholder="alice, bob, charlie" style="width:100%;box-sizing:border-box;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:8px;color:#fff;padding:9px 12px;font-size:13px;resize:vertical">${(share.allow || []).join(', ')}</textarea>
        </div>
      </div>
      <div style="display:flex;justify-content:flex-end;gap:8px;padding:10px"><button class="gbtn" id="share-save">Save access</button><button class="gbtn" id="share-close">Done</button></div>`;
    ov.querySelector('#share-copy').onclick = () => copyShare(url);
    ov.querySelector('#share-close').onclick = () => ov.remove();
    ov.querySelectorAll('.share-aud').forEach(b => b.onclick = () => { share.allow = parseAllow(); share.visibility = b.dataset.vis; render(); });
    ov.querySelector('#share-save').onclick = async () => {
      const vis = share.visibility, allow = vis === 'private' ? parseAllow() : [];
      const updated = await shareDoc(share.type, share.title, share.content, share.id, vis, allow);

  document.body.appendChild(ov);

  ov.onclick = e => { if (e.target === ov) ov.remove(); };

// Open a shared doc by id (from a /s/<id> link)
async function openShared(id) {
  let doc, status = 0;
  try { const r = await fetch(API + '/api/shared/' + id, { headers: authHeaders() }); status = r.status; doc = await r.json(); }
  catch { notify('🔗', 'Offline', 'Could not reach the server'); return; }
  if (status === 401 || status === 403) { notify('🔒', 'Access restricted', doc.error || 'You don’t have permission to view this'); return; }
  if (!doc || doc.error || !doc.id) { notify('🔗', 'Link not found', 'That shared document does not exist'); return; }
  if (doc.type === 'form') {
    openApp('forms');
    setTimeout(() => {
      try { formDef = JSON.parse(doc.content); } catch { formDef = { title: doc.title, questions: [] }; }
      if (!formDef.questions) formDef.questions = [];
      formSharedId = doc.id; formRespondMode = true; formFillMode = true; formPath = null;
      const nm = document.getElementById('forms-name'); if (nm) nm.value = formDef.title || doc.title;
      formsRender();
      notify('📋', 'Filling: ' + (doc.title || 'Form'), 'Shared by @' + doc.author);
    }, 300);
  } else if (doc.type === 'doc') {
    openApp('editor');
    setTimeout(() => {
      editorSetContent(doc.content, true); sharedDocId = doc.id; editorCurrentPath = null;
      const fn = document.getElementById('editor-filename'); if (fn) fn.textContent = doc.title;
      notify('📘', 'Viewing: ' + doc.title, 'Shared by @' + doc.author);
    }, 300);
  } else {
    openApp('sheets');
    setTimeout(() => {
      sheetsSetCsv(doc.content); sharedSheetId = doc.id; sheetPath = null;
      const nm = document.getElementById('sheets-name'); if (nm) nm.value = doc.title;
      notify('📊', 'Viewing: ' + doc.title, 'Shared by @' + doc.author);
    }, 300);
  }
}
