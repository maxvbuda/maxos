    <div class="pomo-modes">
      <button class="pomo-mode active" data-m="focus" onclick="pomoMode('focus')">Focus</button>
      <button class="pomo-mode" data-m="short" onclick="pomoMode('short')">Short Break</button>
      <button class="pomo-mode" data-m="long" onclick="pomoMode('long')">Long Break</button>
    </div>
    <div class="pomo-time" id="pomo-time">25:00</div>
    <button class="pomo-btn" id="pomo-btn" onclick="pomoToggle()">Start</button>
    <div class="pomo-count" id="pomo-count">Completed today: 0</div>
  </div>`;
}
function initPomodoro() { pomo = { mode: 'focus', remaining: POMO_MODES.focus, running: false, timer: null, done: 0 }; pomoDraw(); }
function pomoMode(m) {
  if (pomo.running) pomoToggle();
  pomo.mode = m; pomo.remaining = POMO_MODES[m];
  document.querySelectorAll('.pomo-mode').forEach(b => b.classList.toggle('active', b.dataset.m === m));
  pomoDraw();
}
function pomoDraw() {
  const t = document.getElementById('pomo-time');
  if (t) t.textContent = `${String(Math.floor(pomo.remaining / 60)).padStart(2, '0')}:${String(pomo.remaining % 60).padStart(2, '0')}`;
  const c = document.getElementById('pomo-count'); if (c) c.textContent = `Completed today: ${pomo.done}`;
}
function pomoToggle() {
  pomo.running = !pomo.running;
  document.getElementById('pomo-btn').textContent = pomo.running ? 'Pause' : 'Start';
  if (pomo.running) {
    pomo.timer = setInterval(() => {
      pomo.remaining--;
      if (pomo.remaining <= 0) {
        clearInterval(pomo.timer); pomo.running = false;
        if (pomo.mode === 'focus') pomo.done++;
        document.getElementById('pomo-btn').textContent = 'Start';
        notify('🍅', 'Time\'s up!', pomo.mode === 'focus' ? 'Take a break 🎉' : 'Back to focus!');
        pomo.remaining = POMO_MODES[pomo.mode];
      }
      pomoDraw();
    }, 1000);
  } else clearInterval(pomo.timer);
}

// ── WEATHER (simulated) ──────────────────────────────────────────────────────
// WMO weather code → emoji + description (Open-Meteo standard codes)
const WMO = {
  0:['☀️','Clear sky'], 1:['🌤️','Mainly clear'], 2:['⛅','Partly cloudy'], 3:['☁️','Overcast'],
  45:['🌫️','Fog'], 48:['🌫️','Rime fog'],
  51:['🌦️','Light drizzle'], 53:['🌦️','Drizzle'], 55:['🌧️','Heavy drizzle'],
  56:['🌧️','Freezing drizzle'], 57:['🌧️','Freezing drizzle'],
  61:['🌧️','Light rain'], 63:['🌧️','Rain'], 65:['🌧️','Heavy rain'],
  66:['🌧️','Freezing rain'], 67:['🌧️','Freezing rain'],
  71:['🌨️','Light snow'], 73:['❄️','Snow'], 75:['❄️','Heavy snow'], 77:['❄️','Snow grains'],
  80:['🌦️','Rain showers'], 81:['🌧️','Rain showers'], 82:['⛈️','Violent showers'],
  85:['🌨️','Snow showers'], 86:['🌨️','Snow showers'],
  95:['⛈️','Thunderstorm'], 96:['⛈️','Thunderstorm + hail'], 99:['⛈️','Severe thunderstorm'],
};
const WEATHER_PRESETS = ['New York','London','Tokyo','Paris','Sydney','Dubai'];

function buildWeather() {
  return `<div class="weather">
    <div class="weather-search">
      <input id="weather-city" placeholder="Enter a city…" value="San Francisco" onkeydown="if(event.key==='Enter')weatherGo()">
      <button onclick="weatherGo()">Go</button>
    </div>
    <div class="conv-cats" style="gap:6px">
      ${WEATHER_PRESETS.map(c => `<button class="conv-cat" onclick="weatherGo('${c}')">${c}</button>`).join('')}
    </div>
    <div id="weather-content"></div>
  </div>`;
}
function initWeather() { weatherGo(); }
function wmo(code) { return WMO[code] || ['🌡️','Unknown']; }

async function weatherGo(preset) {
  const input = document.getElementById('weather-city');
  const city = preset || input.value.trim() || 'San Francisco';
  if (preset) input.value = preset;
  const content = document.getElementById('weather-content');
  if (!content) return;
  content.innerHTML = `<div style="text-align:center;color:rgba(255,255,255,.4);padding:30px">Loading…</div>`;
  try {
    // 1. Geocode the city name → lat/lon (free, no key)
    const geo = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1`).then(r => r.json());
    if (!geo.results || !geo.results.length) { content.innerHTML = `<div style="text-align:center;color:#ff8a84;padding:30px">City "${city}" not found</div>`; return; }
    const loc = geo.results[0];
    // 2. Fetch live forecast (free, no key)
    const wx = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${loc.latitude}&longitude=${loc.longitude}&current=temperature_2m,weather_code&daily=weather_code,temperature_2m_max&temperature_unit=fahrenheit&timezone=auto&forecast_days=5`).then(r => r.json());
    const [icon, desc] = wmo(wx.current.weather_code);
    const temp = Math.round(wx.current.temperature_2m);
    const dayNames = wx.daily.time.map(t => new Date(t + 'T00:00').toLocaleDateString([], { weekday: 'short' }));
    content.innerHTML = `
      <div class="weather-current">
        <div class="weather-icon">${icon}</div>
        <div class="weather-temp">${temp}°F</div>
        <div class="weather-desc">${desc}</div>
        <div class="weather-city">📍 ${loc.name}${loc.country ? ', ' + loc.country : ''}</div>
      </div>
      <div class="weather-days">${wx.daily.time.map((t, i) => {
        const [ic] = wmo(wx.daily.weather_code[i]);
        return `<div class="weather-day"><div class="wd-name">${dayNames[i]}</div><div class="wd-icon">${ic}</div><div class="wd-temp">${Math.round(wx.daily.temperature_2m_max[i])}°F</div></div>`;
      }).join('')}</div>`;
  } catch (e) {
    content.innerHTML = `<div style="text-align:center;color:#ff8a84;padding:30px">Couldn't load weather.<br><small style="color:rgba(255,255,255,.4)">Check your connection.</small></div>`;
  }
}

// ── UNIT CONVERTER ───────────────────────────────────────────────────────────
const CONV = {
  Length: { units: { Meters: 1, Kilometers: 1000, Miles: 1609.34, Feet: 0.3048, Inches: 0.0254, Centimeters: 0.01 } },
  Weight: { units: { Kilograms: 1, Grams: 0.001, Pounds: 0.453592, Ounces: 0.0283495, Tons: 1000 } },
  Temperature: { special: true },
  Speed: { units: { 'm/s': 1, 'km/h': 0.277778, 'mph': 0.44704, 'knots': 0.514444 } },
};
let convCat = 'Length';
function buildConverter() {
  return `<div class="converter">
    <div class="conv-cats">${Object.keys(CONV).map(c => `<button class="conv-cat${c === 'Length' ? ' active' : ''}" onclick="convSetCat('${c}')">${c}</button>`).join('')}</div>
    <div id="conv-body"></div>
  </div>`;
}
function initConverter() { convSetCat('Length'); }
function convSetCat(c) {
  convCat = c;
  document.querySelectorAll('.conv-cat').forEach(b => b.classList.toggle('active', b.textContent === c));
  const units = CONV[c].special ? ['Celsius', 'Fahrenheit', 'Kelvin'] : Object.keys(CONV[c].units);
  document.getElementById('conv-body').innerHTML = `
    <div class="conv-row"><label>From</label>
      <input type="number" id="conv-in" value="1" oninput="convCalc()">
      <select id="conv-from" onchange="convCalc()">${units.map(u => `<option>${u}</option>`).join('')}</select></div>
    <div class="conv-eq">⬇</div>
    <div class="conv-row"><label>To</label>
      <input type="number" id="conv-out" readonly>
      <select id="conv-to" onchange="convCalc()">${units.map((u, i) => `<option ${i === 1 ? 'selected' : ''}>${u}</option>`).join('')}</select></div>`;
  convCalc();
}
function convCalc() {
  const val = parseFloat(document.getElementById('conv-in').value) || 0;
  const from = document.getElementById('conv-from').value, to = document.getElementById('conv-to').value;
  let result;
  if (CONV[convCat].special) {
    let celsius = from === 'Celsius' ? val : from === 'Fahrenheit' ? (val - 32) * 5 / 9 : val - 273.15;
    result = to === 'Celsius' ? celsius : to === 'Fahrenheit' ? celsius * 9 / 5 + 32 : celsius + 273.15;
  } else {
    const u = CONV[convCat].units;
    result = val * u[from] / u[to];
  }
  document.getElementById('conv-out').value = Math.round(result * 100000) / 100000;
}

// ── DICE & COIN ──────────────────────────────────────────────────────────────
const DICE_FACES = ['⚀','⚁','⚂','⚃','⚄','⚅'];
function buildDice() {
  return `<div class="dice-app">
    <div class="dice-display" id="dice-display">🎲</div>
    <div class="dice-result" id="dice-result">Roll the dice or flip a coin</div>
    <div class="dice-btns">
      <button class="dice-btn" onclick="rollDice(1)">🎲 1 Die</button>
      <button class="dice-btn" onclick="rollDice(2)">🎲🎲 2 Dice</button>
      <button class="dice-btn" onclick="flipCoin()">🪙 Flip Coin</button>
    </div>
  </div>`;
}
function rollDice(n) {
  const d = document.getElementById('dice-display'), r = document.getElementById('dice-result');
  d.classList.remove('rolling'); void d.offsetWidth; d.classList.add('rolling');
  const rolls = Array.from({ length: n }, () => 1 + Math.floor(Math.random() * 6));
  setTimeout(() => {
    d.textContent = rolls.map(v => DICE_FACES[v - 1]).join(' ');
    r.textContent = n === 2 ? `${rolls[0]} + ${rolls[1]} = ${rolls[0] + rolls[1]}` : `You rolled a ${rolls[0]}`;
  }, 200);
}
function flipCoin() {
  const d = document.getElementById('dice-display'), r = document.getElementById('dice-result');
  d.classList.remove('rolling'); void d.offsetWidth; d.classList.add('rolling');
  const heads = Math.random() < 0.5;
  setTimeout(() => { d.textContent = heads ? '🪙' : '🪙'; r.textContent = heads ? 'Heads!' : 'Tails!'; }, 200);
}

// ── COLOR PICKER ─────────────────────────────────────────────────────────────
let colorRGB = { r: 100, g: 180, b: 255 };
function buildColors() {
  return `<div class="colors-app">
    <div class="color-preview" id="color-preview">Click a code to copy</div>
    <div class="color-sliders">
      <div class="color-slider-row"><label style="color:#ff6b6b">R</label><input type="range" min="0" max="255" value="${colorRGB.r}" oninput="colorSet('r',this.value)"></div>
      <div class="color-slider-row"><label style="color:#6bff6b">G</label><input type="range" min="0" max="255" value="${colorRGB.g}" oninput="colorSet('g',this.value)"></div>
      <div class="color-slider-row"><label style="color:#6b9bff">B</label><input type="range" min="0" max="255" value="${colorRGB.b}" oninput="colorSet('b',this.value)"></div>
    </div>
    <div class="color-codes" id="color-codes"></div>
  </div>`;
}
function initColors() { colorDraw(); }
function colorSet(ch, v) { colorRGB[ch] = +v; colorDraw(); }
function colorDraw() {
  const { r, g, b } = colorRGB;
  const hex = '#' + [r, g, b].map(x => x.toString(16).padStart(2, '0')).join('').toUpperCase();
  const prev = document.getElementById('color-preview');
  if (prev) { prev.style.background = hex; prev.style.color = (r * 0.299 + g * 0.587 + b * 0.114) > 150 ? '#000' : '#fff'; prev.textContent = hex; }
  const codes = document.getElementById('color-codes');
  if (codes) {
    const rows = [['HEX', hex], ['RGB', `rgb(${r}, ${g}, ${b})`], ['HSL', rgbToHsl(r, g, b)]];
    codes.innerHTML = rows.map(([k, v]) => `<div class="color-code" onclick="copyColor('${v}')"><span>${v}</span><small>${k} · click to copy</small></div>`).join('');
  }
}
function rgbToHsl(r, g, b) {
  r /= 255; g /= 255; b /= 255;
  const mx = Math.max(r, g, b), mn = Math.min(r, g, b); let h, s, l = (mx + mn) / 2;
  if (mx === mn) { h = s = 0; }
  else { const d = mx - mn; s = l > 0.5 ? d / (2 - mx - mn) : d / (mx + mn);
    h = mx === r ? (g - b) / d + (g < b ? 6 : 0) : mx === g ? (b - r) / d + 2 : (r - g) / d + 4; h /= 6; }
  return `hsl(${Math.round(h * 360)}, ${Math.round(s * 100)}%, ${Math.round(l * 100)}%)`;
}
function copyColor(v) { navigator.clipboard?.writeText(v); notify('🌈', 'Copied!', v); }
