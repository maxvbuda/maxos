    mcCoins = Math.round((mcCoins - MC_UPGRADE) * 100) / 100; mcRate += 1; mcSave(); mcRefresh();
    mcNote('Rig upgraded! Now mining ' + mcFmt(MC_MINE * mcRate) + ' / click ⚡');
  };
  document.getElementById('mc-cash').onclick = () => {
    if (mcCoins <= 0) { mcNote('Your wallet is empty. Mine some MaxCoin first!'); return; }
    mcNote('Cashed out ' + mcFmt(mcCoins) + ' MXC for $0.00 (it is fake) 😂');
    mcCoins = 0; mcSave(); mcRefresh();
  };
}

// ── MAX ANIMATOR — flipbook + movable elements + .pic images ──────────────────
let anFrames = [], anCur = 0, anColor = '#ffffff', anSize = 4, anTool = 'pen', anPlay = null, anFps = 8;
let anDrawing = false, anCtx = null, anBgCtx = null, anPath = null, anSelId = null, anDrag = null, anShapeStart = null;
const AN_W = 480, AN_H = 320;
const AN_EL_ICON = { rect: '▢', circle: '○', text: 'T', pic: '🖼️' };

// MaxOS .pic format — JPEG/PNG imported into MaxDrive as JSON + embedded data
function picMake(name, dataUrl, mime, w, h) {
  return JSON.stringify({ format: 'maxos.pic', v: 1, name, mime: mime || 'image/jpeg', width: w || 0, height: h || 0, data: dataUrl });
}
function picParse(raw) {
  const d = typeof raw === 'string' ? JSON.parse(raw) : raw;
  if (!d || d.format !== 'maxos.pic' || !d.data) throw new Error('Not a .pic file');
  return d;
}
function picDataUrl(d) { return d.data; }
async function picFromFile(file) {
  const dataUrl = await new Promise((res, rej) => { const r = new FileReader(); r.onload = () => res(r.result); r.onerror = rej; r.readAsDataURL(file); });
  const dims = await new Promise((res, rej) => { const im = new Image(); im.onload = () => res({ w: im.width, h: im.height }); im.onerror = rej; im.src = dataUrl; });
  const base = (file.name || 'image').replace(/\.[^.]+$/, '').replace(/[^a-z0-9_-]+/gi, '_').slice(0, 28) || 'image';
  return { name: base, content: picMake(base, dataUrl, file.type || 'image/jpeg', dims.w, dims.h), dataUrl, w: dims.w, h: dims.h };
}
async function picSaveToDrive(baseName, picContent) {
  let name = baseName.endsWith('.pic') ? baseName : baseName + '.pic';
  const path = driveHome() + '/pictures/' + name;
  const parent = driveHome() + '/pictures';
  if ((await fsStat(parent)).error) await fsMkdir(parent, 'pictures', driveHome());
  const r = await driveWrite(path, picContent);
  if (r.error) throw new Error(r.error);
  return path;
}

function anId() { return 'e' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }
function anEmptyBg() { const cv = document.createElement('canvas'); cv.width = AN_W; cv.height = AN_H; const x = cv.getContext('2d'); x.fillStyle = '#10101f'; x.fillRect(0, 0, AN_W, AN_H); return cv.toDataURL(); }
function anEmptyFrame() { return { bg: anEmptyBg(), elements: [] }; }
function anCloneFrame(f) { return { bg: f.bg, elements: f.elements.map(e => ({ ...e })) }; }
function anNormalizeFrames(frames) {
  return (frames || []).map(f => {
    if (typeof f === 'string') return { bg: f, elements: [] };
    return { bg: f.bg || anEmptyBg(), elements: Array.isArray(f.elements) ? f.elements : [] };
  });
}
function anCurFrame() { return anFrames[anCur] || anEmptyFrame(); }
function anElLabel(el) {
  if (el.type === 'text') return (AN_EL_ICON.text + ' ' + (el.text || 'Text')).slice(0, 18);
  if (el.type === 'pic') return (AN_EL_ICON.pic + ' ' + (el.name || 'Picture')).slice(0, 18);
  return (AN_EL_ICON[el.type] || '•') + ' ' + el.type;
}

function buildAnimator() {
  const colors = ['#ffffff','#ff5f57','#febc2e','#28c840','#64b4ff','#bf5af2','#ff9f0a','#000000'];
  return `<div class="an-app">
    <div class="an-tools">
      <button id="an-pen" class="an-t active" onclick="anSetTool('pen')" title="Draw">✏️</button>
      <button id="an-eraser" class="an-t" onclick="anSetTool('eraser')" title="Eraser">🧹</button>
      <button id="an-select" class="an-t" onclick="anSetTool('select')" title="Move elements">↖️</button>
      <button id="an-rect" class="an-t" onclick="anSetTool('rect')" title="Rectangle">▢</button>
      <button id="an-circle" class="an-t" onclick="anSetTool('circle')" title="Circle">○</button>
      <button id="an-text" class="an-t" onclick="anSetTool('text')" title="Text">T</button>
      <input type="range" id="an-size" min="1" max="30" value="4" oninput="anSize=+this.value" title="Brush size">
      ${colors.map(c => `<span class="an-sw" style="background:${c}" onclick="anSetColor('${c}')"></span>`).join('')}
      <button class="an-t" onclick="anImportJpeg()" title="Import JPEG → .pic">🖼️</button>
      <button class="an-t" onclick="anAddPicFromDrive()" title="Add .pic from MaxDrive">📂</button>
      <span style="flex:1"></span>
      <button class="an-t" onclick="anPlayToggle()" id="an-play">▶️ Play</button>
      <label class="an-fps">FPS <input type="number" id="an-fpsn" min="1" max="24" value="8" onchange="anFps=Math.max(1,Math.min(24,+this.value||8))"></label>
    </div>
    <div class="an-work">
      <div class="an-stage"><canvas id="an-canvas" width="${AN_W}" height="${AN_H}"></canvas></div>
      <div class="an-layers"><h4>Elements</h4><div id="an-layer-list"></div></div>
    </div>
    <div class="an-strip" id="an-strip"></div>
    <div class="an-bar">
      <button class="an-b" onclick="anAddFrame()">➕ Frame</button>
      <button class="an-b" onclick="anDupFrame()">⧉ Duplicate</button>
      <button class="an-b" onclick="anDelFrame()">🗑 Delete</button>
      <button class="an-b" onclick="anClearFrame()">✖ Clear</button>
      <button class="an-b" onclick="anDelElement()">🗑 Element</button>
      <span style="flex:1"></span>
      <span id="an-info" class="an-info"></span>
      <button class="an-b" onclick="anOpen()">📂 Open</button>
      <button class="an-b" onclick="anSave()">💾 Save</button>
      <button class="an-b" onclick="anGif()">⬇️ Export</button>
    </div>
    <input type="file" id="an-pic-file" accept="image/jpeg,image/jpg,image/png" style="display:none">
  </div>`;
}

function anLoadBgToCanvas(bg) {
  if (!anBgCtx) return;
  const im = new Image();
  im.onload = () => { anBgCtx.fillStyle = '#10101f'; anBgCtx.fillRect(0, 0, AN_W, AN_H); anBgCtx.drawImage(im, 0, 0); };
  im.onerror = () => { anBgCtx.fillStyle = '#10101f'; anBgCtx.fillRect(0, 0, AN_W, AN_H); };
  im.src = bg || anEmptyBg();
}
function anSyncBgFromCanvas() { if (anBgCtx) anCurFrame().bg = anBgCtx.canvas.toDataURL(); }

function anDrawElement(ctx, el, selected) {
  ctx.save();
  if (el.type === 'rect') {
    ctx.fillStyle = el.color || '#64b4ff';
    ctx.fillRect(el.x, el.y, el.w, el.h);
    if (selected) { ctx.strokeStyle = '#febc2e'; ctx.lineWidth = 2; ctx.setLineDash([5, 4]); ctx.strokeRect(el.x, el.y, el.w, el.h); }
  } else if (el.type === 'circle') {
    ctx.fillStyle = el.color || '#bf5af2';
    ctx.beginPath(); ctx.arc(el.cx, el.cy, el.r, 0, Math.PI * 2); ctx.fill();
    if (selected) { ctx.strokeStyle = '#febc2e'; ctx.lineWidth = 2; ctx.setLineDash([5, 4]); ctx.beginPath(); ctx.arc(el.cx, el.cy, el.r, 0, Math.PI * 2); ctx.stroke(); }
  } else if (el.type === 'text') {
    ctx.fillStyle = el.color || '#fff';
    ctx.font = `600 ${el.size || 18}px system-ui,sans-serif`;
    ctx.fillText(el.text || '', el.x, el.y);
    if (selected) { const m = ctx.measureText(el.text || ''); ctx.strokeStyle = '#febc2e'; ctx.lineWidth = 1; ctx.setLineDash([4, 3]); ctx.strokeRect(el.x - 2, el.y - (el.size || 18), m.width + 4, (el.size || 18) + 4); }
  } else if (el.type === 'pic' && el.picData) {
    const im = anPicImg(el.picData);
    if (im.complete && im.naturalWidth) ctx.drawImage(im, el.x, el.y, el.w, el.h);
    if (selected) { ctx.strokeStyle = '#febc2e'; ctx.lineWidth = 2; ctx.setLineDash([5, 4]); ctx.strokeRect(el.x, el.y, el.w, el.h); }
  }
  ctx.restore();
}
const anPicImgs = {};
function anPicImg(src) {
  if (!anPicImgs[src]) {
    const im = new Image();
    im.onload = () => { if (anCtx) anDraw(); };
    im.src = src;
    anPicImgs[src] = im;
  }
  return anPicImgs[src];
}
async function anRenderFrameTo(ctx, frame, alpha, selId) {
  if (!ctx) return;
  ctx.globalAlpha = alpha == null ? 1 : alpha;
  ctx.fillStyle = '#10101f'; ctx.fillRect(0, 0, AN_W, AN_H);
  await new Promise(res => { const im = new Image(); im.onload = () => { ctx.drawImage(im, 0, 0); res(); }; im.onerror = res; im.src = frame.bg || anEmptyBg(); });
  for (const el of frame.elements) {
    if (el.type === 'pic' && el.picPath && !el.picData) await anEnsurePicData(el);
    anDrawElement(ctx, el, selId != null && el.id === selId);
  }
  ctx.globalAlpha = 1;
}
function anDraw() {
  if (!anCtx) return;
  const frame = anCurFrame();
  (async () => {
    if (anCur > 0) await anRenderFrameTo(anCtx, anFrames[anCur - 1], 0.22, null);
    await anRenderFrameTo(anCtx, frame, 1, anSelId);
    if (anShapeStart && anDrag?.preview) {
      const p = anDrag.preview;
      anCtx.save(); anCtx.strokeStyle = 'rgba(254,188,46,.9)'; anCtx.lineWidth = 2; anCtx.setLineDash([6, 4]);
      if (anTool === 'rect') anCtx.strokeRect(p.x, p.y, p.w, p.h);
      else if (anTool === 'circle') { anCtx.beginPath(); anCtx.arc(p.cx, p.cy, p.r, 0, Math.PI * 2); anCtx.stroke(); }
      anCtx.restore();
    }
  })();
}
function anFrameThumb(frame) {
  const cv = document.createElement('canvas'); cv.width = AN_W; cv.height = AN_H;
  const x = cv.getContext('2d');
  const i = anFrames.indexOf(frame);
  anRenderFrameTo(x, frame, 1, null).then(() => { if (i >= 0) anRenderStripThumb(i, cv.toDataURL('image/png')); });
}
function anCommit() { anSyncBgFromCanvas(); anFrameThumb(anCurFrame()); anRenderLayers(); }
function anRenderStrip() {
  const s = document.getElementById('an-strip'); if (!s) return;
  s.innerHTML = anFrames.map((f, i) => `<div class="an-frame${i === anCur ? ' sel' : ''}" onclick="anGo(${i})"><img id="an-thumb-${i}" src="${f.bg || anEmptyBg()}"><span>${i + 1}</span></div>`).join('');
  anFrames.forEach((f, i) => anFrameThumb(f));
  const sel = s.querySelector('.an-frame.sel'); if (sel && sel.scrollIntoView) sel.scrollIntoView({ inline: 'nearest', block: 'nearest' });
}
function anRenderStripThumb(i, url) { const img = document.getElementById('an-thumb-' + i) || document.querySelectorAll('.an-frame img')[i]; if (img && url) img.src = url; }
function anRenderLayers() {
  const list = document.getElementById('an-layer-list'); if (!list) return;
  const els = anCurFrame().elements;
  if (!els.length) { list.innerHTML = '<div style="color:rgba(255,255,255,.35);font-size:11px;padding:6px">No elements yet</div>'; return; }
  list.innerHTML = [...els].reverse().map(el => `<div class="an-layer${el.id === anSelId ? ' sel' : ''}" onclick="anSelect('${el.id}')">${escapeHtml(anElLabel(el))}</div>`).join('');
}
function anSelect(id) { anSelId = id; anDraw(); anRenderLayers(); }
function anHitTest(x, y) {
  const els = anCurFrame().elements;
  for (let i = els.length - 1; i >= 0; i--) {
    const el = els[i];
    if (el.type === 'rect' && x >= el.x && x <= el.x + el.w && y >= el.y && y <= el.y + el.h) return el;
    if (el.type === 'circle' && Math.hypot(x - el.cx, y - el.cy) <= el.r) return el;
    if (el.type === 'pic' && x >= el.x && x <= el.x + el.w && y >= el.y && y <= el.y + el.h) return el;
    if (el.type === 'text' && x >= el.x - 4 && x <= el.x + 120 && y >= el.y - (el.size || 18) && y <= el.y + 4) return el;
  }
  return null;
}
function anDelElement() {
  if (!anSelId) { notify('🎞️', 'No selection', 'Select an element to delete'); return; }
  const fr = anCurFrame();
  fr.elements = fr.elements.filter(e => e.id !== anSelId);
  anSelId = null; anDraw(); anCommit(); anRenderStrip();
}
async function anEnsurePicData(el) {
  if (el.picData || !el.picPath) return;
  const res = await fsCat(el.picPath);
  if (res.error) return;
  try { el.picData = picDataUrl(picParse(res.content)); } catch { /* ignore */ }
}
async function anAddPicElement(picData, picPath, name, w, h) {
  const maxW = AN_W * 0.45, maxH = AN_H * 0.45;
  const scale = Math.min(maxW / w, maxH / h, 1);
  const el = { id: anId(), type: 'pic', x: Math.round((AN_W - w * scale) / 2), y: Math.round((AN_H - h * scale) / 2), w: Math.round(w * scale), h: Math.round(h * scale), picPath, picData, name };
  anCurFrame().elements.push(el);
  anSelId = el.id; anDraw(); anCommit(); anRenderStrip();
}
function anImportJpeg() { document.getElementById('an-pic-file')?.click(); }
async function anAddPicFromDrive() {
  const picked = await drivePick(['pic']);
  if (!picked) return;
  try {
    const pic = picParse(picked.content);
    await anAddPicElement(picDataUrl(pic), picked.path, pic.name || picked.name, pic.width || 120, pic.height || 90);
    notify('🖼️', 'Picture added', picked.name);
  } catch (e) { notify('⚠️', 'Invalid .pic', e.message); }
}
async function anHandlePicFile(file) {
  try {
    const pic = await picFromFile(file);
    const path = await picSaveToDrive(pic.name, pic.content);
    await anAddPicElement(pic.dataUrl, path, pic.name, pic.w, pic.h);
    notify('🖼️', 'Imported as .pic', path.split('/').pop());
  } catch (e) { notify('⚠️', 'Import failed', e.message); }
}

function anSetTool(t) {
  anTool = t; anShapeStart = null; anDrag = null;
  document.querySelectorAll('.an-t').forEach(b => b.classList.remove('active'));
  document.getElementById('an-' + t)?.classList.add('active');
  const c = document.getElementById('an-canvas');
  if (c) c.style.cursor = (t === 'select' || t === 'text') ? 'default' : (t === 'pen' || t === 'eraser' ? 'crosshair' : 'cell');
}
function anSetColor(c) { anColor = c; if (anTool !== 'rect' && anTool !== 'circle') anSetTool('pen'); }

function anApplyAnimData(d, path) {
  anFrames = anNormalizeFrames(d.frames);
  if (!anFrames.length) anFrames = [anEmptyFrame()];
  anFps = d.fps || 8; anCur = 0; anPath = path || null; anSelId = null;
  const f = document.getElementById('an-fpsn'); if (f) f.value = anFps;
  if (anBgCtx) anLoadBgToCanvas(anCurFrame().bg);
  if (anCtx) { anDraw(); anRenderStrip(); anRenderLayers(); anInfo(); }
}
async function animOpenPath(path, name) {
  const res = await fsCat(path);
  if (res.error) { notify('⚠️', 'Open failed', res.error); return; }
  try { anApplyAnimData(JSON.parse(res.content), path); notify('🎞️', 'Opened', name); }
  catch (e) { notify('⚠️', 'Open failed', 'Not a valid .anim file'); }
}
async function picOpenPath(path, name) {
  openApp('animator');
  const res = await fsCat(path);
  if (res.error) { notify('⚠️', 'Open failed', res.error); return; }
  try {
    const pic = picParse(res.content);
    anFrames = [anEmptyFrame()]; anCur = 0; anPath = null; anSelId = null; anFps = 8;
    setTimeout(async () => {
      await anAddPicElement(picDataUrl(pic), path, pic.name || name, pic.width || 200, pic.height || 150);
      notify('🖼️', 'Opened .pic', name);
    }, 350);
  } catch (e) { notify('⚠️', 'Open failed', 'Not a valid .pic file'); }
}

function initAnimator() {
  const c = document.getElementById('an-canvas'); if (!c) return;
  anCtx = c.getContext('2d');
  const bgCv = document.createElement('canvas'); bgCv.width = AN_W; bgCv.height = AN_H;
  anBgCtx = bgCv.getContext('2d');
  if (!anFrames.length) { anFrames = [anEmptyFrame()]; anCur = 0; anPath = null; }
  anLoadBgToCanvas(anCurFrame().bg);
  anDraw(); anRenderStrip(); anRenderLayers(); anInfo();
  const f = document.getElementById('an-pic-file');
  if (f) f.onchange = e => { const file = e.target.files?.[0]; if (file) anHandlePicFile(file); e.target.value = ''; };
  const xy = e => { const r = c.getBoundingClientRect(), t = e.touches ? e.touches[0] : e; return [(t.clientX - r.left) * (AN_W / r.width), (t.clientY - r.top) * (AN_H / r.height)]; };
  const start = e => {
    e.preventDefault();
    const [x, y] = xy(e);
    if (anTool === 'pen' || anTool === 'eraser') {
      anDrawing = true; anBgCtx.lineCap = 'round'; anBgCtx.lineJoin = 'round';
      anBgCtx.beginPath(); anBgCtx.moveTo(x, y); return;
    }
    if (anTool === 'select') {
      const hit = anHitTest(x, y);
      anSelId = hit ? hit.id : null;
      if (hit) anDrag = { el: hit, ox: hit.type === 'circle' ? x - hit.cx : x - hit.x, oy: hit.type === 'circle' ? y - hit.cy : y - hit.y };
      anDraw(); anRenderLayers(); return;
    }
    if (anTool === 'rect' || anTool === 'circle') { anShapeStart = { x, y }; anDrag = { preview: true }; return; }
    if (anTool === 'text') {
      const text = prompt('Text:', 'Hello');
      if (text) { anCurFrame().elements.push({ id: anId(), type: 'text', x, y, text, color: anColor, size: 20 }); anCommit(); anDraw(); anRenderStrip(); }
    }
  };
  const move = e => {
    const [x, y] = xy(e);
    if (anDrawing && (anTool === 'pen' || anTool === 'eraser')) {
      e.preventDefault();
      anBgCtx.lineWidth = anTool === 'eraser' ? anSize * 2.5 : anSize;
      anBgCtx.strokeStyle = anTool === 'eraser' ? '#10101f' : anColor;
      anBgCtx.lineTo(x, y); anBgCtx.stroke(); anBgCtx.beginPath(); anBgCtx.moveTo(x, y);
      anSyncBgFromCanvas(); anDraw(); return;
    }
    if (anDrag?.el) {
      e.preventDefault();
      const el = anDrag.el;
      if (el.type === 'circle') { el.cx = x - anDrag.ox; el.cy = y - anDrag.oy; }
      else { el.x = x - anDrag.ox; el.y = y - anDrag.oy; }
      anDraw(); return;
    }
    if (anShapeStart && anDrag?.preview) {
      e.preventDefault();
      const x0 = anShapeStart.x, y0 = anShapeStart.y;
      if (anTool === 'rect') anDrag.preview = { x: Math.min(x0, x), y: Math.min(y0, y), w: Math.abs(x - x0), h: Math.abs(y - y0) };
      else anDrag.preview = { cx: (x0 + x) / 2, cy: (y0 + y) / 2, r: Math.max(4, Math.hypot(x - x0, y - y0) / 2) };
      anDraw();
    }
  };
  const end = () => {
    if (anDrawing) { anDrawing = false; anSyncBgFromCanvas(); anCommit(); anDraw(); anRenderStrip(); return; }
    if (anDrag?.el) { anDrag = null; anCommit(); anRenderStrip(); return; }
    if (anShapeStart && anDrag?.preview) {
      const p = anDrag.preview;
      if (anTool === 'rect' && p.w > 4 && p.h > 4) anCurFrame().elements.push({ id: anId(), type: 'rect', x: p.x, y: p.y, w: p.w, h: p.h, color: anColor });
      if (anTool === 'circle' && p.r > 4) anCurFrame().elements.push({ id: anId(), type: 'circle', cx: p.cx, cy: p.cy, r: p.r, color: anColor });
      anShapeStart = null; anDrag = null; anCommit(); anDraw(); anRenderStrip();
    }
  };
  c.onmousedown = c.ontouchstart = start;
  c.onmousemove = c.ontouchmove = move;
  c.onmouseup = c.onmouseleave = c.ontouchend = end;
}
function anGo(i) { anSyncBgFromCanvas(); anCur = Math.max(0, Math.min(i, anFrames.length - 1)); anSelId = null; anLoadBgToCanvas(anCurFrame().bg); anDraw(); anRenderStrip(); anRenderLayers(); anInfo(); }
function anAddFrame() { anSyncBgFromCanvas(); anFrames.splice(anCur + 1, 0, anEmptyFrame()); anCur++; anLoadBgToCanvas(anCurFrame().bg); anDraw(); anRenderStrip(); anInfo(); }
function anDupFrame() { anSyncBgFromCanvas(); anFrames.splice(anCur + 1, 0, anCloneFrame(anCurFrame())); anCur++; anLoadBgToCanvas(anCurFrame().bg); anDraw(); anRenderStrip(); anInfo(); }
function anDelFrame() { if (anFrames.length <= 1) { anClearFrame(); return; } anFrames.splice(anCur, 1); anCur = Math.max(0, anCur - 1); anLoadBgToCanvas(anCurFrame().bg); anDraw(); anRenderStrip(); anInfo(); }
function anClearFrame() { anFrames[anCur] = anEmptyFrame(); anSelId = null; anLoadBgToCanvas(anCurFrame().bg); anDraw(); anRenderStrip(); anRenderLayers(); }
function anInfo() {
  const el = document.getElementById('an-info'); if (!el) return;
  const n = anCurFrame().elements.length;
  el.textContent = `Frame ${anCur + 1} / ${anFrames.length}${n ? ' · ' + n + ' el' : ''}`;
}
function anPlayToggle() {
  const btn = document.getElementById('an-play');
  if (anPlay) { clearInterval(anPlay); anPlay = null; btn.textContent = '▶️ Play'; anGo(anCur); return; }
  anSyncBgFromCanvas(); btn.textContent = '⏸ Stop'; let i = 0;
  anPlay = setInterval(() => {
    anRenderFrameTo(anCtx, anFrames[i % anFrames.length], 1, null);
    i++;
  }, 1000 / anFps);
}
async function anSave() {
  if (anPlay) anPlayToggle();
  anSyncBgFromCanvas();
  const data = JSON.stringify({ v: 2, fps: anFps, frames: anFrames });
  if (anPath) { await driveWrite(anPath, data); notify('🎞️', 'Saved', anPath.split('/').pop()); return; }
  const path = await driveSaveAs('animation.anim', data);
  if (path) { anPath = path; notify('🎞️', 'Saved', path.split('/').pop()); }
}
async function anOpen() {
  const picked = await drivePick(['anim']);
  if (!picked) return;
  try { anApplyAnimData(JSON.parse(picked.content), picked.path); notify('🎞️', 'Opened', picked.name); }
  catch (e) { notify('⚠️', 'Open failed', 'Not a valid .anim file'); }
}
// LZW compressor for GIF (spec-compliant variable-width codes, sub-block packing
// is done by the caller). `px` is an array of palette indices, minCode the min
// code size (here 8 for a 256-color table).
function gifLZW(px, minCode) {
  const out = []; let curByte = 0, curBit = 0;
  const put = (code, size) => { curByte |= code << curBit; curBit += size; while (curBit >= 8) { out.push(curByte & 0xFF); curByte >>= 8; curBit -= 8; } };
  const clear = 1 << minCode, eoi = clear + 1;
  let codeSize = minCode + 1, dict = {}, next = eoi + 1;
  const resetDict = () => { dict = {}; for (let i = 0; i < clear; i++) dict[String.fromCharCode(i)] = i; next = eoi + 1; codeSize = minCode + 1; };
  resetDict(); put(clear, codeSize);
  let w = String.fromCharCode(px[0]);
  for (let i = 1; i < px.length; i++) {
    const c = String.fromCharCode(px[i]), wc = w + c;
    if (dict[wc] !== undefined) { w = wc; }
    else {
      put(dict[w], codeSize);
      dict[wc] = next++;
      if (next === (1 << codeSize) + 1 && codeSize < 12) codeSize++;
      if (next === 4096) { put(clear, codeSize); resetDict(); }
      w = c;
    }
  }
  put(dict[w], codeSize); put(eoi, codeSize);
  if (curBit > 0) out.push(curByte & 0xFF);
  return out;
}
// Encode RGBA frames (Uint8ClampedArray each, w*h*4) into an animated GIF89a
// (R3G3B2 256-color palette). delayCs = per-frame delay in centiseconds.
function gifEncode(frames, w, h, delayCs) {
  const b = [], u8 = s => { for (let i = 0; i < s.length; i++) b.push(s.charCodeAt(i)); }, w16 = n => { b.push(n & 255, (n >> 8) & 255); };
  u8('GIF89a'); w16(w); w16(h); b.push(0xF7, 0, 0); // global table, 256 colors
  for (let i = 0; i < 256; i++) b.push(((i >> 5) & 7) * 255 / 7 | 0, ((i >> 2) & 7) * 255 / 7 | 0, (i & 3) * 255 / 3 | 0);
  b.push(0x21, 0xFF, 0x0B); u8('NETSCAPE2.0'); b.push(0x03, 0x01, 0, 0, 0x00); // loop forever
  const idxOf = (r, g, b2) => ((r >> 5) << 5) | ((g >> 5) << 2) | (b2 >> 6);
  for (const f of frames) {
    b.push(0x21, 0xF9, 0x04, 0x00, delayCs & 255, (delayCs >> 8) & 255, 0, 0x00); // graphic control (delay)
    b.push(0x2C, 0, 0, 0, 0); w16(w); w16(h); b.push(0x00); // image descriptor
    const px = new Uint8Array(w * h);
    for (let i = 0; i < w * h; i++) px[i] = idxOf(f[i * 4], f[i * 4 + 1], f[i * 4 + 2]);
    b.push(8); const data = gifLZW(px, 8);
    for (let i = 0; i < data.length; i += 255) { const n = Math.min(255, data.length - i); b.push(n); for (let j = 0; j < n; j++) b.push(data[i + j]); }
    b.push(0x00);
  }
  b.push(0x3B);
  return new Uint8Array(b);
}
// Export the whole animation as an animated GIF.
async function anGif() {
  if (anPlay) anPlayToggle();
  anSyncBgFromCanvas();
  notify('⬇️', 'Rendering GIF…', anFrames.length + ' frames');
  const frames = [];
  for (const fr of anFrames) {
    const cv = document.createElement('canvas'); cv.width = AN_W; cv.height = AN_H;
    const cx = cv.getContext('2d');
    await anRenderFrameTo(cx, fr, 1, null);
    frames.push(cx.getImageData(0, 0, AN_W, AN_H).data);
  }
  const bytes = gifEncode(frames, AN_W, AN_H, Math.max(2, Math.round(100 / (anFps || 8))));
  const blob = new Blob([bytes], { type: 'image/gif' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.download = 'animation.gif'; a.href = url; a.click();
  setTimeout(() => URL.revokeObjectURL(url), 4000);
  notify('🎞️', 'Exported GIF', anFrames.length + ' frames @ ' + (anFps || 8) + ' fps');
}

// ── MAX VIDEO — timeline slideshow/movie editor ───────────────────────────────
let vidClips = [], vidCur = 0, vidPlay = null, vidPath = null;
function buildVideo() {
  return `<div class="vid-app">
    <div class="vid-stage" id="vid-stage"><div class="vid-empty">🎬 Add images to start your movie</div></div>
    <div class="vid-controls">
      <button class="vid-c" onclick="vidPlayToggle()" id="vid-play">▶️ Play</button>
      <input type="text" id="vid-text" class="vid-text" placeholder="Caption for this clip…" oninput="vidSetText(this.value)">
      <label class="vid-dur">Sec <input type="number" id="vid-dur" min="0.3" max="20" step="0.1" value="2" onchange="vidSetDur(+this.value)"></label>
    </div>
    <div class="vid-timeline" id="vid-timeline"></div>
    <div class="vid-bar">
      <button class="vid-b" onclick="vidAdd()">🖼️ Add Image</button>
      <button class="vid-b" onclick="vidDup()">⧉ Duplicate</button>
      <button class="vid-b" onclick="vidDel()">🗑 Delete</button>
      <button class="vid-b" onclick="vidMove(-1)">◀ Move</button>
      <button class="vid-b" onclick="vidMove(1)">Move ▶</button>
      <span style="flex:1"></span>
      <span class="vid-info" id="vid-info"></span>
      <button class="vid-b" onclick="vidOpen()">📂 Open</button>
      <button class="vid-b" onclick="vidSave()">💾 Save</button>
    </div>
    <input type="file" id="vid-file" accept="image/*" multiple style="display:none">
  </div>`;
}
function initVideo() {
  const f = document.getElementById('vid-file'); if (!f) return;
  f.onchange = e => {
    const files = [...e.target.files];
    let pending = files.length;
    files.forEach(file => {
      const rd = new FileReader();
      rd.onload = () => { vidClips.push({ src: rd.result, dur: 2, text: '' }); if (--pending === 0) { vidCur = vidClips.length - 1; vidRender(); } };
      rd.readAsDataURL(file);
    });
    e.target.value = '';
  };
  vidRender();
}
function vidAdd() { document.getElementById('vid-file').click(); }
function vidRender() {
  const tl = document.getElementById('vid-timeline'), stage = document.getElementById('vid-stage'), info = document.getElementById('vid-info');
  if (!tl) return;
  tl.innerHTML = vidClips.map((c, i) => `<div class="vid-clip${i === vidCur ? ' sel' : ''}" onclick="vidGo(${i})"><img src="${c.src}"><span>${c.dur}s</span></div>`).join('') || '<div class="vid-empty" style="padding:14px">No clips yet — Add Image</div>';
  if (vidClips.length && vidClips[vidCur]) {
    const c = vidClips[vidCur];
    stage.innerHTML = `<img src="${c.src}" class="vid-frame">${c.text ? `<div class="vid-caption">${escapeHtml(c.text)}</div>` : ''}`;
    const t = document.getElementById('vid-text'), d = document.getElementById('vid-dur');
    if (t) t.value = c.text; if (d) d.value = c.dur;
  } else { stage.innerHTML = '<div class="vid-empty">🎬 Add images to start your movie</div>'; }
  const total = vidClips.reduce((s, c) => s + (+c.dur || 0), 0);
  if (info) info.textContent = vidClips.length ? `${vidClips.length} clips · ${total.toFixed(1)}s` : '';
}
function vidGo(i) { vidCur = i; vidRender(); }
function vidSetText(v) { if (vidClips[vidCur]) { vidClips[vidCur].text = v; const s = document.getElementById('vid-stage'); const cap = s.querySelector('.vid-caption'); if (cap) cap.textContent = v; else if (v) vidRender(); } }
function vidSetDur(v) { if (vidClips[vidCur]) { vidClips[vidCur].dur = Math.max(0.3, Math.min(20, v || 2)); vidRender(); } }
function vidDup() { if (!vidClips.length) return; vidClips.splice(vidCur + 1, 0, { ...vidClips[vidCur] }); vidCur++; vidRender(); }
function vidDel() { if (!vidClips.length) return; vidClips.splice(vidCur, 1); vidCur = Math.max(0, vidCur - 1); vidRender(); }
function vidMove(dir) {
  const j = vidCur + dir; if (j < 0 || j >= vidClips.length) return;
  [vidClips[vidCur], vidClips[j]] = [vidClips[j], vidClips[vidCur]]; vidCur = j; vidRender();
}
function vidPlayToggle() {
  const btn = document.getElementById('vid-play'), stage = document.getElementById('vid-stage');
  if (vidPlay) { clearTimeout(vidPlay); vidPlay = null; btn.textContent = '▶️ Play'; vidRender(); return; }
  if (!vidClips.length) return;
  btn.textContent = '⏸ Stop'; let i = 0;
  const show = () => {
    if (i >= vidClips.length) { clearTimeout(vidPlay); vidPlay = null; btn.textContent = '▶️ Play'; vidRender(); return; }
    const c = vidClips[i];
    stage.innerHTML = `<img src="${c.src}" class="vid-frame">${c.text ? `<div class="vid-caption">${escapeHtml(c.text)}</div>` : ''}`;
    vidPlay = setTimeout(() => { i++; show(); }, (+c.dur || 2) * 1000);
  };
  show();
}
async function vidSave() {
  if (vidPlay) vidPlayToggle();
  const data = JSON.stringify({ clips: vidClips });
  if (vidPath) { await driveWrite(vidPath, data); notify('🎬', 'Saved', vidPath.split('/').pop()); return; }
  const path = await driveSaveAs('movie.video', data);
  if (path) { vidPath = path; notify('🎬', 'Saved', path.split('/').pop()); }
}
async function vidOpen() {
  const picked = await drivePick(['video']);
  if (!picked) return;
  try { const d = JSON.parse(picked.content); vidClips = d.clips || []; vidCur = 0; vidPath = picked.path; vidRender(); notify('🎬', 'Opened', picked.name); }
  catch (e) { notify('⚠️', 'Open failed', 'Not a valid .video file'); }
}
// Open a .video file directly (from a MaxDrive double-click)
async function videoOpenPath(path, name) {
  const res = await fsCat(path);
  if (res.error) { notify('⚠️', 'Open failed', res.error); return; }
  try { const d = JSON.parse(res.content); vidClips = d.clips || []; vidCur = 0; vidPath = path; if (document.getElementById('vid-timeline')) vidRender(); notify('🎬', 'Opened', name); }
  catch (e) { notify('⚠️', 'Open failed', 'Not a valid .video file'); }
}

// ── MAX CAMERA — Photo Booth (snap, filters, open/import images, save .pic) ───
let camStream = null, camFilter = 'none', camShot = null, camPath = null, camDims = { w: 0, h: 0 }, camFacing = 'user';
const CAM_FILTERS = { none:'none', mono:'grayscale(1)', invert:'invert(1)', sepia:'sepia(.8)', retro:'saturate(.6) contrast(1.3) sepia(.3)', cool:'hue-rotate(180deg) saturate(1.4)' };
function buildCamera() {
  return `<div class="cam-app">
    <div class="cam-stage">
      <video id="cam-video" autoplay playsinline muted></video>
      <img id="cam-preview" alt="">
      <canvas id="cam-canvas" style="display:none"></canvas>
      <div id="cam-msg" class="cam-msg">📷 Photo Booth — starting camera…</div>
    </div>
    <div class="cam-filters" id="cam-filters">${Object.keys(CAM_FILTERS).map((f,i)=>`<button class="cam-f${i===0?' active':''}" data-f="${f}" onclick="camSetFilter('${f}')">${f}</button>`).join('')}</div>
    <div class="cam-bar">
      <button class="cam-b" onclick="camOpenFromDrive()">📂 Open</button>
      <button class="cam-b" onclick="camImport()">🖼️ Import</button>
      <button class="cam-b" id="cam-flip" onclick="camFlip()">🔄 Flip</button>
      <button class="cam-b" id="cam-snap" onclick="camSnap()" disabled>📸 Snap</button>
      <button class="cam-b" id="cam-retake" onclick="camRetake()" style="display:none">↩ Retake</button>
      <button class="cam-b" id="cam-save" onclick="camSave()" disabled>💾 Save .pic</button>
      <button class="cam-b" id="cam-dl" onclick="camDownload()" disabled>⬇️ PNG</button>
    </div>
    <div id="cam-fname" style="color:rgba(255,255,255,.45);font-size:12px;text-align:center"></div>
    <input type="file" id="cam-file" accept="image/jpeg,image/jpg,image/png,image/gif,image/webp" style="display:none">
  </div>`;
}
function camSetUi(live) {
  const v = document.getElementById('cam-video'), prev = document.getElementById('cam-preview');
  const filters = document.getElementById('cam-filters'), retake = document.getElementById('cam-retake');
  const snap = document.getElementById('cam-snap'), flip = document.getElementById('cam-flip');
  if (v) v.style.display = live ? '' : 'none';
  if (prev) prev.style.display = live ? 'none' : 'block';
  if (filters) filters.style.display = live ? '' : 'none';
  if (retake) retake.style.display = live ? 'none' : '';
  if (flip) flip.style.display = live ? '' : 'none';
  if (snap) snap.disabled = !live || !camStream;
}
async function camStartLive() {
  const v = document.getElementById('cam-video'), msg = document.getElementById('cam-msg');
  camStop();
  if (!navigator.mediaDevices?.getUserMedia) {
    if (msg) { msg.style.display = 'flex'; msg.textContent = '📷 Camera not supported on this device'; }
    return;
  }
  if (msg) { msg.style.display = 'flex'; msg.textContent = 'Starting camera…'; }
  try {
    camStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: camFacing }, audio: false });
    if (!v) return;
    v.srcObject = camStream;
    v.style.transform = camFacing === 'user' ? 'scaleX(-1)' : 'none';
    v.style.filter = CAM_FILTERS[camFilter] || 'none';
    v.onloadedmetadata = () => {
      v.play().catch(() => {});
      if (msg) msg.style.display = 'none';
      const snap = document.getElementById('cam-snap');
      if (snap) snap.disabled = false;
    };
  } catch (e) {
    if (msg) { msg.style.display = 'flex'; msg.textContent = '📷 Allow camera access, then tap Retake'; }
  }
}
async function initCamera() {
  camShot = null; camPath = null; camFilter = 'none'; camDims = { w: 0, h: 0 };
  const save = document.getElementById('cam-save'), dl = document.getElementById('cam-dl');
  const fname = document.getElementById('cam-fname');
  if (fname) fname.textContent = '';
  if (save) save.disabled = true;
  if (dl) dl.disabled = true;
  const prev = document.getElementById('cam-preview');
  if (prev) prev.removeAttribute('src');
  camSetUi(true);
  await camStartLive();
  const f = document.getElementById('cam-file');
  if (f && !f._wired) {
    f._wired = true;
    f.onchange = async e => {
      const file = e.target.files?.[0];
      if (!file) return;
      try {
        const pic = await picFromFile(file);
        camShowPhoto(pic.dataUrl, file.name, null);
        camDims = { w: pic.w, h: pic.h };
        notify('🖼️', 'Imported', file.name + ' — tap Save .pic to store in MaxDrive');
      } catch (err) { notify('⚠️', 'Import failed', err.message); }
      e.target.value = '';
    };
  }
}
function camImport() { document.getElementById('cam-file')?.click(); }
async function camFlip() {
  camFacing = camFacing === 'user' ? 'environment' : 'user';
  await camStartLive();
}
function camSetFilter(f) {
  if (!camShot) camFilter = f;
  const v = document.getElementById('cam-video');
  if (v && v.style.display !== 'none') v.style.filter = CAM_FILTERS[f] || 'none';
  document.querySelectorAll('.cam-f').forEach(b => b.classList.toggle('active', b.dataset.f === f));
}
function camSnap() {
  const v = document.getElementById('cam-video'), c = document.getElementById('cam-canvas'), prev = document.getElementById('cam-preview');
  if (!v || !v.videoWidth) { notify('📷', 'Not ready', 'Wait for the camera to start'); return; }
  c.width = v.videoWidth; c.height = v.videoHeight;
  camDims = { w: c.width, h: c.height };
  const x = c.getContext('2d');
  x.save();
  if (camFacing === 'user') { x.translate(c.width, 0); x.scale(-1, 1); }

  x.drawImage(v, 0, 0, c.width, c.height);
  x.restore();
  camShot = c.toDataURL('image/png');
  camPath = null;
  if (prev) prev.src = camShot;
  camSetUi(false);
  document.getElementById('cam-save').disabled = false;
  document.getElementById('cam-dl').disabled = false;
  const fname = document.getElementById('cam-fname');

}
async function camRetake() {

function camShowPhoto(dataUrl, name, path) {

async function camOpenPath(path, name) {

async function camSave() {

// ── REMINDERS — to-dos that persist in MongoDB ────────────────────────────────
let remItems = [], remTimer = null;
function buildReminders() {
  return `<div class="rem-app">
    <div class="rem-add">
      <input id="rem-input" class="rem-input" placeholder="Add a reminder…" onkeydown="if(event.key==='Enter')remAdd()">
      <input id="rem-due" class="rem-due" type="datetime-local" title="Optional due time">
      <button class="rem-addbtn" onclick="remAdd()">＋</button>
    </div>
    <div id="rem-list" class="rem-list"></div>
  </div>`;
}
async function remLoad() {
  const res = await apiFetch('/api/me/data/reminders');
  remItems = (res && !res.error && Array.isArray(res.value)) ? res.value : [];
}
async function remStartPolling() {
  await remLoad();
  if (remTimer) clearInterval(remTimer);
  remTimer = setInterval(remCheckDue, 10000);
  remCheckDue();
}
async function initReminders() {
  await remLoad();
  remRender();
  remCheckDue();
}
function remAlarmSound() {
  const vol = 0.62, type = 'square', step = 0.26, beep = 0.24;
  const hi = 880, lo = 554;
  for (let i = 0; i < 8; i++) tone(i % 2 ? lo : hi, beep, type, vol, i * step);
  for (let i = 0; i < 8; i++) tone(i % 2 ? lo : hi, beep, type, vol, 2.6 + i * step);
  for (let i = 0; i < 8; i++) tone(i % 2 ? lo : hi, beep, type, vol, 5.2 + i * step);
}
function remSave() { apiFetch('/api/me/data/reminders', { method: 'PUT', body: JSON.stringify({ value: remItems }) }); }
function remAdd() {
  const inp = document.getElementById('rem-input'), due = document.getElementById('rem-due');
  const text = inp.value.trim(); if (!text) return;
  remItems.unshift({ id: Date.now(), text, done: false, due: due.value || null, notified: false });
  inp.value = ''; due.value = ''; remSave(); remRender();
}
function remToggle(id) { const it = remItems.find(r => r.id === id); if (it) { it.done = !it.done; remSave(); remRender(); } }
function remDel(id) { remItems = remItems.filter(r => r.id !== id); remSave(); remRender(); }
function remRender() {
  const l = document.getElementById('rem-list'); if (!l) return;
  if (!remItems.length) { l.innerHTML = '<div class="rem-empty">No reminders yet. Add one above ✨</div>'; return; }
  l.innerHTML = remItems.map(r => {
    const dueTxt = r.due ? new Date(r.due).toLocaleString([], { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }) : '';
    const overdue = r.due && !r.done && new Date(r.due) < new Date();
    return `<div class="rem-item${r.done ? ' done' : ''}">
      <span class="rem-check" onclick="remToggle(${r.id})">${r.done ? '✅' : '⬜'}</span>
      <span class="rem-text">${escapeHtml(r.text)}${dueTxt ? `<span class="rem-when${overdue ? ' over' : ''}">${overdue ? '⚠ ' : '🕒 '}${dueTxt}</span>` : ''}</span>
      <span class="rem-del" onclick="remDel(${r.id})">🗑</span>
    </div>`;
  }).join('');
}
function remCheckDue() {
  const now = Date.now();
  let changed = false, alarm = false;
  remItems.forEach(r => {
    if (r.due && !r.done && !r.notified && new Date(r.due).getTime() <= now) {
      r.notified = true; changed = true; alarm = true;
      notify('⏰', 'Reminder', r.text, 12000);
    }
  });
  if (alarm) remAlarmSound();
  if (changed) { remSave(); remRender(); }
}

// ── JUMP WORLD — a 2D Minecraft-style block sandbox ───────────────────────────
let jump = null, jumpSel = 1;
// block id → { name, color, solid }
const JW_BLOCKS = [

let mines = null, minesFlagMode = false;
function buildMines() {
  return `<div class="mines-app">

}
function minesToggleMode() { minesFlagMode = !minesFlagMode; const b = document.getElementById('mines-flagbtn'); if (b) { b.textContent = '🚩 flag: ' + (minesFlagMode ? 'on' : 'off'); b.classList.toggle('on', minesFlagMode); } }

  grid.style.gridTemplateColumns = `repeat(${N},1fr)`;

// ── Diffie–Hellman key exchange (the "mix paint out loud" trick) ──────────────

const DH_P = BigInt('0x' + ('FFFFFFFFFFFFFFFFC90FDAA22168C234C4C6628B80DC1CD129024E088A67CC74' +
  '020BBEA63B139B22514A08798E3404DDEF9519B3CD3A431B302B0A6DF25F1437' +
  '4FE1356D6D51C245E485B576625E7EC6F44C42E9A637ED6B0BFF5CB6F406B7ED' +
  'EE386BFB5A899FA5AE9F24117C4B1FE649286651ECE45B3DC2007CB8A163BF05' +
  '98DA48361C55D39A69163FA8FD24CF5F83655D23DCA3AD961C62F356208552BB' +

}
function dhCompute() {
  if (dhMySecret === null) { notify('🤝', 'Generate first', 'Tap "Generate mine" in step 1'); return; }

  if (!/^[0-9a-f]+$/i.test(raw)) { notify('🤝', "That doesn't look right", "Paste your friend's public number"); return; }

}
function dhDemo() {
  const a = dhRandomSecret(), b = dhRandomSecret();
  const A = dhModPow(DH_G, a, DH_P), B = dhModPow(DH_G, b, DH_P);

     <div>🔴 <b>You</b> pick a secret → send public <span class="mono">${short(A)}</span></div>
     <div>🔵 <b>Friend</b> picks a secret → sends public <span class="mono">${short(B)}</span></div>
     <div>🟤 You mix their number with your secret → <span class="mono">${short(youKey)}</span></div>
     <div>🟤 Friend mixes your number with their secret → <span class="mono">${short(friendKey)}</span></div>
     <div style="margin-top:6px;color:${match ? '#9ff0a8' : '#ff6b6b'};font-weight:700">${match ? '✅ Both landed on the SAME secret! Fingerprint: ' + fp : '❌ mismatch'}</div>
     <div style="color:rgba(255,255,255,.5)">A spy heard the two public numbers but still can't make the brown. 🕵️</div>`;
}
function otpEncrypt() {
  const msg = document.getElementById('otp-msg').value;
  if (!msg) { notify('🔐', 'Nothing to encrypt', 'Type a message first'); return; }
  const data = new TextEncoder().encode(msg);
  const key = new Uint8Array(data.length); crypto.getRandomValues(key);
  const cipher = new Uint8Array(data.length);
  for (let i = 0; i < data.length; i++) cipher[i] = data[i] ^ key[i];

  document.getElementById('otp-cipher-out').value = otpB64(cipher);
}
function otpDecrypt() {
  try {
    const cipher = otpFromB64(document.getElementById('otp-cipher-in').value);
    const key = otpFromB64(document.getElementById('otp-key-in').value);
    if (cipher.length !== key.length) { notify('🔓', "Key doesn't match", 'The key must be the same length as the cipher'); return; }
    const out = new Uint8Array(cipher.length);
    for (let i = 0; i < cipher.length; i++) out[i] = cipher[i] ^ key[i];

function rgbToHsl(r, g, b) {

// ══ TETRIS ════════════════════════════════════════════════════════════════════
let tetris = null;
function buildTetris() {
  return `<div class="gshell"><div class="tetris-wrap">
    <canvas id="tetris-canvas" width="200" height="400" style="background:#0d1117;border-radius:8px;border:1px solid rgba(255,255,255,.1)"></canvas>
    <div class="tetris-side">
      <div class="tetris-panel"><div class="lbl">Score</div><div class="val" id="tetris-score">0</div></div>
      <div class="tetris-panel"><div class="lbl">Level</div><div class="val" id="tetris-level">1</div></div>
      <div class="tetris-panel"><div class="lbl">Lines</div><div class="val" id="tetris-lines">0</div></div>
      <div class="tetris-panel"><div class="lbl">Next</div><canvas id="tetris-next" width="64" height="64"></canvas></div>
    </div>
  </div><div class="ghint">← → move · ↑ rotate · ↓ soft drop · Space hard drop</div></div>`;
}
const TET_COLORS = [null,'#00f0f0','#0000f0','#f0a000','#f0f000','#00f000','#a000f0','#f00000'];
const TET_SHAPES = [[],
  [[1,1,1,1]], [[2,0,0],[2,2,2]], [[0,0,3],[3,3,3]], [[4,4],[4,4]],
  [[0,5,5],[5,5,0]], [[0,6,0],[6,6,6]], [[7,7,0],[0,7,7]]];
function initTetris() {
  const c = document.getElementById('tetris-canvas'); if (!c) return;
  const ctx = c.getContext('2d'), CELL = 20, COLS = 10, ROWS = 20;
  let grid, piece, nextP, score, level, lines, dropTimer, gameOver;
  function newPiece() { const id = 1 + Math.floor(Math.random() * 7); return { id, shape: TET_SHAPES[id], x: 3, y: 0 }; }
  function reset() { grid = Array.from({ length: ROWS }, () => Array(COLS).fill(0)); piece = newPiece(); nextP = newPiece(); score = 0; level = 1; lines = 0; gameOver = false; schedule(); draw(); }
  function schedule() { clearInterval(dropTimer); dropTimer = setInterval(() => tick(), Math.max(80, 600 - (level - 1) * 50)); }
  function collide(p, dx, dy, shape) { shape = shape || p.shape; for (let r = 0; r < shape.length; r++) for (let cc = 0; cc < shape[r].length; cc++) { if (!shape[r][cc]) continue; const nx = p.x + cc + dx, ny = p.y + r + dy; if (nx < 0 || nx >= COLS || ny >= ROWS) return true; if (ny >= 0 && grid[ny][nx]) return true; } return false; }
  function merge() { piece.shape.forEach((row, r) => row.forEach((v, cc) => { if (v) { const ny = piece.y + r; if (ny >= 0) grid[ny][piece.x + cc] = v; } })); }
  function clearLines() { let cleared = 0; for (let r = ROWS - 1; r >= 0; r--) { if (grid[r].every(v => v)) { grid.splice(r, 1); grid.unshift(Array(COLS).fill(0)); cleared++; r++; } } if (cleared) { lines += cleared; score += [0, 100, 300, 500, 800][cleared] * level; level = 1 + Math.floor(lines / 10); schedule(); tone([0,523,659,784,1047][cleared] || 523, 0.15, 'square', 0.15); upd(); } }
  function tick() { if (gameOver) return; if (!collide(piece, 0, 1)) piece.y++; else { merge(); clearLines(); piece = nextP; nextP = newPiece(); if (collide(piece, 0, 0)) { gameOver = true; clearInterval(dropTimer); tone(160, 0.5, 'sawtooth', 0.2); notify('🧩', 'Game Over', 'Score: ' + score); } } draw(); }
  function rotate() { const s = piece.shape, R = s[0].map((_, i) => s.map(row => row[i]).reverse()); if (!collide(piece, 0, 0, R)) piece.shape = R; }
  function upd() { document.getElementById('tetris-score').textContent = score; document.getElementById('tetris-level').textContent = level; document.getElementById('tetris-lines').textContent = lines; }
  function drawCell(x, y, id, g) { g.fillStyle = TET_COLORS[id]; g.fillRect(x * CELL + 1, y * CELL + 1, CELL - 2, CELL - 2); g.fillStyle = 'rgba(255,255,255,.2)'; g.fillRect(x * CELL + 1, y * CELL + 1, CELL - 2, 3); }
  function draw() {
    ctx.fillStyle = '#0d1117'; ctx.fillRect(0, 0, c.width, c.height);
    for (let r = 0; r < ROWS; r++) for (let cc = 0; cc < COLS; cc++) if (grid[r][cc]) drawCell(cc, r, grid[r][cc], ctx);
    piece.shape.forEach((row, r) => row.forEach((v, cc) => { if (v) drawCell(piece.x + cc, piece.y + r, v, ctx); }));
    const nc = document.getElementById('tetris-next'); if (nc) { const ng = nc.getContext('2d'); ng.clearRect(0, 0, 64, 64); ng.save(); ng.scale(0.7, 0.7); nextP.shape.forEach((row, r) => row.forEach((v, cc) => { if (v) drawCell(cc + 0.5, r + 0.5, v, ng); })); ng.restore(); }

  }
  tetris = { reset, stop() { clearInterval(dropTimer); }, key(e) {
    if (gameOver) { if (e.key === ' ') reset(); return; }
    if (e.key === 'ArrowLeft' && !collide(piece, -1, 0)) piece.x--;
    else if (e.key === 'ArrowRight' && !collide(piece, 1, 0)) piece.x++;
    else if (e.key === 'ArrowDown' && !collide(piece, 0, 1)) { piece.y++; score++; }
    else if (e.key === 'ArrowUp') rotate();
    else if (e.key === ' ') { while (!collide(piece, 0, 1)) piece.y++; tick(); }
    else return;
    e.preventDefault(); draw();
  } };

}

// ══ BREAKOUT ══════════════════════════════════════════════════════════════════
let breakout = null;
function buildBreakout() {
  return `<div class="gshell">
    <div class="grow"><span>Score: <b id="bo-score">0</b></span><span>Lives: <b id="bo-lives">3</b></span><span>Level: <b id="bo-level">1</b></span></div>
    <canvas id="bo-canvas" width="440" height="380" style="background:#0a0a16;border-radius:8px"></canvas>
    <div class="ghint">Move mouse to control paddle · click to launch</div></div>`;
}
function initBreakout() {
  const c = document.getElementById('bo-canvas'); if (!c) return;
  const ctx = c.getContext('2d'), W = c.width, H = c.height;
  let paddle, ball, bricks, score, lives, level, running, raf;
  const COLORS = ['#ff5f57','#febc2e','#28c840','#64b4ff','#bf5af2'];
  function makeBricks() { bricks = []; const rows = 4 + level, cols = 9, bw = (W - 40) / cols, bh = 18; for (let r = 0; r < rows; r++) for (let cc = 0; cc < cols; cc++) bricks.push({ x: 20 + cc * bw, y: 40 + r * (bh + 5), w: bw - 5, h: bh, c: COLORS[r % COLORS.length], alive: true }); }
  function reset(full) { paddle = { x: W / 2 - 45, w: 90, h: 12 }; ball = { x: W / 2, y: H - 40, dx: 0, dy: 0, r: 7, stuck: true }; if (full) { score = 0; lives = 3; level = 1; } makeBricks(); upd(); }
  function upd() { document.getElementById('bo-score').textContent = score; document.getElementById('bo-lives').textContent = lives; document.getElementById('bo-level').textContent = level; }
  function launch() { if (ball.stuck) { ball.stuck = false; ball.dx = 3.5 * (Math.random() > .5 ? 1 : -1); ball.dy = -4; } }
  function loop() {
    ctx.fillStyle = '#0a0a16'; ctx.fillRect(0, 0, W, H);
    if (ball.stuck) { ball.x = paddle.x + paddle.w / 2; ball.y = H - 40; }
    else { ball.x += ball.dx; ball.y += ball.dy; if (ball.x < ball.r || ball.x > W - ball.r) ball.dx *= -1; if (ball.y < ball.r) ball.dy *= -1;
      if (ball.y > H) { lives--; upd(); if (lives <= 0) { tone(140, 0.5, 'sawtooth', 0.2); notify('🧱', 'Game Over', 'Score: ' + score); running = false; } reset(false); } }
    // paddle collision
    if (ball.y + ball.r > H - 24 && ball.y < H - 12 && ball.x > paddle.x && ball.x < paddle.x + paddle.w) { ball.dy = -Math.abs(ball.dy); const hit = (ball.x - (paddle.x + paddle.w / 2)) / (paddle.w / 2); ball.dx = hit * 5; tone(440, 0.05, 'square', 0.1); }
    // bricks
    let alive = 0;
    for (const b of bricks) { if (!b.alive) continue; alive++;
      if (ball.x > b.x && ball.x < b.x + b.w && ball.y - ball.r < b.y + b.h && ball.y + ball.r > b.y) { b.alive = false; ball.dy *= -1; score += 10 * level; upd(); tone(600 + Math.random() * 200, 0.05, 'square', 0.12); }
      ctx.fillStyle = b.c; ctx.fillRect(b.x, b.y, b.w, b.h); }
    if (alive === 0) { level++; tone(880, 0.3, 'square', 0.15); reset(false); }
    // draw
    ctx.fillStyle = '#fff'; ctx.fillRect(paddle.x, H - 24, paddle.w, paddle.h);
    ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.r, 0, 7); ctx.fillStyle = '#64b4ff'; ctx.fill();
    if (running) raf = requestAnimationFrame(loop);
  }
  c.onmousemove = e => { const r = c.getBoundingClientRect(); paddle.x = Math.max(0, Math.min(W - paddle.w, e.clientX - r.left - paddle.w / 2)); };
  c.onclick = launch;
  reset(true); running = true; breakout = { stop: () => { running = false; cancelAnimationFrame(raf); } }; loop();
}

let life = null;
function buildLife() {
  return `<div class="gshell">
    <div class="grow"><button class="gbtn" id="life-play" onclick="lifeToggle()">▶ Play</button>

      <button class="gbtn" onclick="lifeClear()">Clear</button>
      <span>Gen: <b id="life-gen">0</b></span></div>
    <canvas id="life-canvas" width="480" height="400" style="background:#0a0a16;border-radius:8px;cursor:cell"></canvas>
    <div class="ghint">Click/drag to toggle cells · 🟦 Glider gun ready in Random</div></div>`;
}
function initLife() {
  const c = document.getElementById('life-canvas'); if (!c) return;
  const ctx = c.getContext('2d'), CELL = 8, COLS = 60, ROWS = 50;
  let grid = Array.from({ length: ROWS }, () => Array(COLS).fill(0)), gen = 0, timer = null, painting = false;
  function draw() {
    ctx.fillStyle = '#0a0a16'; ctx.fillRect(0, 0, c.width, c.height);
    for (let r = 0; r < ROWS; r++) for (let cc = 0; cc < COLS; cc++) if (grid[r][cc]) { ctx.fillStyle = `hsl(${(r + cc) * 4 % 360},70%,60%)`; ctx.fillRect(cc * CELL, r * CELL, CELL - 1, CELL - 1); }
    document.getElementById('life-gen').textContent = gen;
  }
  function step() { const n = grid.map(r => [...r]); for (let r = 0; r < ROWS; r++) for (let cc = 0; cc < COLS; cc++) { let cnt = 0; for (let dr = -1; dr <= 1; dr++) for (let dc = -1; dc <= 1; dc++) { if (!dr && !dc) continue; const rr = r + dr, ccc = cc + dc; if (rr >= 0 && rr < ROWS && ccc >= 0 && ccc < COLS) cnt += grid[rr][ccc]; } n[r][cc] = grid[r][cc] ? (cnt === 2 || cnt === 3 ? 1 : 0) : (cnt === 3 ? 1 : 0); } grid = n; gen++; draw(); }
  function xy(e) { const r = c.getBoundingClientRect(); return [Math.floor((e.clientY - r.top) / CELL), Math.floor((e.clientX - r.left) / CELL)]; }
  c.onmousedown = e => { painting = true; const [r, cc] = xy(e); if (grid[r]) { grid[r][cc] = grid[r][cc] ? 0 : 1; draw(); } };
  c.onmousemove = e => { if (!painting) return; const [r, cc] = xy(e); if (grid[r] && !grid[r][cc]) { grid[r][cc] = 1; draw(); } };
  c.onmouseup = c.onmouseleave = () => painting = false;

    toggle() { if (timer) { clearInterval(timer); timer = null; document.getElementById('life-play').textContent = '▶ Play'; } else { timer = setInterval(step, 90); document.getElementById('life-play').textContent = '⏸ Pause'; } },
    step, clear() { grid = Array.from({ length: ROWS }, () => Array(COLS).fill(0)); gen = 0; draw(); },
    random() { for (let r = 0; r < ROWS; r++) for (let cc = 0; cc < COLS; cc++) grid[r][cc] = Math.random() < 0.3 ? 1 : 0; gen = 0; draw(); },
    stop() { clearInterval(timer); }
  };
  life.random();
}
function lifeToggle() { life?.toggle(); } function lifeStep() { life?.step(); } function lifeRandom() { life?.random(); } function lifeClear() { life?.clear(); }

// ══ FRACTAL EXPLORER ══════════════════════════════════════════════════════════
let fractal = null;
function buildFractal() {
  return `<div class="gshell" style="padding:0">
    <canvas id="fractal-canvas" width="540" height="500" style="cursor:zoom-in"></canvas>
    <div class="ghint" style="padding:8px">Click to zoom in · right-click to zoom out · <button class="gbtn" style="padding:3px 10px" onclick="fractalReset()">Reset</button></div></div>`;
}
function initFractal() {
  const c = document.getElementById('fractal-canvas'); if (!c) return;
  const ctx = c.getContext('2d'), W = c.width, H = c.height;
  let cx = -0.5, cy = 0, scale = 3, maxIter = 100;
  function render() {
    const img = ctx.createImageData(W, H), d = img.data;
    for (let py = 0; py < H; py++) for (let px = 0; px < W; px++) {
      const x0 = cx + (px - W / 2) / W * scale, y0 = cy + (py - H / 2) / H * scale;
      let x = 0, y = 0, i = 0;
      while (x * x + y * y < 4 && i < maxIter) { const xt = x * x - y * y + x0; y = 2 * x * y + y0; x = xt; i++; }
      const idx = (py * W + px) * 4;
      if (i === maxIter) { d[idx] = d[idx + 1] = d[idx + 2] = 0; }
      else { const h = (i / maxIter); d[idx] = 9 * (1 - h) * h * h * h * 255; d[idx + 1] = 15 * (1 - h) * (1 - h) * h * h * 255; d[idx + 2] = 8.5 * (1 - h) * (1 - h) * (1 - h) * h * 255; }
      d[idx + 3] = 255;
    }
    ctx.putImageData(img, 0, 0);
  }
  c.onclick = e => { const r = c.getBoundingClientRect(); cx += ((e.clientX - r.left) - W / 2) / W * scale; cy += ((e.clientY - r.top) - H / 2) / H * scale; scale *= 0.5; maxIter = Math.min(500, maxIter + 30); render(); };
  c.oncontextmenu = e => { e.preventDefault(); scale *= 2; maxIter = Math.max(100, maxIter - 30); render(); };
  fractal = { reset() { cx = -0.5; cy = 0; scale = 3; maxIter = 100; render(); } };
  render();
}
function fractalReset() { fractal?.reset(); }

function mdRender() {
  const src = document.getElementById('md-input').value;
  let h = src
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/```([\s\S]*?)```/g, (m, c) => `<pre><code>${c.trim()}</code></pre>`)
    .replace(/^### (.*)$/gm, '<h3>$1</h3>').replace(/^## (.*)$/gm, '<h2>$1</h2>').replace(/^# (.*)$/gm, '<h1>$1</h1>')
    .replace(/^&gt; (.*)$/gm, '<blockquote>$1</blockquote>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>').replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/`(.+?)`/g, '<code>$1</code>')
    .replace(/\[(.+?)\]\((.+?)\)/g, '<a href="$2" target="_blank">$1</a>')
    .replace(/^\d+\. (.*)$/gm, '<oli>$1</oli>').replace(/^[-*] (.*)$/gm, '<uli>$1</uli>');
  h = h.replace(/(<uli>.*<\/uli>\n?)+/g, m => '<ul>' + m.replace(/<\/?uli>/g, t => t === '<uli>' ? '<li>' : '</li>') + '</ul>');
  h = h.replace(/(<oli>.*<\/oli>\n?)+/g, m => '<ol>' + m.replace(/<\/?oli>/g, t => t === '<oli>' ? '<li>' : '</li>') + '</ol>');
  h = h.split('\n\n').map(b => /^\s*<(h\d|ul|ol|pre|blockquote)/.test(b.trim()) ? b : (b.trim() ? '<p>' + b.replace(/\n/g, '<br>') + '</p>' : '')).join('');
  document.getElementById('md-output').innerHTML = h;
}

function initTyping() {
  const text = TYPING_TEXTS[Math.floor(Math.random() * TYPING_TEXTS.length)];
  typing = { text, started: null };
  const inp = document.getElementById('typ-input'); if (inp) { inp.value = ''; inp.focus(); }
  document.getElementById('typ-wpm').textContent = '0'; document.getElementById('typ-acc').textContent = '100%'; document.getElementById('typ-time').textContent = '0s';
  typingRender('');
}
function typingRender(typed) {
  const t = typing.text;
  document.getElementById('typ-text').innerHTML = t.split('').map((ch, i) => {
    if (i < typed.length) return `<span class="${typed[i] === ch ? 'ok' : 'bad'}">${ch}</span>`;
    if (i === typed.length) return `<span class="cur">${ch}</span>`;
    return `<span>${ch}</span>`;
  }).join('');
}
function typingCheck(typed) {
  if (!typing.started) typing.started = Date.now();
  typingRender(typed);
  const elapsed = (Date.now() - typing.started) / 1000;
  const words = typed.trim().split(/\s+/).filter(Boolean).length;
  const wpm = elapsed > 0 ? Math.round(words / elapsed * 60) : 0;
  let correct = 0; for (let i = 0; i < typed.length; i++) if (typed[i] === typing.text[i]) correct++;
  const acc = typed.length ? Math.round(correct / typed.length * 100) : 100;
  document.getElementById('typ-wpm').textContent = wpm;
  document.getElementById('typ-acc').textContent = acc + '%';
  document.getElementById('typ-time').textContent = Math.round(elapsed) + 's';
  if (typed === typing.text) { tone(880, 0.3, 'square', 0.15); notify('⌨️', 'Done!', `${wpm} WPM at ${acc}% accuracy`); }
}

let mapsObj = null, mapsMarker = null, leafletLoading = null;
const MAPS_PRESETS = [
  { n: 'New York', lat: 40.7128, lon: -74.006 }, { n: 'London', lat: 51.5074, lon: -0.1278 },
  { n: 'Tokyo', lat: 35.6895, lon: 139.6917 }, { n: 'Paris', lat: 48.8566, lon: 2.3522 },
  { n: 'Sydney', lat: -33.8688, lon: 151.2093 }, { n: 'Cairo', lat: 30.0444, lon: 31.2357 },
];
function buildMaps() {
  return `<div class="maps-app">
    <div class="maps-bar">
      <input id="maps-q" placeholder="Search any place…" onkeydown="if(event.key==='Enter')mapsSearch()">
      <button onclick="mapsSearch()">Search</button>
      <button onclick="mapsLocate()" title="My location">📍 Me</button>
    </div>
    <div class="maps-presets">${MAPS_PRESETS.map(p => `<button class="maps-preset" onclick="mapsGoto(${p.lat},${p.lon},'${p.n}')">${p.n}</button>`).join('')}</div>
    <div id="maps-canvas"></div>
  </div>`;
}
function loadLeaflet() {
  if (window.L) return Promise.resolve();
  if (leafletLoading) return leafletLoading;
  leafletLoading = new Promise((resolve, reject) => {
    const css = document.createElement('link');
    css.rel = 'stylesheet'; css.href = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.css';
    document.head.appendChild(css);
    const sc = document.createElement('scr' + 'ipt');
    sc.src = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.js';
    sc.onload = resolve; sc.onerror = reject;
    document.head.appendChild(sc);
  });
  return leafletLoading;
}
async function initMaps() {
  const canvas = document.getElementById('maps-canvas');
  if (!canvas) return;
  canvas.innerHTML = '<div style="color:rgba(255,255,255,.4);text-align:center;padding:40px">Loading map…</div>';
  try { await loadLeaflet(); } catch { canvas.innerHTML = '<div style="color:#ff8a84;text-align:center;padding:40px">Map failed to load.<br><small style="color:rgba(255,255,255,.4)">Check your connection.</small></div>'; return; }
  canvas.innerHTML = '';
  mapsObj = L.map(canvas, { zoomControl: true }).setView([20, 0], 2);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap', maxZoom: 19 }).addTo(mapsObj);
  setTimeout(() => mapsObj && mapsObj.invalidateSize(), 250);
}
function mapsDrop(lat, lon, label, zoom) {
  if (!mapsObj) return;
  mapsObj.flyTo([lat, lon], zoom || 12);
  if (mapsMarker) mapsObj.removeLayer(mapsMarker);
  mapsMarker = L.marker([lat, lon]).addTo(mapsObj);
  if (label) mapsMarker.bindPopup(label).openPopup();
}

async function mapsSearch() {
  const q = document.getElementById('maps-q').value.trim();
  if (!q || !mapsObj) return;
  try {
    const r = await fetch('https://nominatim.openstreetmap.org/search?q=' + encodeURIComponent(q) + '&format=json&limit=1').then(r => r.json());
    if (!r.length) { notify('🗺️', 'Not found', `No results for "${q}"`); return; }
    mapsDrop(+r[0].lat, +r[0].lon, r[0].display_name, 13);
  } catch { notify('🗺️', 'Error', 'Search failed — check connection'); }
}
function mapsLocate() {
  if (!navigator.geolocation) { notify('🗺️', 'Unavailable', 'Geolocation not supported'); return; }
  navigator.geolocation.getCurrentPosition(
    p => mapsDrop(p.coords.latitude, p.coords.longitude, 'You are here', 14),
    () => notify('🗺️', 'Location blocked', 'Permission denied')
  );
}

    else if (m = line.match(/^to\s+([a-zA-Z_]\w*)\s+with\s+(.+?)\s*:$/i)) { out.push(`function ${m[1]}(${m[2]}){`); openBlock('fn'); } // define function w/ inputs
    else if (m = line.match(/^to\s+([a-zA-Z_]\w*)\s*:$/i)) { out.push(`function ${m[1]}(){`); openBlock('fn'); } // define function
    else if (m = line.match(/^call\s+([a-zA-Z_]\w*)\s+with\s+(.+)$/i)) out.push(`${m[1]}(${m[2]});`); // run function w/ inputs
    else if (m = line.match(/^call\s+([a-zA-Z_]\w*)$/i)) out.push(`${m[1]}();`); // run function
    else if (m = line.match(/^return\s+(.+)$/i)) out.push(`return ${m[1]};`);
    else if (/^return$/i.test(line)) out.push(`return;`);
    else if (m = line.match(/^on\s+click\s+(.+?)\s*:$/i)) { out.push(`MS.onClick(${ref(m[1])}, function(){`); stack.push({ type: 'fn', openIndent: ind, sawBody: false }); }
    else if (m = line.match(/^repeat\s+(.+?)\s+times\s*:?\s*$/i)) { out.push(`for(let _i=0;_i<(${m[1]});_i++){`); openBlock('loop'); }
    else if (m = line.match(/^if\s+(.+?)\s*:?\s*$/i)) { out.push(`if(${cond(m[1])}){`); openBlock('if'); }
    else if (m = line.match(/^(?:elif|else\s+if)\s+(.+?)\s*:?\s*$/i)) { if (topIf()) { out.push(`} else if(${cond(m[1])}){`); stack[stack.length - 1].kind = 'elif'; stack[stack.length - 1].sawBody = false; } } // chains onto the open if
    else if (/^else\s*:?$/i.test(line)) { if (topIf()) { out.push(`} else {`); stack[stack.length - 1].kind = 'elif'; stack[stack.length - 1].sawBody = false; } }
    else if (isEnd) closeFrame();
    else out.push(line.endsWith(';') || line.endsWith('{') || line.endsWith('}') ? line : line + ';'); // raw JS passthrough
  }
  while (stack.length) closeFrame(); // auto-close anything left open at EOF
  return out.join('\n');
}
// MaxScript markup: colors & style keywords
const MS_COLORS = {
  red:'#ff5f57', blue:'#64b4ff', green:'#28c840', yellow:'#febc2e', purple:'#bf5af2',
  orange:'#ff9f0a', pink:'#ff6bcb', black:'#222', white:'#fff', gray:'#8a8a8a', grey:'#8a8a8a', teal:'#30d6c0',
  // extended palette
  cyan:'#22d3ee', magenta:'#ff4fd8', lime:'#a3e635', indigo:'#6366f1', violet:'#a78bfa',
  brown:'#a8703b', gold:'#ffd54a', silver:'#cbd5e1', navy:'#1e3a8a', maroon:'#8b1e3f',
  olive:'#8a8a2e', coral:'#ff7f50', salmon:'#fa8072', turquoise:'#1abc9c', crimson:'#dc2647',
  lavender:'#c4b5fd', mint:'#9ef7c4', peach:'#ffb59e', sky:'#7dd3fc', rose:'#fb7185',
  lightblue:'#7dd3fc', lightgreen:'#86efac', hotpink:'#ff4f9a', aqua:'#22d3ee', slate:'#64748b',
};
// Light backgrounds that need dark button text
const MS_LIGHT = new Set(['white','yellow','gold','silver','lime','mint','peach','lavender','sky','lightblue','lightgreen','aqua','salmon','coral']);
const MS_BASE_CSS = `body{font-family:system-ui,-apple-system,sans-serif;padding:24px;background:#12122a;color:#fff;margin:0}.ms-el{display:block;margin:12px 0}h1.ms-el{font-size:26px}button.ms-el{padding:12px 24px;border:none;cursor:pointer;color:#fff;font-size:16px;background:#64b4ff;transition:filter .1s}button.ms-el:hover{filter:brightness(1.1)}button.ms-el:active{filter:brightness(.9)}input.ms-el{padding:10px 14px;border-radius:8px;border:1px solid #ccc;font-size:15px;min-width:200px}#ms-output{margin-top:14px;font-family:monospace;color:#9fe}#ms-output div{padding:2px 0}`;
function msStyle(type, tokens) {
  let id = null; const label = [], css = [];
  for (const tk of tokens) {
    const t = tk.trim(); if (!t) continue;
    const low = t.toLowerCase();
    if (t.startsWith('#')) id = t.slice(1).replace(/[^a-zA-Z0-9_-]/g, '');
    else if (MS_COLORS[low]) { if (type === 'button') { css.push('background:' + MS_COLORS[low], 'color:' + (MS_LIGHT.has(low) ? '#222' : '#fff')); } else css.push('color:' + MS_COLORS[low]); }
    else if (low === 'round' || low === 'pill') css.push('border-radius:999px');
    else if (low === 'square') css.push('border-radius:6px');
    else if (low === 'huge') css.push('font-size:30px');
    else if (low === 'big') css.push('font-size:21px');
    else if (low === 'small') css.push('font-size:12px');
    else if (low === 'bold') css.push('font-weight:700');
    else if (low === 'center') css.push('text-align:center', 'margin-left:auto', 'margin-right:auto');
    else if (low === 'shadow') css.push('box-shadow:0 4px 16px rgba(0,0,0,.35)');
    else label.push(t); // unrecognized token → part of the label
  }
  return { id, label: label.join(', '), css: css.join(';') };
}
// Compile MaxScript markup → { html, js }. Top-level "type name: (props) label"
// lines become elements (the optional name lets other code refer to them);
// indented lines under a button become its click action.
function maxCompile(src) {
  const lines = (src || '').split('\n'), htmlOut = [], handlers = [], initLines = [];
  let auto = 0;
  const MS_STMT = /^(?:if|elif|else|repeat|end|set|show|alert|add|subtract|call|return|to|on)\b/i;
  for (let i = 0; i < lines.length; i++) {
    const raw = lines[i], trimmed = raw.trim();
    if (!trimmed || trimmed.startsWith('#') || trimmed.startsWith('//')) continue;
    if (/^\s/.test(raw)) { initLines.push(raw); continue; } // stray indented → init code
    if (MS_STMT.test(trimmed)) { initLines.push(raw); continue; } // logic line — never a UI element
    // type, optional plain-word name, then ": rest"
    const m = trimmed.match(/^([a-zA-Z]+)(?:\s+([a-zA-Z_][\w-]*))?\s*:\s*(.*)$/);
    if (!m) { initLines.push(raw); continue; }
    const type = m[1].toLowerCase();
    if (!['button', 'title', 'text', 'label', 'input', 'image'].includes(type)) { initLines.push(raw); continue; }
    const explicitName = m[2]; let rest = m[3], props = [], trailing = rest;
    const pm = rest.match(/^\(([^)]*)\)\s*(.*)$/);
    if (pm) { props = pm[1].split(','); trailing = pm[2]; }
    const sty = msStyle(type, props);
    const label = (trailing && trailing.trim()) ? trailing.trim() : sty.label;
    const id = explicitName || sty.id || (type + (++auto));
    const st = sty.css ? ` style="${sty.css}"` : '';
    if (type === 'button') {
      htmlOut.push(`<button id="${id}" class="ms-el"${st}>${escapeHtml(label || 'Button')}</button>`);
      const body = [];
      while (i + 1 < lines.length && (/^\s/.test(lines[i + 1]) || !lines[i + 1].trim())) { i++; if (lines[i].trim()) body.push(lines[i]); }
      handlers.push(`MS.onClick(${JSON.stringify(id)}, function(){\n${maxTranspile(body.join('\n'))}\n});`);
    } else if (type === 'title') htmlOut.push(`<h1 id="${id}" class="ms-el"${st}>${escapeHtml(label)}</h1>`);
    else if (type === 'text' || type === 'label') htmlOut.push(`<p id="${id}" class="ms-el"${st}>${escapeHtml(label)}</p>`);
    else if (type === 'input') htmlOut.push(`<input id="${id}" class="ms-el" placeholder="${escapeHtml(label)}"${st}>`);
    else if (type === 'image') htmlOut.push(`<img id="${id}" class="ms-el" src="${escapeHtml(label)}"${st ? st.slice(0, -1) + ';max-width:100%"' : ' style="max-width:100%"'}>`);
  }
  // Declare every variable once at the top so handlers share state (not shadow it)
  const vars = new Set();
  (src || '').split('\n').forEach(l => {
    const t = l.trim(); let mm;
    if (mm = t.match(/^set\s+([a-zA-Z_]\w*)\s+to\b/i)) { if (!/^(text|html)$/i.test(mm[1])) vars.add(mm[1]); }
    else if (mm = t.match(/^add\s+.+\s+to\s+([a-zA-Z_]\w*)$/i)) vars.add(mm[1]);
    else if (mm = t.match(/^subtract\s+.+\s+from\s+([a-zA-Z_]\w*)$/i)) vars.add(mm[1]);
  });
  const decl = vars.size ? `let ${[...vars].join(', ')};\n` : '';
  const js = decl + (initLines.length ? maxTranspile(initLines.join('\n')) + '\n' : '') + handlers.join('\n');
  return { html: htmlOut.join('\n'), js };
}
// Returns { html, css, js } ready to inject for any app (JS or MaxScript)
function compileApp(def) {
  if (def.lang === 'maxscript') {
    const c = maxCompile(def.js || '');
    return { html: (def.html || '') + c.html, css: MS_BASE_CSS + (def.css || ''), js: MS_RUNTIME + '\n' + c.js };
  }
  return { html: def.html || '', css: def.css || '', js: def.js || '' };
}

// ══ Custom apps (stored in MongoDB, shared across all users) ══════════════════
let customApps = {}; // id -> def, cached from server
function registerCustomApp(def) {
  const mine = def.author === currentUser?.username;
  apps[def.id] = {
    title: def.title, short: def.title.length > 12 ? def.title.slice(0, 11) + '…' : def.title, icon: def.icon || '🧩',
    w: 540, h: 460, cat: mine ? 'My Apps' : 'Community', custom: true,
    desc: (def.desc || 'A community app') + (def.author ? ' · by @' + def.author : ''),
    html: () => `<iframe class="custom-frame" id="custframe-${def.id}"></iframe>`,
  };
}
function customRender(id) {
  const def = customApps[id]; if (!def) return;
  const frame = document.getElementById('custframe-' + id); if (!frame) return;
  const doc = frame.contentDocument || frame.contentWindow.document;
  doc.open(); doc.close();
  doc.documentElement.replaceChildren(doc.createElement('head'), doc.createElement('body'));
  const out = compileApp(def);
  const style = doc.createElement('style'); style.textContent = out.css; doc.head.appendChild(style);
  doc.body.innerHTML = out.html;
  if (out.js) { const sc = doc.createElement('scr' + 'ipt'); sc.textContent = 'try{' + out.js + '}catch(e){document.body.innerHTML+="<pre style=\\"color:red;padding:10px\\">"+e+"</pre>"}'; doc.body.appendChild(sc); }
}
// Fetch every community app from the server and register them
async function loadCustomApps() {
  const list = await apiFetch('/api/apps');
  if (list.error || !Array.isArray(list)) return;
  // drop previously-registered customs, then re-add
  Object.keys(customApps).forEach(id => { if (apps[id]) delete apps[id]; });
  customApps = {};
  list.forEach(def => { customApps[def.id] = def; registerCustomApp(def); });
  renderDesktop(); renderStartApps();
  if (windows['appstore']) renderStoreGrid();
  if (windows['makeyourownwebsite']) studioRenderList();
}
// Deep link: fetch a single app on demand if not already known
async function ensureCustomApp(id) {
  if (apps[id]) return true;
  const def = await apiFetch('/api/apps/' + encodeURIComponent(id));
  if (def.error || !def.id) return false;
  customApps[def.id] = def; registerCustomApp(def);
  return true;
}

}
// Open a file in the right Max app based on extension

function driveCardOpen(i) {

function driveOpen(path, type, name) { openDriveFile(path, type, name); }
async function driveNew(kind) {

  const map = { doc: ['Untitled Doc', '.docs', 'editor'], md: ['Untitled', '.md', 'markdown'], sheet: ['Untitled Sheet', '.sheet', 'sheets'], form: ['Untitled Form', '.forms', 'forms'], board: ['Untitled Board', '.board', 'board'] };
