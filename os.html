  el.innerHTML = BOARD_COLS.map(col => `<div class="board-col" ondragover="event.preventDefault()" ondrop="boardDrop('${col}')">
    <div class="board-col-h">${col} <span>${(boardData[col] || []).length}</span></div>
    <div class="board-cards">${(boardData[col] || []).map((card, i) => `<div class="board-card" draggable="true" ondragstart="boardDragStart('${col}',${i})">${escapeHtml(card)}<span class="board-del" onclick="boardDel('${col}',${i})">✕</span></div>`).join('')}</div>
    <div class="board-add" onclick="boardAdd('${col}')">＋ Add card</div>
  </div>`).join('');
}
function boardAdd(col) { const t = prompt('New card:'); if (t && t.trim()) { boardData[col].push(t.trim()); boardRender(); } }
function boardDel(col, i) { boardData[col].splice(i, 1); boardRender(); }
function boardDragStart(col, i) { boardDrag = { col, i }; }
function boardDrop(col) {
  if (!boardDrag) return;
  const card = boardData[boardDrag.col].splice(boardDrag.i, 1)[0];
  boardData[col].push(card); boardDrag = null; boardRender();
}
async function boardSave() {
  if (!boardPath) return boardSaveAs();
  await driveWrite(boardPath, JSON.stringify(boardData)); notify('📌', 'Saved', boardPath.split('/').pop());
}
async function boardSaveAs() {
  const p = await driveSaveAs('board.board', JSON.stringify(boardData));
  if (p) { boardPath = p; document.getElementById('board-name').textContent = p.split('/').pop(); }
}
async function boardOpen() {
  const picked = await drivePick(['board']);
  if (!picked) return;
  boardLoadContent(picked.content, picked.path, picked.name);
}
async function boardOpenPath(path, name) {
  const res = await fsCat(path); if (res.error) return;
  boardLoadContent(res.content, path, name);
}
function boardLoadContent(content, path, name) {
  try { boardData = content ? JSON.parse(content) : {}; } catch { return notify('📌', 'Error', 'Not a valid board'); }
  BOARD_COLS.forEach(c => { if (!Array.isArray(boardData[c])) boardData[c] = []; });
  boardPath = path; const el = document.getElementById('board-name'); if (el) el.textContent = name.replace(/\.board$/, ''); boardRender();
}

// ══ MAXSOCIAL — public feed with likes & comments ════════════════════════════
const SOCIAL_BG = ['', 'linear-gradient(135deg,#667eea,#764ba2)', 'linear-gradient(135deg,#f093fb,#f5576c)', 'linear-gradient(135deg,#4facfe,#00f2fe)', 'linear-gradient(135deg,#43e97b,#38f9d7)', 'linear-gradient(135deg,#fa709a,#fee140)', 'linear-gradient(135deg,#30cfd0,#330867)'];
let socialBg = -1, socialTimer = null;
function buildSocial() {
  return `<div class="social">
    <div class="social-head">✨ MaxSocial <button class="gbtn" style="margin-left:auto;padding:5px 12px" onclick="socialLoad()">↻</button></div>
    <div class="social-compose">
      <textarea id="social-text" placeholder="What's on your mind, ${currentUser?.displayName || 'friend'}?" oninput="socialResize(this)"></textarea>
      <div class="social-bgrow">${SOCIAL_BG.map((g, i) => `<div class="social-swatch${i === 0 ? ' plain' : ''}" style="${g ? 'background:' + g : ''}" onclick="socialPickBg(${i - 1})" title="${i === 0 ? 'Plain' : 'Color'}">${i === 0 ? 'Aa' : ''}</div>`).join('')}
        <button class="social-post" onclick="socialPost()">Post</button></div>
    </div>
    <div class="social-feed" id="social-feed"><div style="color:rgba(255,255,255,.4);padding:30px;text-align:center">Loading feed…</div></div>
  </div>`;
}
function socialResize(t) { t.style.height = 'auto'; t.style.height = Math.min(t.scrollHeight, 140) + 'px'; }
function socialPickBg(i) {
  socialBg = i;
  document.querySelectorAll('.social-swatch').forEach((s, idx) => s.classList.toggle('sel', idx - 1 === i));
  const ta = document.getElementById('social-text');
  if (i >= 0) { ta.style.background = SOCIAL_BG[i + 1]; ta.style.color = '#fff'; ta.style.fontSize = '20px'; ta.style.textAlign = 'center'; ta.style.fontWeight = '600'; }
  else { ta.style.cssText = ''; }
}
function initSocial() {
  if (!serverOnline) { document.getElementById('social-feed').innerHTML = '<div style="color:rgba(255,255,255,.4);padding:30px;text-align:center">MaxSocial needs a server connection.</div>'; return; }
  socialBg = -1; socialLoad();
  socialTimer = setInterval(() => { if (windows['social']) socialLoad(); }, 8000);
}
async function socialPost() {
  const ta = document.getElementById('social-text'); const text = ta.value.trim();
  if (!text) return;
  const r = await apiFetch('/api/posts', { method: 'POST', body: JSON.stringify({ text, bg: socialBg }) });
  if (r.error) { notify('✨', 'Failed', r.error); return; }
  ta.value = ''; socialPickBg(-1); socialResize(ta); socialLoad();
}
async function socialLoad() {
  const posts = await apiFetch('/api/posts');
  const feed = document.getElementById('social-feed');
  if (!feed || posts.error) return;
  if (!posts.length) { feed.innerHTML = '<div style="color:rgba(255,255,255,.4);padding:30px;text-align:center">No posts yet — be the first! ✨</div>'; return; }
  feed.innerHTML = posts.map(p => {
    const t = new Date(p.at).toLocaleString([], { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
    const colored = p.bg >= 0;
    const canDel = p.author === currentUser.username || currentUser.admin;
    return `<div class="post">
      <div class="post-head"><div class="post-ava">${p.author[0].toUpperCase()}</div><div><div class="post-author">${p.author}</div><div class="post-time">${t}</div></div>
        ${canDel ? `<span class="post-del" onclick="socialDelete('${p.id}')" title="Delete">🗑</span>` : ''}</div>
      <div class="post-body${colored ? ' colored' : ''}" ${colored ? `style="background:${SOCIAL_BG[p.bg + 1]}"` : ''}>${escapeHtml(p.text)}</div>
      <div class="post-actions">
        <span class="post-btn${p.liked ? ' liked' : ''}" onclick="socialLike('${p.id}')">${p.liked ? '❤️' : '🤍'} ${p.likes || ''}</span>
        <span class="post-btn" onclick="document.getElementById('cmt-${p.id}').classList.toggle('open')">💬 ${p.comments.length || ''}</span>
      </div>
      <div class="post-comments${p.comments.length ? ' open' : ''}" id="cmt-${p.id}">
        ${p.comments.map(c => `<div class="post-cmt"><b>${c.from}</b> ${escapeHtml(c.text)}</div>`).join('')}
        <div class="post-cmt-add"><input placeholder="Write a comment…" onkeydown="if(event.key==='Enter')socialComment('${p.id}',this)"></div>
      </div>
    </div>`;
  }).join('');
}
async function socialLike(id) {
  const r = await apiFetch('/api/posts/' + id + '/like', { method: 'POST' });
  if (!r.error) socialLoad();
}
async function socialComment(id, input) {
  const text = input.value.trim(); if (!text) return;
  input.value = '';
  const r = await apiFetch('/api/posts/' + id + '/comment', { method: 'POST', body: JSON.stringify({ text }) });
  if (!r.error) socialLoad();
}
async function socialDelete(id) {
  if (!confirm('Delete this post?')) return;
  const r = await apiFetch('/api/posts/' + id, { method: 'DELETE' });
  if (!r.error) { notify('✨', 'Deleted', 'Post removed'); socialLoad(); }
}

// ══ ADMIN PANEL ═══════════════════════════════════════════════════════════════
let adminWatchUser = null, adminWatchTimer = null, adminWatchAt = 0;
function buildAdmin() {
  return `<div class="admin">
    <div class="admin-head"><span style="font-size:22px">🛡️</span><div><div style="color:#fff;font-weight:600">Admin Panel</div><div style="color:rgba(255,255,255,.45);font-size:12px">Manage MaxOS accounts</div></div>
      <button class="gbtn" style="margin-left:auto" onclick="adminLoad()">↻ Refresh</button></div>
    <div class="admin-list" id="admin-list"><div style="color:rgba(255,255,255,.4);padding:20px">Loading…</div></div>
  </div>`;
}
function buildAdminWatch() {
  return `<div class="admin-watch" style="margin:0;height:100%;display:flex;flex-direction:column">
    <div class="admin-watch-head"><span style="font-size:16px">👁️</span> Live screen watch
      <span id="admin-watch-target" style="color:rgba(255,255,255,.55);font-size:12px;margin-left:4px"></span>
      <button class="gbtn" id="admin-watch-stop" style="margin-left:auto;padding:4px 10px" onclick="adminStopWatching()">Stop</button>
    </div>
    <div class="admin-watch-stage" id="admin-watch-stage">Select a suspicious user from Admin Panel and click Watch.</div>
    <div class="admin-watch-meta" id="admin-watch-meta">idle</div>
  </div>`;
}
function initAdmin() { adminLoad(); adminWatchRefreshUI(); }
function initAdminWatch() { adminWatchRefreshUI(); adminWatchTickMeta(); }
function adminWatchRefreshUI(msg) {
  const stage = document.getElementById('admin-watch-stage');
  const meta = document.getElementById('admin-watch-meta');
  const stop = document.getElementById('admin-watch-stop');
  const target = document.getElementById('admin-watch-target');
  if (stage && msg) stage.innerHTML = `<div>${msg}</div>`;
  if (meta) meta.textContent = adminWatchUser ? `watching @${adminWatchUser}` : 'idle';
  if (target) target.textContent = adminWatchUser ? '@' + adminWatchUser : '';
  if (stop) stop.disabled = !adminWatchUser;
}
function adminWatchTickMeta() {
  const meta = document.getElementById('admin-watch-meta');
  if (!meta) return;
  if (!adminWatchUser) { meta.textContent = 'idle'; return; }
  const age = adminWatchAt ? Math.max(0, Math.floor((Date.now() - adminWatchAt) / 1000)) : null;
  const appTxt = adminWatchApp ? ` · app: ${adminWatchApp}` : '';
  meta.textContent = age == null ? `watching @${adminWatchUser}${appTxt} · waiting for frame` : `watching @${adminWatchUser}${appTxt} · updated ${age}s ago${age > 15 ? ' (stale)' : ''}`;
}
function adminReceiveWatchFrame(packet) {
  if (!packet || !adminWatchUser || packet.username !== adminWatchUser) return;
  const stage = document.getElementById('admin-watch-stage');
  if (!stage) return;
  adminWatchApp = packet.appTitle || packet.appId || '';
  if (!stage.querySelector('#admin-watch-img')) stage.innerHTML = '<img id="admin-watch-img" alt="Live user screen">';
  if (packet.at !== adminWatchAt) {
    const img = document.getElementById('admin-watch-img');
    if (img) img.src = packet.frame || '';
    adminWatchAt = Number(packet.at) || Date.now();
  }
  adminWatchTickMeta();
}
function adminReceiveWatchEnded(packet) {
  if (!packet || !adminWatchUser || packet.username !== adminWatchUser) return;
  adminStopWatching('@' + escapeHtml(packet.username) + ' watch ended.');
}
async function adminLoad() {
  const el = document.getElementById('admin-list'); if (!el) return;
  const users = await apiFetch('/api/admin/users');
  if (users.error) { el.innerHTML = `<div style="color:#ff8a84;padding:20px">${users.error}</div>`; return; }
  el.innerHTML = users.map(u => `<div class="admin-user${u.suspended ? ' susp' : ''}">
    <div class="admin-avatar">${u.username[0].toUpperCase()}</div>
    <div style="flex:1;min-width:0">
      <div style="color:#fff;font-size:14px">${u.displayName || u.username} ${u.admin ? '<span class="admin-badge">ADMIN</span>' : ''} ${u.suspicious ? '<span class="admin-badge susp">SUSPICIOUS</span>' : ''} ${u.suspended ? '<span class="admin-badge susp">SUSPENDED</span>' : ''}</div>
      <div style="color:rgba(255,255,255,.4);font-size:11px;font-family:monospace">@${u.username} · joined ${new Date(u.createdAt).toLocaleDateString()}</div>
    </div>
    ${u.username === currentUser.username ? '<span style="color:rgba(255,255,255,.3);font-size:12px">you</span>' :
      `<button class="gbtn" style="padding:5px 10px" onclick="adminToggleSuspicious('${u.username}')">${u.suspicious ? '🟢 Clear' : '🚩 Suspicious'}</button>
       ${u.suspicious ? `<button class="gbtn" style="padding:5px 10px" onclick="adminStartWatching('${u.username}')">👁 Watch</button>` : ''}
       <button class="gbtn" style="padding:5px 10px" onclick="adminSuspend('${u.username}')">${u.suspended ? '✅ Unsuspend' : '⏸ Suspend'}</button>
       <button class="gbtn" style="padding:5px 10px;background:rgba(255,95,87,.25)" onclick="adminDelete('${u.username}')">🗑 Delete</button>`}
  </div>`).join('') || '<div style="color:rgba(255,255,255,.4);padding:20px">No users.</div>';
  if (adminWatchUser && !users.some(u => u.username === adminWatchUser && u.suspicious)) {
    adminStopWatching('@' + escapeHtml(adminWatchUser) + ' is no longer marked suspicious.');
  }
}
async function adminToggleSuspicious(username) {
  const r = await apiFetch('/api/admin/users/' + encodeURIComponent(username) + '/suspicious', { method: 'POST' });
  if (r.error) { notify('🛡️', 'Error', r.error); return; }
  notify('🚩', r.suspicious ? 'Marked suspicious' : 'Cleared', '@' + username);
  if (!r.suspicious && adminWatchUser === username) adminStopWatching();
  adminLoad();
}
async function adminStartWatching(username) {
  openApp('adminwatch');
  adminWatchUser = username;
  adminWatchAt = 0;
  adminWatchApp = '';
  clearInterval(adminWatchTimer);
  adminWatchTimer = setInterval(adminWatchTickMeta, 1000);
  adminWatchRefreshUI('Connecting to @' + escapeHtml(username) + '…');
  try {
    const socket = await ensureScreenWatchSocket();
    if (!socket) throw new Error('Socket unavailable');
    socket.emit('screenwatch:subscribe', { username });
  } catch (e) {
    adminStopWatching('Unable to connect live watch socket.');
  }
}
function adminStopWatching(msg) {
  if (screenWatchSocket) screenWatchSocket.emit('screenwatch:unsubscribe');
  clearInterval(adminWatchTimer);
  adminWatchTimer = null;
  adminWatchUser = null;
  adminWatchAt = 0;
  adminWatchApp = '';
  adminWatchRefreshUI(msg || 'Select a suspicious user from Admin Panel and click Watch.');
}
async function adminSuspend(username) {
  const r = await apiFetch('/api/admin/users/' + encodeURIComponent(username) + '/suspend', { method: 'POST' });
  if (r.error) { notify('🛡️', 'Error', r.error); return; }
  notify('🛡️', r.suspended ? 'Suspended' : 'Unsuspended', '@' + username);
  adminLoad();
}
async function adminDelete(username) {
  if (!confirm('Permanently delete @' + username + ' and all their files? This cannot be undone.')) return;
  const r = await apiFetch('/api/admin/users/' + encodeURIComponent(username), { method: 'DELETE' });
  if (r.error) { notify('🛡️', 'Error', r.error); return; }
  notify('🗑️', 'Account deleted', '@' + username + ' has been removed');
  adminLoad();
}
